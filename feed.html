<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Feed | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }

.feedNav { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;backdrop-filter:blur(20px); }
.navBack { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center; }
.navBack:hover { color:var(--accent); }
.navTitle { font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:linear-gradient(90deg,var(--accent),#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.liveTag { display:flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.3);border-radius:20px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:#ff6060; }
.liveDot { width:6px;height:6px;border-radius:50%;background:#ff4444;animation:lp 1.5s infinite; }
@keyframes lp { 0%,100%{opacity:1}50%{opacity:0.3} }
.navRefresh { margin-left:auto;background:none;border:1px solid rgba(255,215,0,0.15);color:#665500;cursor:pointer;padding:5px 14px;border-radius:20px;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1px;transition:all 0.2s;display:flex;align-items:center;gap:6px; }
.navRefresh:hover { color:var(--accent);border-color:rgba(255,215,0,0.3); }
.spinMe { animation:sp 0.8s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }

/* STICKY SUBHEADER */
.stickyBar {
  position: fixed;
  top: 54px;
  left: 0;
  right: 0;
  z-index: 150;
  background: rgba(8,8,0,0.97);
  backdrop-filter: blur(20px);
  padding: 10px 14px 0;
  border-bottom: 1px solid rgba(255,215,0,0.07);
  max-width: 100%;
}

.stickyBarInner {
  max-width: 860px;
  margin: 0 auto;
}

/* TICKER */
.ticker { overflow:hidden;white-space:nowrap;background:rgba(255,215,0,0.04);border-bottom:1px solid rgba(255,215,0,0.08);padding:7px 0;margin-bottom:10px; }
.tickerInner { display:inline-block;animation:tick 80s linear infinite;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1px;color:#554400; }
.tickerInner span { margin:0 24px; }
.tickerInner b { color:var(--accent); }
@keyframes tick { from{transform:translateX(100vw)}to{transform:translateX(-100%)} }

/* SEARCH */
.sbar { display:flex;align-items:center;gap:8px;background:#0f0e00;border:1px solid rgba(255,215,0,0.1);border-radius:50px;padding:8px 16px;margin-bottom:10px; }
.sbar:focus-within { border-color:rgba(255,215,0,0.3); }
.sbar input { flex:1;background:none;border:none;color:#fff8e7;outline:none;font-size:14px; }
.sbar input::placeholder { color:#332200; }

/* CATS */
.cats { display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none; }
.cats::-webkit-scrollbar { display:none; }
.cat { padding:6px 14px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.1);border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:#554400;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0; }
.cat:hover { color:var(--accent);border-color:rgba(255,215,0,0.25); }
.cat.on { background:rgba(255,215,0,0.1);border-color:var(--accent);color:var(--accent); }

/* MAIN CONTENT — pushed down below sticky bars */
.main { padding:14px 14px 40px;max-width:860px;margin:0 auto; }

.info { font-family:'Rajdhani',sans-serif;font-size:11px;color:#332200;letter-spacing:2px;margin-bottom:16px;text-align:right; }

/* GRID */
.grid { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
@media(max-width:560px){ .grid{grid-template-columns:1fr;} }

/* CARD */
.card { background:#0f0e00;border:1px solid rgba(255,215,0,0.08);border-radius:18px;padding:16px;transition:all 0.22s;animation:cu 0.4s ease both; }
.card:hover { border-color:rgba(255,215,0,0.22);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.5); }
.card.big { grid-column:span 2;background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,140,0,0.02));border-color:rgba(255,215,0,0.18); }
@media(max-width:560px){ .card.big{grid-column:span 1;} }
@keyframes cu { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }

.pill { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:8px; }
.p-tech   { background:rgba(192,132,252,0.1);color:#c084fc;border:1px solid rgba(192,132,252,0.2); }
.p-world  { background:rgba(0,204,255,0.1);color:#00ccff;border:1px solid rgba(0,204,255,0.2); }
.p-india  { background:rgba(249,115,22,0.1);color:#f97316;border:1px solid rgba(249,115,22,0.2); }
.p-fin    { background:rgba(255,215,0,0.1);color:#ffd700;border:1px solid rgba(255,215,0,0.2); }
.p-sci    { background:rgba(59,130,246,0.1);color:#3b82f6;border:1px solid rgba(59,130,246,0.2); }
.p-sport  { background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.2); }
.p-ent    { background:rgba(236,72,153,0.1);color:#ec4899;border:1px solid rgba(236,72,153,0.2); }
.p-health { background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2); }

.ctitle { font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:#fff8e7;line-height:1.4;margin-bottom:8px; }
.card.big .ctitle { font-size:20px; }
.cdesc { font-size:13px;color:#665500;line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
.cfoot { display:flex;align-items:center;justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px; }
.csrc { color:#443300;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.ctime { color:#2a2000; }
.cbtns { display:flex;gap:8px; }
.rbtn { background:none;border:none;color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;padding:0; }
.rbtn:hover { opacity:0.7; }
.abtn { background:none;border:none;color:#443300;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;padding:0; }
.abtn:hover { color:var(--accent); }

.score { font-family:'Rajdhani',sans-serif;font-size:10px;color:#443300;letter-spacing:1px;margin-top:6px; }

/* SKELETON */
.sk { background:linear-gradient(90deg,#111000 25%,#1a1800 50%,#111000 75%);background-size:200% 100%;animation:ska 1.5s infinite;border-radius:8px; }
@keyframes ska { 0%{background-position:200% 0}100%{background-position:-200% 0} }
.skCard { background:#0f0e00;border:1px solid rgba(255,215,0,0.06);border-radius:18px;padding:16px; }

/* EMPTY */
.empty { grid-column:span 2;text-align:center;padding:60px 20px; }
.eIcon { font-size:44px;margin-bottom:14px; }
.eTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#554400;margin-bottom:8px; }
.eDesc { font-size:13px;color:#332200;margin-bottom:20px; }
.eBtn { padding:10px 24px;background:linear-gradient(135deg,var(--accent),#ff8c00);border:none;border-radius:50px;color:#000;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer; }

.sourceNote { font-family:'Rajdhani',sans-serif;font-size:10px;color:#222000;letter-spacing:1px;text-align:center;margin-top:24px; }
</style>
</head>
<body>

<nav class="feedNav">
  <button class="navBack" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="navTitle">📺 Live Feed</div>
  <div class="liveTag"><div class="liveDot"></div>LIVE</div>
  <button class="navRefresh" onclick="loadAll()">
    <svg id="rIco" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Refresh
  </button>
</nav>

<!-- STICKY SEARCH + CATEGORY BAR -->
<div class="stickyBar">
  <div class="stickyBarInner">
    <div class="ticker"><div class="tickerInner" id="ticker"><span>⚡ Loading latest stories...</span></div></div>
    <div class="sbar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#443300" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search stories..." oninput="onSearch(this.value)">
    </div>
    <div class="cats">
      <button class="cat on" onclick="setCat('all',this)">🌐 All</button>
      <button class="cat" onclick="setCat('tech',this)">💻 Tech & AI</button>
      <button class="cat" onclick="setCat('world',this)">🌍 World</button>
      <button class="cat" onclick="setCat('india',this)">🇮🇳 India</button>
      <button class="cat" onclick="setCat('fin',this)">💰 Finance</button>
      <button class="cat" onclick="setCat('sci',this)">🔬 Science</button>
      <button class="cat" onclick="setCat('sport',this)">🏏 Sports</button>
      <button class="cat" onclick="setCat('ent',this)">🎬 Entertainment</button>
      <button class="cat" onclick="setCat('health',this)">❤️ Health</button>
    </div>
  </div>
</div>

<!-- DYNAMIC TOP PADDING — set by JS after measuring stickyBar height -->
<div class="main" id="main">
  <div class="info" id="info">Fetching stories...</div>
  <div class="grid" id="grid"></div>
  <div class="sourceNote">Sources: Hacker News · Reddit · Wikipedia · Open APIs · No API key required</div>
</div>

<script>
let all = [], cat = 'all', q = ''

// Adjust main padding to match sticky bar height
function adjustPadding() {
  const bar = document.querySelector('.stickyBar')
  const main = document.getElementById('main')
  if (bar && main) {
    main.style.paddingTop = (bar.offsetHeight + 14) + 'px'
  }
}
window.addEventListener('load', adjustPadding)
window.addEventListener('resize', adjustPadding)

// ── SOURCES ──────────────────────────────────────────────

async function fetchHN() {
  const ids = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r=>r.json())
  const top = ids.slice(0,15)
  const stories = await Promise.all(
    top.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json()))
  )
  return stories.filter(s=>s&&s.title).map((s,i) => ({
    id:'hn'+s.id, cat: guessHNCat(s.title),
    title: s.title,
    desc: s.text ? s.text.replace(/<[^>]+>/g,'').substring(0,180)+'...' : `${s.score} points · ${s.descendants||0} comments on Hacker News`,
    link: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
    src: s.url ? new URL(s.url).hostname.replace('www.','') : 'Hacker News',
    time: timeAgo(s.time*1000),
    big: i===0,
    score: s.score
  }))
}

function guessHNCat(title) {
  const t = title.toLowerCase()
  if (t.match(/ai|ml|llm|gpt|claude|gemini|machine learning|neural|openai|anthropic/)) return 'tech'
  if (t.match(/startup|ipo|funding|revenue|profit|stock|market|crypto|bitcoin|finance/)) return 'fin'
  if (t.match(/research|science|physics|biology|chemistry|space|nasa|study/)) return 'sci'
  if (t.match(/health|medical|disease|drug|cancer|covid|hospital/)) return 'health'
  if (t.match(/india|delhi|mumbai|bangalore|rupee|modi/)) return 'india'
  if (t.match(/game|movie|film|music|entertainment|netflix|spotify/)) return 'ent'
  if (t.match(/sport|cricket|football|soccer|tennis|nba|ipl/)) return 'sport'
  return 'tech'
}

const SUBS = [
  { sub:'worldnews',       cat:'world' },
  { sub:'india',           cat:'india' },
  { sub:'technology',      cat:'tech'  },
  { sub:'artificial',      cat:'tech'  },
  { sub:'MachineLearning', cat:'tech'  },
  { sub:'CryptoCurrency',  cat:'fin'   },
  { sub:'investing',       cat:'fin'   },
  { sub:'science',         cat:'sci'   },
  { sub:'sports',          cat:'sport' },
  { sub:'cricket',         cat:'sport' },
  { sub:'movies',          cat:'ent'   },
  { sub:'health',          cat:'health'},
]

async function fetchReddit(sub, c) {
  // Use CORS proxy for Reddit
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(`https://www.reddit.com/r/${sub}/hot.json?limit=5`)
  const res = await fetch(proxyUrl)
  const data = await res.json()
  return (data?.data?.children||[])
    .filter(p => !p.data.stickied && p.data.title)
    .slice(0,4)
    .map((p,i) => ({
      id: 'rd'+p.data.id,
      cat: c,
      title: p.data.title,
      desc: p.data.selftext
        ? p.data.selftext.substring(0,180)+'...'
        : `${p.data.score} upvotes · r/${sub}`,
      link: p.data.url || `https://reddit.com${p.data.permalink}`,
      src: `r/${sub}`,
      time: timeAgo(p.data.created_utc*1000),
      big: false,
      score: p.data.score
    }))
}

async function fetchGNews() {
  try {
    const feeds = [
      { url: 'https://feeds.bbci.co.uk/news/technology/rss.xml', cat: 'Tech & AI' },
      { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', cat: 'World' },
      { url: 'https://feeds.bbci.co.uk/news/business/rss.xml', cat: 'Finance' },
      { url: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml', cat: 'Science' },
      { url: 'https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml', cat: 'Entertainment' },
      { url: 'https://feeds.bbci.co.uk/sport/rss.xml', cat: 'Sports' },
      { url: 'https://timesofindia.indiatimes.com/rssfeedstopstories.cms', cat: 'India' },
      { url: 'https://feeds.feedburner.com/TechCrunch', cat: 'Tech & AI' },
    ]
    const items = []
    const API = 'https://api.rss2json.com/v1/api.json?count=6&rss_url='
    await Promise.allSettled(feeds.map(async feed => {
      try {
        const res = await fetch(API + encodeURIComponent(feed.url))
        if (!res.ok) return
        const data = await res.json()
        if (data.status === 'ok' && data.items) {
          data.items.forEach(item => {
            items.push({
              title: item.title,
              link: item.link,
              source: data.feed?.title || 'BBC News',
              cat: feed.cat,
              img: item.thumbnail || item.enclosure?.link || null,
              time: new Date(item.pubDate).getTime() || Date.now()
            })
          })
        }
      } catch(e) {}
    }))
    return items.sort((a,b) => b.time - a.time)
  } catch(e) { return [] }
}

async function fetchAllReddit() {
  const results = await Promise.allSettled(
    SUBS.map(s => fetchReddit(s.sub, s.cat))
  )
  return results.flatMap(r => r.status==='fulfilled' ? r.value : [])
}

const CATMAP = {
  all:   { label:'🌐 All',          pill:'p-world'  },
  tech:  { label:'💻 Tech & AI',    pill:'p-tech'   },
  world: { label:'🌍 World',        pill:'p-world'  },
  india: { label:'🇮🇳 India',       pill:'p-india'  },
  fin:   { label:'💰 Finance',      pill:'p-fin'    },
  sci:   { label:'🔬 Science',      pill:'p-sci'    },
  sport: { label:'🏏 Sports',       pill:'p-sport'  },
  ent:   { label:'🎬 Entertainment',pill:'p-ent'    },
  health:{ label:'❤️ Health',       pill:'p-health' },
}

function timeAgo(ms) {
  const d = (Date.now()-ms)/1000
  if(d<60) return 'Just now'
  if(d<3600) return Math.floor(d/60)+'m ago'
  if(d<86400) return Math.floor(d/3600)+'h ago'
  return Math.floor(d/86400)+'d ago'
}

function showSkels() {
  document.getElementById('grid').innerHTML = Array(8).fill(0).map((_,i)=>`
    <div class="skCard ${i===0?'big':''}">
      <div class="sk" style="height:18px;width:70px;margin-bottom:10px;"></div>
      <div class="sk" style="height:17px;width:100%;margin-bottom:6px;"></div>
      <div class="sk" style="height:17px;width:75%;margin-bottom:12px;"></div>
      <div class="sk" style="height:12px;width:100%;margin-bottom:5px;"></div>
      <div class="sk" style="height:12px;width:55%;margin-bottom:12px;"></div>
      <div class="sk" style="height:10px;width:100%;"></div>
    </div>`).join('')
}

async function loadAll() {
  document.getElementById('rIco').classList.add('spinMe')
  document.getElementById('info').textContent = '⏳ Loading live stories...'
  showSkels()

  const [hn, gnews] = await Promise.allSettled([fetchHN(), fetchGNews()])

  all = [
    ...(hn.status==='fulfilled' ? hn.value : []),
    ...(gnews.status==='fulfilled' ? gnews.value : [])
  ]

  all.sort((a,b) => (b.big?1:0)-(a.big?1:0))

  const seen = new Set()
  all = all.filter(n => {
    const key = n.title.substring(0,30).toLowerCase()
    if(seen.has(key)) return false
    seen.add(key)
    return true
  })

  updateTicker()
  adjustPadding()
  render()

  const now = new Date()
  document.getElementById('info').textContent =
    `✓ Updated ${now.toLocaleTimeString()} · ${all.length} stories`
  document.getElementById('rIco').classList.remove('spinMe')

  setTimeout(loadAll, 600000)
}

function updateTicker() {
  if(!all.length) return
  const t = document.getElementById('ticker')
  const html = all.slice(0,12).map(n=>{
    const c = CATMAP[n.cat]||CATMAP.tech
    return `<span>${c.label} <b>${n.title}</b></span>`
  }).join('')
  t.innerHTML = html+html
}

function render() {
  const grid = document.getElementById('grid')
  let news = all
  if(cat!=='all') news = news.filter(n=>n.cat===cat)
  if(q) {
    const qL = q.toLowerCase()
    news = news.filter(n=>n.title.toLowerCase().includes(qL)||n.desc.toLowerCase().includes(qL))
  }

  if(!news.length) {
    grid.innerHTML=`<div class="empty">
      <div class="eIcon">🔍</div>
      <div class="eTitle">No Results Found</div>
      <div class="eDesc">Try a different category or keyword</div>
      <button class="eBtn" onclick="setCat('all',document.querySelector('.cat'))">Show All</button>
    </div>`
    return
  }

  grid.innerHTML = news.slice(0,30).map((n,i)=>{
    const c = CATMAP[n.cat]||CATMAP.tech
    const delay = (i*0.03).toFixed(2)
    const safeTitle = n.title.replace(/'/g,"\\'").replace(/"/g,'&quot;')
    return `
    <div class="card ${n.big?'big':''}" style="animation-delay:${delay}s">
      <div class="pill ${c.pill}">${c.label}</div>
      <div class="ctitle">${n.title}</div>
      <div class="cdesc">${n.desc}</div>
      <div class="cfoot">
        <span class="csrc">${n.src}</span>
        <span class="ctime">${n.time}</span>
        <div class="cbtns">
          <button class="rbtn" onclick="window.open('${n.link}','_blank')">Read →</button>
          <button class="abtn" onclick="askAI('${safeTitle}')">Ask AI</button>
        </div>
      </div>
      ${n.score ? `<div class="score">▲ ${n.score} points</div>` : ''}
    </div>`
  }).join('')
}

function setCat(c, btn) {
  cat = c
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'))
  if(btn) btn.classList.add('on')
  render()
}

function onSearch(v) { q=v; render() }

function askAI(title) {
  localStorage.setItem('datta_feed_prompt','Tell me more about: '+title)
  window.location.href='index.html'
}

window.addEventListener('DOMContentLoaded', loadAll)
</script>
</body>
</html>
