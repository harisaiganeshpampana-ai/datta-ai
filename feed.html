<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Feed | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080800;
  color: #fff8e7;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* NAV */
.feedNav {
  position: fixed; top: 0; left: 0; right: 0;
  height: 54px;
  background: rgba(8,8,0,0.92);
  border-bottom: 1px solid rgba(255,215,0,0.1);
  display: flex; align-items: center;
  padding: 0 20px; gap: 14px;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.feedNavBack {
  background: none; border: none;
  color: #665500; cursor: pointer;
  font-size: 20px; transition: color 0.2s;
  display: flex; align-items: center;
}
.feedNavBack:hover { color: var(--accent); }

.feedNavTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--accent), #ff8c00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.feedNavLive {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  background: rgba(255,60,60,0.1);
  border: 1px solid rgba(255,60,60,0.3);
  border-radius: 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; letter-spacing: 2px; color: #ff6060;
}

.liveDot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff4444;
  animation: livePulse 1.5s infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.feedNavRefresh {
  margin-left: auto;
  background: none; border: 1px solid rgba(255,215,0,0.15);
  color: #665500; cursor: pointer;
  padding: 5px 12px; border-radius: 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; letter-spacing: 1px;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.feedNavRefresh:hover { color: var(--accent); border-color: rgba(255,215,0,0.3); }
.feedNavRefresh.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN */
.feedMain {
  padding-top: 74px;
  padding-bottom: 40px;
  max-width: 900px;
  margin: 0 auto;
  padding-left: 16px;
  padding-right: 16px;
}

/* CATEGORY TABS */
.catTabs {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 16px 0; margin-bottom: 8px;
  scrollbar-width: none;
}
.catTabs::-webkit-scrollbar { display: none; }

.catTab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  background: rgba(255,215,0,0.05);
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 50px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  color: #665500; cursor: pointer; white-space: nowrap;
  transition: all 0.2s; flex-shrink: 0;
}
.catTab:hover { color: var(--accent); border-color: rgba(255,215,0,0.3); }
.catTab.active {
  background: rgba(255,215,0,0.12);
  border-color: var(--accent);
  color: var(--accent);
}

/* LAST UPDATED */
.lastUpdated {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; color: #332200; letter-spacing: 2px;
  margin-bottom: 20px; text-align: right;
}

/* NEWS GRID */
.newsGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 600px) {
  .newsGrid { grid-template-columns: 1fr; }
}

/* NEWS CARD */
.newsCard {
  background: #0f0e00;
  border: 1px solid rgba(255,215,0,0.08);
  border-radius: 18px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.newsCard:hover {
  border-color: rgba(255,215,0,0.25);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.newsCard.featured {
  grid-column: span 2;
  background: linear-gradient(135deg, rgba(255,215,0,0.07), rgba(255,140,0,0.03));
  border-color: rgba(255,215,0,0.2);
}

@media (max-width: 600px) {
  .newsCard.featured { grid-column: span 1; }
}

.cardCat {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  margin-bottom: 12px;
}

.cardHeadline {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 0.5px;
  color: #fff8e7; line-height: 1.4; margin-bottom: 10px;
}

.newsCard.featured .cardHeadline { font-size: 20px; }

.cardSummary {
  font-size: 13px; color: #665500;
  line-height: 1.6; margin-bottom: 14px;
}

.cardFooter {
  display: flex; align-items: center;
  justify-content: space-between;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; color: #443300; letter-spacing: 1px;
}

.cardSource {
  display: flex; align-items: center; gap: 5px;
  color: #554400;
}

.cardTime { color: #332200; }

.cardReadMore {
  background: none; border: none;
  color: var(--accent); font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; padding: 0; transition: opacity 0.2s;
}
.cardReadMore:hover { opacity: 0.7; }

.aiTag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: rgba(255,215,0,0.07);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px; color: #665500; letter-spacing: 1px;
  margin-bottom: 10px; margin-left: 6px;
}

/* LOADING SKELETON */
.skeleton {
  background: linear-gradient(90deg, #111000 25%, #1a1800 50%, #111000 75%);
  background-size: 200% 100%;
  animation: shimmerLoad 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmerLoad {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeletonCard {
  background: #0f0e00;
  border: 1px solid rgba(255,215,0,0.06);
  border-radius: 18px; padding: 18px;
}

/* ERROR STATE */
.feedError {
  text-align: center; padding: 60px 20px;
  color: #443300;
  font-family: 'Rajdhani', sans-serif;
}

.feedError div:first-child { font-size: 48px; margin-bottom: 16px; }
.feedError div:nth-child(2) { font-size: 18px; letter-spacing: 2px; margin-bottom: 8px; color: #665500; }
.feedError div:nth-child(3) { font-size: 13px; margin-bottom: 24px; }

.retryBtn {
  padding: 10px 24px;
  background: linear-gradient(135deg, var(--accent), #ff8c00);
  border: none; border-radius: 50px;
  color: #000; font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  cursor: pointer; transition: all 0.2s;
}
.retryBtn:hover { opacity: 0.85; transform: scale(1.02); }

/* CATEGORY COLORS */
.cat-world    { background: rgba(0,204,255,0.1);  color: #00ccff; border: 1px solid rgba(0,204,255,0.2); }
.cat-tech     { background: rgba(192,132,252,0.1); color: #c084fc; border: 1px solid rgba(192,132,252,0.2); }
.cat-sports   { background: rgba(0,255,136,0.1);  color: #00ff88; border: 1px solid rgba(0,255,136,0.2); }
.cat-finance  { background: rgba(255,215,0,0.1);  color: #ffd700; border: 1px solid rgba(255,215,0,0.2); }
.cat-entertainment { background: rgba(236,72,153,0.1); color: #ec4899; border: 1px solid rgba(236,72,153,0.2); }
.cat-india    { background: rgba(249,115,22,0.1); color: #f97316; border: 1px solid rgba(249,115,22,0.2); }
.cat-science  { background: rgba(59,130,246,0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }
.cat-health   { background: rgba(34,197,94,0.1);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }

/* MARQUEE TICKER */
.ticker {
  background: rgba(255,215,0,0.05);
  border-top: 1px solid rgba(255,215,0,0.1);
  border-bottom: 1px solid rgba(255,215,0,0.1);
  padding: 8px 0; margin-bottom: 20px;
  overflow: hidden; white-space: nowrap;
}

.tickerInner {
  display: inline-block;
  animation: tickerScroll 40s linear infinite;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; letter-spacing: 1px; color: #665500;
}

.tickerInner span { margin: 0 32px; }
.tickerInner span b { color: var(--accent); }

@keyframes tickerScroll {
  from { transform: translateX(100vw); }
  to { transform: translateX(-100%); }
}

/* SEARCH BAR */
.feedSearch {
  display: flex; align-items: center; gap: 10px;
  background: #0f0e00;
  border: 1px solid rgba(255,215,0,0.12);
  border-radius: 50px; padding: 8px 16px;
  margin-bottom: 16px; transition: border-color 0.2s;
}
.feedSearch:focus-within { border-color: rgba(255,215,0,0.3); }
.feedSearch input {
  flex: 1; background: none; border: none;
  color: #fff8e7; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
}
.feedSearch input::placeholder { color: #332200; }
.feedSearch svg { color: #443300; flex-shrink: 0; }
</style>
</head>
<body>

<!-- NAV -->
<div class="feedNav">
  <button class="feedNavBack" onclick="window.location.href='index.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="feedNavTitle">📺 Live Feed</div>
  <div class="feedNavLive">
    <div class="liveDot"></div>
    LIVE
  </div>
  <button class="feedNavRefresh" id="refreshBtn" onclick="loadFeed()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Refresh
  </button>
</div>

<div class="feedMain">

  <!-- TICKER -->
  <div class="ticker">
    <div class="tickerInner" id="ticker">
      <span>⚡ Loading latest news...</span>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="feedSearch">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="feedSearchInput" placeholder="Search news..." oninput="filterNews(this.value)">
  </div>

  <!-- CATEGORY TABS -->
  <div class="catTabs" id="catTabs">
    <button class="catTab active" data-cat="all" onclick="filterCat('all', this)">🌐 All</button>
    <button class="catTab" data-cat="world" onclick="filterCat('world', this)">🌍 World</button>
    <button class="catTab" data-cat="india" onclick="filterCat('india', this)">🇮🇳 India</button>
    <button class="catTab" data-cat="tech" onclick="filterCat('tech', this)">💻 Tech & AI</button>
    <button class="catTab" data-cat="finance" onclick="filterCat('finance', this)">💰 Finance</button>
    <button class="catTab" data-cat="sports" onclick="filterCat('sports', this)">🏏 Sports</button>
    <button class="catTab" data-cat="entertainment" onclick="filterCat('entertainment', this)">🎬 Entertainment</button>
    <button class="catTab" data-cat="science" onclick="filterCat('science', this)">🔬 Science</button>
    <button class="catTab" data-cat="health" onclick="filterCat('health', this)">❤️ Health</button>
  </div>

  <div class="lastUpdated" id="lastUpdated">Fetching latest news...</div>

  <!-- NEWS GRID -->
  <div class="newsGrid" id="newsGrid">
    <!-- Skeletons -->
    ${[1,2,3,4,5,6].map((_, i) => `
    <div class="skeletonCard ${i===0?'featured':''}">
      <div class="skeleton" style="height:20px;width:80px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:18px;width:100%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:18px;width:85%;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:13px;width:100%;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:13px;width:70%;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:13px;width:60%;"></div>
    </div>`).join('')}
  </div>

</div>

<script>
let allNews = []
let currentCat = 'all'
let searchQuery = ''

const CATEGORIES = {
  world:         { label: '🌍 World',         color: 'cat-world',         query: 'world news today' },
  india:         { label: '🇮🇳 India',         color: 'cat-india',         query: 'India news today' },
  tech:          { label: '💻 Tech & AI',      color: 'cat-tech',          query: 'technology AI news 2026' },
  finance:       { label: '💰 Finance',        color: 'cat-finance',       query: 'finance crypto stock market today' },
  sports:        { label: '🏏 Sports',         color: 'cat-sports',        query: 'sports news today cricket IPL' },
  entertainment: { label: '🎬 Entertainment',  color: 'cat-entertainment', query: 'entertainment bollywood movies news' },
  science:       { label: '🔬 Science',        color: 'cat-science',       query: 'science space research news 2026' },
  health:        { label: '❤️ Health',         color: 'cat-health',        query: 'health medicine news today' }
}

// Use Anthropic API to fetch and summarize real news
async function fetchNewsForCategory(cat, catData) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{
        role: "user",
        content: `Search for the latest ${catData.query} right now. Find 3 real, current news stories from today or this week. 

For each story return ONLY this exact JSON format (no other text):
[
  {
    "headline": "Short punchy headline under 12 words",
    "summary": "2-3 sentence AI summary of what happened and why it matters",
    "source": "Publication name",
    "time": "X hours/minutes ago or today",
    "category": "${cat}",
    "featured": false
  }
]

Make the first item featured:true. Return ONLY the JSON array, nothing else.`
      }]
    })
  })

  const data = await response.json()
  const text = data.content?.map(c => c.text || '').join('') || ''

  try {
    const match = text.match(/\[[\s\S]*\]/)
    if (match) {
      const parsed = JSON.parse(match[0])
      return parsed.map((item, i) => ({
        ...item,
        category: cat,
        featured: i === 0 && cat === 'world',
        id: cat + '_' + i + '_' + Date.now()
      }))
    }
  } catch(e) {
    console.error('Parse error for', cat, e)
  }
  return []
}

async function loadFeed() {
  const grid = document.getElementById('newsGrid')
  const refreshBtn = document.getElementById('refreshBtn')
  const lastUpdated = document.getElementById('lastUpdated')

  refreshBtn.classList.add('spinning')
  lastUpdated.textContent = 'Fetching latest news with AI...'

  // Show skeletons
  grid.innerHTML = Array(6).fill(0).map((_, i) => `
    <div class="skeletonCard ${i===0?'featured':''}">
      <div class="skeleton" style="height:20px;width:80px;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:18px;width:100%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:18px;width:85%;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:13px;width:100%;margin-bottom:6px;"></div>
      <div class="skeleton" style="height:13px;width:70%;"></div>
    </div>
  `).join('')

  // Fetch all categories in parallel
  const cats = Object.entries(CATEGORIES)
  const results = await Promise.allSettled(
    cats.map(([cat, data]) => fetchNewsForCategory(cat, data))
  )

  allNews = []
  results.forEach((result, i) => {
    if (result.status === 'fulfilled') {
      allNews.push(...result.value)
    }
  })

  // Sort: featured first, then by category
  allNews.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0))

  // Update ticker
  updateTicker()

  // Render
  renderNews()

  const now = new Date()
  lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString()} · ${allNews.length} stories`
  refreshBtn.classList.remove('spinning')

  // Auto refresh every 10 minutes
  setTimeout(loadFeed, 10 * 60 * 1000)
}

function updateTicker() {
  const ticker = document.getElementById('ticker')
  const headlines = allNews.slice(0, 8).map(n => {
    const catData = CATEGORIES[n.category]
    return `<span>${catData?.label || '📰'} <b>${n.headline}</b></span>`
  }).join('')
  ticker.innerHTML = headlines + headlines // duplicate for seamless loop
}

function renderNews() {
  const grid = document.getElementById('newsGrid')
  let news = allNews

  // Filter by category
  if (currentCat !== 'all') {
    news = news.filter(n => n.category === currentCat)
  }

  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase()
    news = news.filter(n =>
      n.headline.toLowerCase().includes(q) ||
      n.summary.toLowerCase().includes(q)
    )
  }

  if (news.length === 0) {
    grid.innerHTML = `
      <div class="feedError" style="grid-column:span 2">
        <div>🔍</div>
        <div>NO RESULTS FOUND</div>
        <div>Try a different category or search term</div>
        <button class="retryBtn" onclick="filterCat('all', document.querySelector('.catTab'))">Show All News</button>
      </div>
    `
    return
  }

  grid.innerHTML = news.map((item, idx) => {
    const catData = CATEGORIES[item.category] || {}
    const delay = idx * 0.05
    return `
      <div class="newsCard ${item.featured ? 'featured' : ''}"
           style="animation-delay:${delay}s"
           data-category="${item.category}"
           data-headline="${item.headline.replace(/"/g, '&quot;')}">

        <div style="display:flex;align-items:center;margin-bottom:10px;">
          <span class="cardCat ${catData.color || ''}">${catData.label || '📰'}</span>
          <span class="aiTag">✦ AI Summary</span>
        </div>

        <div class="cardHeadline">${item.headline}</div>
        <div class="cardSummary">${item.summary}</div>

        <div class="cardFooter">
          <div class="cardSource">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            ${item.source || 'News'}
          </div>
          <span class="cardTime">${item.time || 'Today'}</span>
          <button class="cardReadMore" onclick="askDattaAI('${item.headline.replace(/'/g, "\\'")}')">
            Ask Datta AI →
          </button>
        </div>
      </div>
    `
  }).join('')
}

function filterCat(cat, btn) {
  currentCat = cat
  document.querySelectorAll('.catTab').forEach(t => t.classList.remove('active'))
  if (btn) btn.classList.add('active')
  renderNews()
}

function filterNews(query) {
  searchQuery = query
  renderNews()
}

function askDattaAI(headline) {
  localStorage.setItem('datta_feed_prompt', 'Tell me more about: ' + headline)
  window.location.href = 'index.html'
}

// Load on start
window.addEventListener('DOMContentLoaded', loadFeed)
</script>

</body>
</html>
