<!DOCTYPE html>
<html lang="en">
<head>
<script>
// ── INLINE PLAN GUARD — runs before page renders ──────
(function() {
  var FEATURES = {
    arambh:  {xpGamification: false},
    shakti:  {xpGamification: true},
    agni:    {xpGamification: true},
    brahma:  {xpGamification: true}
  };
  function isCreator() {
    try {
      var u = (JSON.parse(localStorage.getItem('datta_user')||'{}').username||'').toLowerCase();
      return ['pampana_hari_sai_ganesh','harisaiganesh','ganesh','admin','creator','dattaai'].some(function(c){return u.indexOf(c)!==-1});
    } catch(e){return false;}
  }
  if (isCreator()) return;
  var plan = localStorage.getItem('datta_plan') || 'arambh';
  var allowed = FEATURES[plan] && FEATURES[plan]['xpGamification'] === true;
  if (!allowed) {
    var PLAN_NAMES = {arambh:'🌱 Arambh (Free)', shakti:'⚡ Shakti', agni:'🔥 Agni', brahma:'👑 Brahma'};
    var UNLOCK_PLAN = '⚡ Shakti';
    var FEATURE_DISPLAY = '🎮 XP Gamification';
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'none';
    });
    // Redirect immediately before any content shows
    document.write('<html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080800;color:#fff8e7;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}</style></head><body><div><div style="font-size:60px;margin-bottom:16px">🔒</div><div style="font-family:sans-serif;font-size:22px;font-weight:700;color:#ffd700;letter-spacing:3px;margin-bottom:8px">' + FEATURE_DISPLAY + '</div><div style="font-size:13px;color:#665500;margin-bottom:6px">Requires ' + UNLOCK_PLAN + ' plan or higher</div><div style="font-size:12px;color:#443300;margin-bottom:24px">You are on ' + (PLAN_NAMES[plan]||plan) + '</div><button onclick="window.location.href='pricing.html'" style="padding:13px 32px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:50px;color:#000;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:10px;display:block;width:100%;max-width:260px;margin:0 auto 10px">👑 UPGRADE NOW</button><br><button onclick="window.history.back()" style="padding:10px 24px;background:none;border:1px solid rgba(255,215,0,0.2);border-radius:50px;color:#665500;font-size:12px;cursor:pointer;margin-top:10px">← Go Back</button></div></body></html>');
    document.close();
    return;
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Progress | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }
.topbar { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(20px); }
.back { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px; }
.back:hover { color:var(--accent); }
.pageTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.main { padding:70px 16px 40px;max-width:600px;margin:0 auto; }
.heroCard { background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.12);border-radius:20px;padding:24px;text-align:center;margin-bottom:20px; }
.levelEmoji { font-size:56px;margin-bottom:8px; }
.levelName { font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent); }
.xpText { font-family:'Rajdhani',sans-serif;font-size:13px;color:#443300;margin-top:4px; }
.xpBar { background:rgba(255,215,0,0.08);border-radius:10px;height:10px;overflow:hidden;margin:12px 0 6px; }
.xpFill { height:100%;background:linear-gradient(90deg,var(--accent),#ff8c00);border-radius:10px;transition:width 1s ease; }
.nextLvl { font-family:'Rajdhani',sans-serif;font-size:11px;color:#332200;text-align:right; }
.grid2 { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px; }
.statCard { background:#0f0e00;border:1px solid rgba(255,215,0,0.07);border-radius:14px;padding:14px;text-align:center; }
.statVal { font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px; }
.statLbl { font-family:'Rajdhani',sans-serif;font-size:10px;color:#332200;letter-spacing:1px; }
.levelsList { display:flex;flex-direction:column;gap:8px; }
.levelRow { display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid; }
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="pageTitle">🎮 XP Progress</div>
</div>
<div class="main" id="main">Loading...</div>
<script>
const LEVELS = [{level:1,name:"Beginner",emoji:"🌱",xpNeeded:0},{level:2,name:"Explorer",emoji:"🔭",xpNeeded:100},{level:3,name:"Thinker",emoji:"💭",xpNeeded:300},{level:4,name:"Creator",emoji:"⚡",xpNeeded:600},{level:5,name:"Mastermind",emoji:"🧠",xpNeeded:1000},{level:6,name:"Legend",emoji:"👑",xpNeeded:2000},{level:7,name:"Brahma",emoji:"🔥",xpNeeded:5000}]

const data = (() => { try { return JSON.parse(localStorage.getItem("datta_xp")||"{}") } catch{return{}} })()
const totalXP = data.totalXP || 0
const streak = data.streak || 0
const history = data.history || []

let curLevel = LEVELS[0]
for (const l of LEVELS) { if (totalXP >= l.xpNeeded) curLevel = l; else break }
const nextLevel = LEVELS.find(l => l.xpNeeded > totalXP)
const pct = nextLevel ? Math.round(((totalXP-curLevel.xpNeeded)/(nextLevel.xpNeeded-curLevel.xpNeeded))*100) : 100

document.getElementById("main").innerHTML = `
  <div class="heroCard">
    <div class="levelEmoji">${curLevel.emoji}</div>
    <div class="levelName">${curLevel.name}</div>
    <div class="xpText">Level ${curLevel.level} · ${totalXP} Total XP</div>
    <div class="xpBar"><div class="xpFill" id="xpFill" style="width:0%"></div></div>
    <div class="nextLvl">${nextLevel ? `${nextLevel.xpNeeded-totalXP} XP to ${nextLevel.emoji} ${nextLevel.name}` : "🔥 MAX LEVEL!"}</div>
  </div>

  <div class="grid2">
    <div class="statCard"><div class="statVal" style="color:#f97316">${streak}</div><div class="statLbl">🔥 DAY STREAK</div></div>
    <div class="statCard"><div class="statVal" style="color:#ffd700">${totalXP}</div><div class="statLbl">⚡ TOTAL XP</div></div>
    <div class="statCard"><div class="statVal" style="color:#00ccff">${history.filter(h=>h.type==="message").length}</div><div class="statLbl">💬 MESSAGES</div></div>
    <div class="statCard"><div class="statVal" style="color:#c084fc">${history.filter(h=>h.type==="image").length}</div><div class="statLbl">🎨 IMAGES</div></div>
  </div>

  <div style="font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:#332200;margin-bottom:12px;">ALL LEVELS</div>
  <div class="levelsList">
    ${LEVELS.map(l => {
      const done = totalXP >= l.xpNeeded
      const isCur = l.level === curLevel.level
      return `<div class="levelRow" style="background:${done?'rgba(255,215,0,0.05)':'rgba(0,0,0,0.2)'};border-color:${isCur?'rgba(255,215,0,0.3)':done?'rgba(255,215,0,0.1)':'rgba(255,255,255,0.03)'}">
        <span style="font-size:22px">${l.emoji}</span>
        <div style="flex:1">
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:${done?'var(--accent)':'#332200'}">${l.name}${isCur?' ← YOU':''}</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:10px;color:#332200;letter-spacing:1px">${l.xpNeeded} XP required</div>
        </div>
        ${done?'<span style="color:#ffd700;font-size:16px">✓</span>':''}
      </div>`
    }).join("")}
  </div>
`
setTimeout(() => { document.getElementById("xpFill").style.width = pct+"%" }, 200)
</script>
</body>
</html>
