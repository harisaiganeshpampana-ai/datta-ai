<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #1a1a1a;
  --border:   rgba(255,255,255,0.08);
  --text:     #ebebeb;
  --text2:    #888;
  --text3:    #555;
  --accent:   #10a37f;
  --user-bg:  #1a1a1a;
  --ai-bg:    transparent;
  --radius:   12px;
  --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.7;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 780px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.header-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.header-status {
  font-size: 12px;
  color: var(--text3);
  margin-left: auto;
}

/* Chat scroll area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text3);
  text-align: center;
  padding: 40px 20px;
}
.empty-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}
.empty-title { font-size: 16px; font-weight: 500; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); }

/* Message rows */
.msg-row {
  display: flex;
  padding: 4px 0;
  margin-bottom: 4px;
  animation: msgIn 0.18s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.user { justify-content: flex-end; }
.msg-row.ai   { justify-content: flex-start; }

/* Bubbles */
.bubble {
  max-width: 75%;
  padding: 10px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.7;
  word-break: break-word;
  white-space: pre-wrap;
}
.bubble.user {
  background: var(--user-bg);
  border: 0.5px solid var(--border);
  border-radius: 18px 4px 18px 18px;
  color: var(--text);
}
.bubble.ai {
  background: var(--ai-bg);
  border-radius: 4px 18px 18px 18px;
  color: var(--text);
  padding: 10px 4px;
  max-width: 90%;
}

/* Thinking indicator */
.thinking {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text3);
  font-size: 13px;
  padding: 8px 4px;
}
.thinking-dots {
  display: flex;
  gap: 4px;
}
.thinking-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); opacity: 0.4; }
  50%       { transform: translateY(-4px); opacity: 1; }
}

/* Cursor blink during streaming */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* Error message */
.error-msg {
  color: #ef4444;
  font-size: 13px;
  padding: 8px 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Input area */
.input-area {
  padding: 12px 20px 20px;
  flex-shrink: 0;
  border-top: 0.5px solid var(--border);
}
.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within {
  border-color: rgba(16,163,127,0.4);
}
#messageInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  max-height: 160px;
  min-height: 24px;
}
#messageInput::placeholder { color: var(--text3); }
#sendBtn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}
#sendBtn:hover { opacity: 0.85; }
#sendBtn:active { transform: scale(0.93); }
#sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
.input-hint {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="layout">
  <header class="header">
    <div class="header-dot" id="statusDot"></div>
    <span class="header-title">Local AI</span>
    <span class="header-status" id="statusText">Connected to LM Studio</span>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="empty-title">Local AI Chat</div>
      <div class="empty-sub">Running on LM Studio · Send a message to start</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="messageInput"
        placeholder="Message Local AI..."
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="sendBtn" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
const BACKEND = 'http://127.0.0.1:5000';
const chatArea = document.getElementById('chatArea');
const input    = document.getElementById('messageInput');
const sendBtn  = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let isWaiting = false;

// ── Auto-resize textarea ──────────────────────────────────────────────────────
function resizeInput() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}
input.addEventListener('input', resizeInput);

// ── Send on Enter (Shift+Enter = newline) ─────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

// ── Helpers ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
}

function hideEmpty() {
  if (emptyState) emptyState.style.display = 'none';
}

function setWaiting(val) {
  isWaiting = val;
  sendBtn.disabled = val;
  input.disabled = val;
}

function setStatus(ok) {
  statusDot.style.background = ok ? '#10a37f' : '#ef4444';
  statusText.textContent = ok ? 'Connected to LM Studio' : 'Server unreachable';
}

// ── Add user bubble ───────────────────────────────────────────────────────────
function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  row.appendChild(bubble);
  chatArea.appendChild(row);
  scrollBottom();
  return row;
}

// ── Add thinking indicator ────────────────────────────────────────────────────
function addThinking() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'thinkingRow';
  row.innerHTML = `
    <div class="thinking">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      Thinking...
    </div>`;
  chatArea.appendChild(row);
  scrollBottom();
  return row;
}

// ── Remove thinking indicator ─────────────────────────────────────────────────
function removeThinking() {
  const el = document.getElementById('thinkingRow');
  if (el) el.remove();
}

// ── Add AI bubble (returns bubble element for streaming) ──────────────────────
function addAIMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.textContent = text;
  row.appendChild(bubble);
  chatArea.appendChild(row);
  scrollBottom();
  return bubble;
}

// ── Add error message ─────────────────────────────────────────────────────────
function addError(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="error-msg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    ${msg}
  </div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

// ── Streaming response ────────────────────────────────────────────────────────
async function streamResponse(userMessage) {
  let aiBubble = null;
  let fullText = '';

  try {
    const res = await fetch(BACKEND + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMessage }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const contentType = res.headers.get('content-type') || '';

    // ── Streaming path (SSE / chunked) ──────────────────────────────────────
    if (contentType.includes('text/event-stream') || contentType.includes('text/plain')) {
      removeThinking();
      aiBubble = addAIMessage('');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      aiBubble.appendChild(cursor);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.trim() || line === 'data: [DONE]') continue;
          const raw = line.startsWith('data: ') ? line.slice(6) : line;
          try {
            const json = JSON.parse(raw);
            const token = json?.choices?.[0]?.delta?.content
                        || json?.choices?.[0]?.message?.content
                        || json?.response
                        || '';
            if (token) {
              fullText += token;
              aiBubble.textContent = fullText;
              aiBubble.appendChild(cursor);
              scrollBottom();
            }
          } catch { /* non-JSON chunk, skip */ }
        }
      }

      cursor.remove();

    // ── Non-streaming (JSON) path ────────────────────────────────────────────
    } else {
      const data = await res.json();
      const reply = data?.choices?.[0]?.message?.content
                  || data?.choices?.[0]?.text
                  || data?.response
                  || data?.message
                  || 'No response received.';
      fullText = reply;
      removeThinking();
      addAIMessage(reply);
    }

    setStatus(true);

  } catch (err) {
    console.error('[AI] Error:', err);
    removeThinking();
    if (aiBubble) aiBubble.textContent = fullText || '';
    addError('AI server not responding. Make sure Flask and LM Studio are running.');
    setStatus(false);
  }
}

// ── Main send function ────────────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isWaiting) return;

  hideEmpty();
  setWaiting(true);

  // Clear input immediately
  input.value = '';
  input.style.height = 'auto';

  // Add user message + thinking
  addUserMessage(text);
  addThinking();

  // Stream or receive response
  await streamResponse(text);

  setWaiting(false);
  input.focus();
}

// ── Focus input on load ───────────────────────────────────────────────────────
input.focus();
</script>
</body>
</html>
