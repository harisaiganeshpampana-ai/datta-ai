<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage · Datta AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#fff; font-family:'Josefin Sans',sans-serif; min-height:100vh; }

.topBar {
  display:flex; align-items:center; gap:14px;
  padding:16px 20px; border-bottom:1px solid #111;
  position:sticky; top:0; background:#0a0a0a; z-index:10;
}
.backBtn {
  width:34px; height:34px; border-radius:50%;
  background:#111; border:1px solid #1e1e1e;
  color:#aaa; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  text-decoration:none; transition:all 0.15s;
}
.backBtn:hover { background:#1a1a1a; color:white; }
.pageTitle { font-size:16px; font-weight:600; letter-spacing:2px; color:white; }

.page { max-width:480px; margin:0 auto; padding:24px 20px 40px; }

/* Plan badge */
.planBadge {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 16px; border-radius:20px;
  background:#0a1a0a; border:1px solid #00ff8833;
  font-size:12px; font-weight:600; color:#00ff88;
  letter-spacing:1px; text-transform:uppercase;
  margin-bottom:32px;
}

/* Ring chart */
.ringWrap {
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:32px;
}
.ringContainer {
  position:relative; width:200px; height:200px; margin-bottom:20px;
}
.ringContainer svg { transform:rotate(-90deg); }
.ringBg { fill:none; stroke:#1a1a1a; stroke-width:14; }
.ringFill {
  fill:none; stroke-width:14;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
}
.ringCenter {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.ringPct { font-size:42px; font-weight:700; line-height:1; }
.ringLabel { font-size:11px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
.ringSubLabel { font-size:13px; color:#666; margin-top:4px; font-family:'Cormorant Garamond',serif; }

/* Milestones */
.milestones {
  display:flex; gap:6px; width:100%; margin-bottom:32px;
}
.milestone {
  flex:1; padding:10px 6px; border-radius:12px;
  background:#0f0f0f; border:1px solid #1a1a1a;
  text-align:center; transition:all 0.3s;
}
.milestone.reached { background:#0a1a0a; border-color:#00ff8840; }
.milestone.reached.warning { background:#1a1000; border-color:#ffaa0040; }
.milestone.reached.danger { background:#1a0000; border-color:#ff444040; }
.ms-pct { font-size:13px; font-weight:700; color:#333; }
.milestone.reached .ms-pct { color:#00ff88; }
.milestone.reached.warning .ms-pct { color:#ffaa00; }
.milestone.reached.danger .ms-pct { color:#ff4444; }
.ms-icon { font-size:16px; margin-bottom:2px; }

/* Stats row */
.statsRow {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; margin-bottom:24px;
}
.statCard {
  padding:16px; background:#0f0f0f;
  border:1px solid #1a1a1a; border-radius:16px;
}
.statLabel { font-size:11px; color:#555; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.statValue { font-size:22px; font-weight:700; color:white; }
.statSub { font-size:11px; color:#444; margin-top:3px; }

/* Reset timer */
.resetBox {
  padding:14px 16px; background:#0f0f0f;
  border:1px solid #1a1a1a; border-radius:14px;
  display:flex; align-items:center; gap:12px;
  margin-bottom:24px;
}
.resetIcon { font-size:20px; flex-shrink:0; }
.resetText { font-size:13px; color:#666; }
.resetTime { font-size:15px; font-weight:600; color:#00ff88; }

/* Upgrade banner */
.upgradeBanner {
  padding:20px; background:#0a0f0a;
  border:1px solid #00ff8822; border-radius:16px;
  text-align:center; display:none;
}
.upgradeBanner.show { display:block; }
.upgradeTitle { font-size:15px; font-weight:700; margin-bottom:6px; }
.upgradeDesc { font-size:12px; color:#666; margin-bottom:14px; }
.upgradeBtn {
  display:inline-block; padding:10px 28px;
  background:linear-gradient(135deg,#00ff88,#00ccff);
  border-radius:20px; color:#000; font-size:13px;
  font-weight:700; text-decoration:none;
  font-family:'Josefin Sans',sans-serif; letter-spacing:1px;
}
</style>
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="theme.css">
  <script>
    (function(){
      var t = localStorage.getItem("datta_theme") || "dark"
      document.body.setAttribute("data-theme", ["dark","light","eye"].includes(t) ? t : "dark")
    })()
  </script>
</head>
<body>

<div class="topBar">
  <a href="index.html" class="backBtn">←</a>
  <div class="pageTitle">Usage</div>
</div>

<div class="page">
  <div class="planBadge">🌱 <span id="planName">Free Plan</span></div>

  <!-- Ring chart -->
  <div class="ringWrap">
    <div class="ringContainer">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="ringBg" cx="100" cy="100" r="86"/>
        <circle class="ringFill" id="msgRing" cx="100" cy="100" r="86"
          stroke="#00ff88"
          stroke-dasharray="540"
          stroke-dashoffset="540"/>
      </svg>
      <div class="ringCenter">
        <div class="ringPct" id="pctText">0%</div>
        <div class="ringLabel">Used</div>
        <div class="ringSubLabel" id="usedText">0 of 50</div>
      </div>
    </div>
  </div>

  <!-- Milestones -->
  <div class="milestones">
    <div class="milestone" id="ms25">
      <div class="ms-icon">🔔</div>
      <div class="ms-pct">25%</div>
    </div>
    <div class="milestone" id="ms50">
      <div class="ms-icon">⚡</div>
      <div class="ms-pct">50%</div>
    </div>
    <div class="milestone" id="ms90">
      <div class="ms-icon">⚠️</div>
      <div class="ms-pct">90%</div>
    </div>
    <div class="milestone" id="ms100">
      <div class="ms-icon">🔒</div>
      <div class="ms-pct">100%</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="statsRow">
    <div class="statCard">
      <div class="statLabel">Messages left</div>
      <div class="statValue" id="msgsLeft">50</div>
      <div class="statSub" id="msgsLeftSub">of 50 today</div>
    </div>
    <div class="statCard">
      <div class="statLabel">Total sent</div>
      <div class="statValue" id="totalMsgs">0</div>
      <div class="statSub">all time</div>
    </div>
  </div>

  <!-- Reset timer -->
  <div class="resetBox" id="resetBox" style="display:none;">
    <div class="resetIcon">⏱️</div>
    <div>
      <div class="resetText">Resets in</div>
      <div class="resetTime" id="resetTimer">—</div>
    </div>
  </div>

  <!-- Upgrade -->
  <div class="upgradeBanner" id="upgradeBanner">
    <div class="upgradeTitle">You're running low!</div>
    <div class="upgradeDesc">Upgrade to Pro for 100 messages every 4 hours + image generation</div>
    <a href="pricing.html" class="upgradeBtn">⚡ Upgrade Plan</a>
  </div>
</div>

<script>
const SERVER = "https://datta-ai-server.onrender.com"

function getToken() { return localStorage.getItem("datta_token") }

function getRingColor(pct) {
  if (pct >= 90) return "#ff4444"
  if (pct >= 50) return "#ffaa00"
  return "#00ff88"
}

function updateMilestones(pct) {
  const ms = [
    { id:"ms25", threshold:25, cls:"" },
    { id:"ms50", threshold:50, cls:"warning" },
    { id:"ms90", threshold:90, cls:"danger" },
    { id:"ms100", threshold:100, cls:"danger" }
  ]
  ms.forEach(m => {
    const el = document.getElementById(m.id)
    el.classList.remove("reached","warning","danger")
    if (pct >= m.threshold) {
      el.classList.add("reached")
      if (m.cls) el.classList.add(m.cls)
    }
  })
}

function animateRing(pct) {
  const circumference = 540
  const offset = circumference - (pct / 100) * circumference
  const ring = document.getElementById("msgRing")
  const color = getRingColor(pct)
  ring.style.stroke = color
  setTimeout(() => { ring.style.strokeDashoffset = offset }, 100)
  document.getElementById("pctText").style.color = color
}

function startResetTimer(waitMins) {
  const box = document.getElementById("resetBox")
  const timer = document.getElementById("resetTimer")
  if (!waitMins || waitMins <= 0) { box.style.display = "none"; return }
  box.style.display = "flex"
  let remaining = waitMins * 60
  function tick() {
    const h = Math.floor(remaining / 3600)
    const m = Math.floor((remaining % 3600) / 60)
    const s = remaining % 60
    timer.textContent = h > 0
      ? `${h}h ${m}m ${s}s`
      : m > 0 ? `${m}m ${s}s` : `${s}s`
    if (remaining <= 0) { location.reload(); return }
    remaining--
    setTimeout(tick, 1000)
  }
  tick()
}

async function loadUsage() {
  const token = getToken()
  if (!token) { window.location.href = "login.html"; return }

  try {
    const res = await fetch(SERVER + "/user/usage", {headers: {"Authorization": "Bearer " + token}})
    const data = await res.json()

    const plan = data.plan || "free"
    const used = data.messagesUsed || 0
    const limit = data.limit || 50
    const total = data.totalMessages || 0
    const waitMins = data.waitMins || 0

    const pct = Math.min(100, Math.round((used / limit) * 100))

    // Plan name
    const planNames = { free:"Free Plan", pro:"Pro Plan", max:"Max Plan", ultramax:"Ultra Max", basic:"Basic Plan" }
    document.getElementById("planName").textContent = planNames[plan] || "Free Plan"

    // Ring
    document.getElementById("pctText").textContent = pct + "%"
    document.getElementById("usedText").textContent = used + " of " + limit
    animateRing(pct)

    // Milestones
    updateMilestones(pct)

    // Stats
    document.getElementById("msgsLeft").textContent = Math.max(0, limit - used)
    document.getElementById("msgsLeftSub").textContent = "of " + limit + " this period"
    document.getElementById("totalMsgs").textContent = total

    // Reset timer
    startResetTimer(waitMins)

    // Upgrade banner at 90%+
    if (pct >= 90 && plan === "free") {
      document.getElementById("upgradeBanner").classList.add("show")
    }

  } catch(e) {
    console.error("Usage error:", e)
  }
}

loadUsage()
</script>
</body>
</html>
