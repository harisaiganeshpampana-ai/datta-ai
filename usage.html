<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage - Datta AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,Arial,sans-serif; }
body { background:#0a0a0a; color:white; min-height:100vh; }

.header {
  position:sticky; top:0; background:#111; border-bottom:1px solid #222;
  padding:14px 20px; display:flex; align-items:center; gap:14px; z-index:100;
}
.backBtn { background:#1e1e1e; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer; font-size:14px; }
.headerTitle { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

.container { max-width:680px; margin:0 auto; padding:24px 16px 60px; }

/* PLAN CARD */
.planCard {
  background:#111; border:1px solid #222; border-radius:20px;
  padding:20px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between;
}
.planInfo { }
.planName { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; letter-spacing:0.5px; }
.planSub { font-size:13px; color:#666; margin-top:2px; }
.planBadge { padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; }
.badge-free { background:#0a2a1a; color:#00ff88; border:1px solid #00ff8833; }
.badge-pro { background:#1a1a0a; color:#ffaa00; border:1px solid #ffaa0033; }
.badge-max { background:#0a0a2a; color:#aa66ff; border:1px solid #aa66ff33; }
.badge-ultramax { background:#2a0a1a; color:#ff44aa; border:1px solid #ff44aa33; }

/* SECTION */
.sectionLabel { font-size:11px; color:#555; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin:20px 0 10px; }

/* USAGE CARD */
.usageCard { background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:18px; margin-bottom:10px; }
.usageHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.usageTitle { font-size:15px; font-weight:600; color:#ddd; display:flex; align-items:center; gap:8px; }
.usageCount { font-size:13px; color:#666; }
.progressBar { background:#1a1a1a; border-radius:20px; height:8px; overflow:hidden; margin-bottom:8px; }
.progressFill { height:100%; border-radius:20px; transition:width 1s ease; }
.progressGreen { background:linear-gradient(90deg,#00ff88,#00ccff); }
.progressPurple { background:linear-gradient(90deg,#aa44ff,#ff44aa); }
.progressRed { background:linear-gradient(90deg,#ff4444,#ff8844); }
.progressOrange { background:linear-gradient(90deg,#ff8800,#ffcc00); }
.usageMeta { font-size:12px; color:#555; }

/* STATS GRID */
.statsGrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.statCard { background:#111; border:1px solid #1e1e1e; border-radius:14px; padding:16px; text-align:center; }
.statValue { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; background:linear-gradient(135deg,#00ff88,#00ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.statLabel { font-size:11px; color:#555; margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

/* RESET TIMER */
.resetCard { background:#0a1a0a; border:1px solid #00ff8822; border-radius:14px; padding:16px; display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.resetIcon { font-size:24px; }
.resetText { flex:1; }
.resetTitle { font-size:14px; font-weight:600; color:#00ff88; }
.resetSub { font-size:12px; color:#555; margin-top:2px; }
.resetTime { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:#00ff88; }

/* UPGRADE CTA */
.upgradeCta {
  background:linear-gradient(135deg,#0a2a1a,#0a1a2a); border:1px solid #00ff8822;
  border-radius:16px; padding:20px; text-align:center; margin-top:16px;
}
.upgradeTitle { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; margin-bottom:6px; }
.upgradeSub { font-size:13px; color:#666; margin-bottom:16px; }
.upgradeBtn { padding:12px 32px; background:linear-gradient(135deg,#00cc6a,#00aaff); border:none; border-radius:20px; color:white; font-size:14px; font-weight:700; cursor:pointer; font-family:'Rajdhani',sans-serif; letter-spacing:0.5px; }

.loading { text-align:center; color:#555; padding:40px; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <button class="backBtn" onclick="window.location.href='settings.html'">← Back</button>
  <div class="headerTitle">Your Usage</div>
</div>

<div class="container">
  <div id="content"><div class="loading">⏳ Loading your usage...</div></div>
</div>

<script>
const SERVER = "https://datta-ai-server.onrender.com"
function getToken() { return localStorage.getItem("datta_token") || "" }

function formatTime(ms) {
  if (!ms || ms <= 0) return "Now"
  if (ms > 365 * 24 * 60 * 60 * 1000) return "Never"
  const mins = Math.ceil(ms / 60000)
  if (mins < 60) return mins + " min"
  const hrs = Math.ceil(mins / 60)
  if (hrs > 999) return "Never"
  return hrs + " hr" + (hrs > 1 ? "s" : "")
}

function getPlanBadge(plan) {
  const badges = {
    free: 'badge-free', pro: 'badge-pro',
    max: 'badge-max', ultramax: 'badge-ultramax'
  }
  return badges[plan] || 'badge-free'
}

function getPlanName(plan) {
  const names = { free:"Free Plan", pro:"Pro Plan", max:"Max Plan", ultramax:"Ultra Max Plan" }
  return names[plan] || "Free Plan"
}

function getPlanEmoji(plan) {
  const emojis = { free:"🌱", pro:"⚡", max:"🚀", ultramax:"👑" }
  return emojis[plan] || "🌱"
}

async function loadUsage() {
  try {
    const res = await fetch(SERVER + "/user/usage?token=" + getToken())
    if (!res.ok) throw new Error("Failed")
    const d = await res.json()

    const plan = d.plan || "free"
    const msgUsed = d.messagesUsed || 0
    const imgUsed = d.imagesUsed || 0
    const msgLimit = d.limits?.messages || 25
    const imgLimit = d.limits?.images || 3
    const totalMsgs = d.totalMessagesEver || 0
    const totalImgs = d.totalImagesEver || 0
    const resetIn = d.resetIn || 0

    const msgPct = msgLimit >= 999999 ? 0 : Math.min(100, Math.round(msgUsed / msgLimit * 100))
    const imgPct = imgLimit >= 999999 ? 0 : Math.min(100, Math.round(imgUsed / (imgLimit || 3) * 100))

    const msgColor = msgPct > 80 ? "progressRed" : msgPct > 50 ? "progressOrange" : "progressGreen"
    const imgColor = imgPct > 80 ? "progressRed" : imgPct > 50 ? "progressOrange" : "progressPurple"

    const msgLimitText = msgLimit >= 999999 ? "Unlimited" : msgLimit
    const imgLimitText = imgLimit >= 999999 ? "Unlimited" : imgLimit

    document.getElementById("content").innerHTML = `

      <!-- PLAN CARD -->
      <div class="planCard">
        <div class="planInfo">
          <div class="planName">${getPlanEmoji(plan)} ${getPlanName(plan)}</div>
          <div class="planSub">Active subscription</div>
        </div>
        <div class="planBadge ${getPlanBadge(plan)}">${plan.toUpperCase()}</div>
      </div>

      <!-- STATS -->
      <div class="sectionLabel">All Time Stats</div>
      <div class="statsGrid">
        <div class="statCard">
          <div class="statValue">${totalMsgs.toLocaleString()}</div>
          <div class="statLabel">Total Messages</div>
        </div>
        <div class="statCard">
          <div class="statValue">${totalImgs.toLocaleString()}</div>
          <div class="statLabel">Images Generated</div>
        </div>
      </div>

      <!-- CURRENT USAGE -->
      <div class="sectionLabel">Current Period Usage</div>

      <div class="usageCard">
        <div class="usageHeader">
          <div class="usageTitle">💬 Messages</div>
          <div class="usageCount">${msgUsed} / ${msgLimitText}</div>
        </div>
        <div class="progressBar">
          <div class="progressFill ${msgColor}" id="msgBar" style="width:0%"></div>
        </div>
        <div class="usageMeta">
          ${msgPct >= 100 ? "⚠️ Limit reached" : msgPct + "% used this period"}
          ${plan === "free" && totalMsgs >= 25 ? " · 8 msg/session after first 25" : ""}
        </div>
      </div>

      <div class="usageCard">
        <div class="usageHeader">
          <div class="usageTitle">🎨 Images</div>
          <div class="usageCount">${imgUsed} / ${imgLimitText}</div>
        </div>
        <div class="progressBar">
          <div class="progressFill ${imgColor}" id="imgBar" style="width:0%"></div>
        </div>
        <div class="usageMeta">${imgPct >= 100 ? "⚠️ Limit reached" : imgPct + "% used today"}</div>
      </div>

      ${plan !== "free" && resetIn > 0 ? `
      <div class="resetCard">
        <div class="resetIcon">⏰</div>
        <div class="resetText">
          <div class="resetTitle">Resets in</div>
          <div class="resetSub">Your message limit refreshes automatically</div>
        </div>
        <div class="resetTime">${formatTime(resetIn)}</div>
      </div>` : plan === "free" ? `
      <div class="resetCard" style="background:#1a0a00;border-color:#ff880022;">
        <div class="resetIcon">⚠️</div>
        <div class="resetText">
          <div class="resetTitle" style="color:#ff8844;">Free Plan Limit</div>
          <div class="resetSub">First 25 messages free · then 8 per session · never fully resets</div>
        </div>
      </div>` : ""}

      ${plan === "free" ? `
      <div class="upgradeCta">
        <div class="upgradeTitle">🚀 Need More?</div>
        <div class="upgradeSub">Upgrade to Pro for 100 messages per session and 20 images daily</div>
        <button class="upgradeBtn" onclick="window.location.href='pricing.html'">Upgrade Plan →</button>
      </div>` : ""}
    `

    // Animate bars
    setTimeout(() => {
      document.getElementById("msgBar").style.width = (msgLimit >= 999999 ? 5 : msgPct) + "%"
      document.getElementById("imgBar").style.width = (imgLimit >= 999999 ? 5 : imgPct) + "%"
    }, 100)

  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="loading">Could not load usage. Please try again.</div>'
  }
}

window.addEventListener("load", function() {
  if (!getToken()) { window.location.href = "login.html"; return }
  loadUsage()
})
</script>
</body>
</html>
