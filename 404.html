<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - Datta AI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:white; font-family:system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; }
.logo { font-family:serif; font-size:28px; font-weight:900; background:linear-gradient(135deg,#00ff88,#00ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px; margin-bottom:40px; }
.code { font-size:80px; font-weight:900; background:linear-gradient(135deg,#00ff88,#00ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; margin-bottom:16px; }
.title { font-size:22px; font-weight:700; margin-bottom:10px; }
.sub { font-size:14px; color:#666; margin-bottom:36px; }
.btn { display:inline-block; padding:13px 28px; background:linear-gradient(135deg,#00cc6a,#00aaff); border-radius:20px; color:white; font-size:15px; font-weight:700; text-decoration:none; margin:6px; }
.btn2 { display:inline-block; padding:12px 28px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:20px; color:#aaa; font-size:15px; text-decoration:none; margin:6px; }
</style>
<script>
// Redirect to home — NO query params to prevent 414 loop
// Guard: if already redirecting (has ?redirect= in URL) do nothing
var search = window.location.search
if (search.includes("redirect=")) {
  // Already in a redirect loop — stop immediately, just show 404 page
  console.warn("Redirect loop detected — stopping")
} else {
  // Simple redirect to home, no URL appending
  setTimeout(function() {
    window.location.href = "/datta-ai/"
  }, 2000)
}
</script>
</head>
<body>
<div class="logo">DATTA AI</div>
<div class="code">404</div>
<div class="title">Page not found</div>
<div class="sub">Redirecting you back to Datta AI in 3 seconds...</div>
<a href="/datta-ai/" class="btn">← Go to Datta AI</a>
<a href="/datta-ai/index.html" class="btn2">Open Chat</a>
</body>
</html>
