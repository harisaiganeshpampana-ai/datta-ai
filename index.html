<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111;
padding:20px;
border-right:1px solid #222;
}

.newChat{
background:#2ecc71;
border:none;
padding:10px;
border-radius:8px;
width:100%;
color:white;
cursor:pointer;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CENTER START SCREEN */

.start{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.startInput{
display:flex;
width:500px;
max-width:90%;
}

.startInput input{
flex:1;
padding:14px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
margin:auto;
display:none;
}

/* MESSAGE BUBBLES */

.ai{
background:#1e1e1e;
padding:12px 16px;
border-radius:12px;
margin:10px 0;
max-width:600px;
line-height:1.6;
}

.user{
background:#2ecc71;
padding:10px 14px;
border-radius:14px;
margin:10px 0;
max-width:320px;
margin-left:auto;
}

/* INPUT BAR */

.inputArea{
display:flex;
padding:15px;
border-top:1px solid #222;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* SEND BUTTON */

.sendBtn{
margin-left:10px;
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;
}

/* AI LOADING */

.aiLoading{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.logo{
width:30px;
height:30px;
border-radius:50%;
}

.loader{
width:30px;
height:30px;
border:3px solid #2ecc71;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style></head><body><div class="sidebar">
<button class="newChat" onclick="location.reload()">+ New Chat</button>
</div><div class="main"><!-- START PAGE --><div class="start" id="startScreen"><img src="logo.jpeg" width="70"><h2>What’s on the agenda today?</h2><div class="startInput">
<input id="startMessage" placeholder="Ask anything">
</div></div><!-- CHAT AREA --><div id="chat"></div><!-- BOTTOM INPUT --><div class="inputArea">
<input id="message" placeholder="Ask anything">
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div></div><script>

/* ENTER KEY SUPPORT */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

if(document.activeElement.id==="startMessage"){

document.getElementById("message").value =
document.getElementById("startMessage").value

sendMessage()

}

else if(document.activeElement.id==="message"){

sendMessage()

}

}

})

async function sendMessage(){

const input=document.getElementById("message")
const chat=document.getElementById("chat")
const start=document.getElementById("startScreen")

const text=input.value.trim()

if(text==="") return

start.style.display="none"
chat.style.display="block"

chat.innerHTML+=`<div class="user">${text}</div>`

input.value=""

/* LOADING WITH LOGO */

chat.innerHTML+=`
<div class="aiLoading" id="thinking">
<img src="logo.jpeg" class="logo">
<div class="loader"></div>
</div>
`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error"

}

}

</script></body>
</html>
