<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* CENTER START SCREEN */

.start{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.start img{
width:80px;
margin-bottom:20px;
}

.start input{
width:500px;
max-width:90%;
padding:14px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
width:100%;
margin:auto;
display:none;
}

/* USER MESSAGE */

.user{
background:#2ecc71;
padding:12px 16px;
border-radius:14px;
margin:12px 0;
max-width:320px;
margin-left:auto;
}

/* AI MESSAGE */

.ai{
background:#1e1e1e;
padding:12px 16px;
border-radius:12px;
margin:12px 0;
max-width:600px;
line-height:1.6;
}

/* BOTTOM INPUT */

.inputArea{
display:flex;
padding:15px;
border-top:1px solid #222;
display:none;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.sendBtn{
margin-left:10px;
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;
}

/* LOADING */

.loading{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.loader{
width:40px;
height:40px;
border:4px solid #2ecc71;
border-top:4px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
display:flex;
align-items:center;
justify-content:center;
}

.loader img{
width:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style></head><body><!-- START SCREEN --><div class="start" id="startScreen"><img src="logo.jpeg"><input id="startInput" placeholder="Ask anything"></div><!-- CHAT --><div id="chat"></div><!-- BOTTOM INPUT --><div class="inputArea" id="inputArea"><input id="message" placeholder="Ask anything"><button class="sendBtn" onclick="sendMessage()">➤</button>

</div><script>

/* ENTER KEY */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

if(document.activeElement.id==="startInput"){

document.getElementById("message").value=
document.getElementById("startInput").value

sendMessage()

}

else if(document.activeElement.id==="message"){

sendMessage()

}

}

})

async function sendMessage(){

const input=document.getElementById("message")
const startInput=document.getElementById("startInput")
const chat=document.getElementById("chat")
const start=document.getElementById("startScreen")
const inputArea=document.getElementById("inputArea")

let text=input.value || startInput.value

text=text.trim()

if(text==="") return

start.style.display="none"
chat.style.display="block"
inputArea.style.display="flex"

chat.innerHTML+=`<div class="user">${text}</div>`

input.value=""
startInput.value=""

/* LOADING WITH LOGO */

chat.innerHTML+=`
<div class="loading" id="thinking">
<div class="loader">
<img src="logo.jpeg">
</div>
</div>
`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error"

}

}

</script></body>
</html>
