<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
margin-bottom:20px;
}

.logo img{
width:28px;
}

.newchat{
background:#1e1e1e;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
font-size:14px;
}

.history div{
padding:8px;
cursor:pointer;
border-radius:5px;
}

.history div:hover{
background:#1e1e1e;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* START SCREEN */

.start{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.start img{
width:70px;
margin-bottom:10px;
}

.start h2{
margin:10px 0;
font-weight:500;
}

.start input{
width:500px;
max-width:90%;
padding:14px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* CHAT */

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
display:none;
}

.user{
text-align:right;
margin:14px 0;
}

.ai{
margin:14px 0;
line-height:1.6;
}

/* INPUT */

.inputArea{
display:none;
padding:15px;
border-top:1px solid #222;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
width:100%;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send{
width:40px;
height:40px;
border-radius:50%;
background:#2ecc71;
border:none;
color:white;
margin-left:10px;
cursor:pointer;
}

.loader{
margin:15px 0;
}

.spin{
width:24px;
height:24px;
border:3px solid #2ecc71;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style></head><body><div class="sidebar"><div class="logo">
<img src="logo.jpeg">
Datta AI
</div><button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history"></div></div><div class="main"><div id="start" class="start">
<img src="logo.jpeg">
<h2 id="welcome"></h2>
<input id="startInput" placeholder="Ask anything">
</div><div id="chat" class="chat"></div><div id="inputArea" class="inputArea">
<div class="inputWrap">
<input id="message" placeholder="Ask anything">
<button class="send" onclick="send()">➤</button>
</div>
</div></div><script>

/* USER NAME */

let username = localStorage.getItem("dattaUser")

if(!username){
username = prompt("Enter your name")
localStorage.setItem("dattaUser", username)
}

document.getElementById("welcome").innerText = "Hi " + username + ", how can I help you?"

/* CHAT STORAGE */

let chats = JSON.parse(localStorage.getItem("dattaChats")) || []
let currentChat = null

/* SIDEBAR */

function loadSidebar(){

const history=document.querySelector(".history")
history.innerHTML=""

chats.forEach((chat,index)=>{

let div=document.createElement("div")

div.innerText=chat.title

div.onclick=()=>openChat(index)

history.appendChild(div)

})

}

/* OPEN CHAT */

function openChat(index){

currentChat=chats[index]

const chat=document.getElementById("chat")
chat.innerHTML=""

document.getElementById("start").style.display="none"
chat.style.display="block"
document.getElementById("inputArea").style.display="block"

currentChat.messages.forEach(m=>{

if(m.role==="user"){
chat.innerHTML+=`<div class="user">${m.message}</div>`
}else{
chat.innerHTML+=`<div class="ai">${m.message}</div>`
}

})

}

/* NEW CHAT */

function newChat(){

currentChat={
title:"New Chat",
messages:[]
}

document.getElementById("chat").innerHTML=""
document.getElementById("start").style.display="flex"
document.getElementById("chat").style.display="none"
document.getElementById("inputArea").style.display="none"

}

/* ENTER KEY */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

if(document.activeElement.id==="startInput"){
document.getElementById("message").value=document.getElementById("startInput").value
send()
}

else if(document.activeElement.id==="message"){
send()
}

}

})

/* SEND */

async function send(){

const chat=document.getElementById("chat")
const start=document.getElementById("start")

const msgInput=document.getElementById("message")
const startInput=document.getElementById("startInput")

let text = msgInput.value || startInput.value
text=text.trim()

if(!text) return

start.style.display="none"
chat.style.display="block"
document.getElementById("inputArea").style.display="block"

chat.innerHTML+=`<div class="user">${text}</div>`

msgInput.value=""
startInput.value=""

chat.innerHTML+=`<div id="load" class="loader"><div class="spin"></div></div>`

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById("load").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

if(!currentChat){
currentChat={
title:text.substring(0,30),
messages:[]
}
chats.push(currentChat)
}

currentChat.messages.push({role:"user",message:text})
currentChat.messages.push({role:"ai",message:data.reply})

localStorage.setItem("dattaChats",JSON.stringify(chats))

loadSidebar()

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("load").innerText="Server error"

}

}

/* START */

loadSidebar()

</script></body>
</html>
