<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

input{
padding:10px;
width:60%;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

#messages{
margin-top:30px;
width:60%;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>

</head>

<body>

<h1>Datta AI</h1>
<p>Your AI assistant for learning and technology</p>

<input id="userInput" placeholder="Ask something...">
<button onclick="send()">Send</button>

<div id="messages"></div>

<script>

async function send(){

let input=document.getElementById("userInput").value;

let messages=document.getElementById("messages");

messages.innerHTML += "<p><b>You:</b> "+input+"</p>";

messages.innerHTML += "<p id='thinking'><b>Datta AI:</b> Thinking...</p>";

const response = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:input
})
});

const data = await response.json();

document.getElementById("thinking").innerHTML =
"<b>Datta AI:</b> "+data.reply;

}

</script>

</body>
</html>
