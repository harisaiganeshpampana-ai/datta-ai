<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>

<style>
body{
background:#0b1a33;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#messages{
background:#0f2345;
padding:20px;
border-radius:10px;
text-align:left;
min-height:200px;
margin-bottom:10px;
overflow:auto;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:#16a34a;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Datta AI</h1>

<div id="messages"></div>

<input id="userInput" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

const inputBox = document.getElementById("userInput");
const text = inputBox.value.trim();
if(!text) return;

const messages = document.getElementById("messages");

/* USER MESSAGE */
const userRow = document.createElement("div");
userRow.innerHTML = "<b>You:</b> " + text;
messages.appendChild(userRow);

/* AI PLACEHOLDER */
const aiRow = document.createElement("div");
aiRow.innerHTML = "<b>Datta AI:</b> Thinking...";
messages.appendChild(aiRow);

inputBox.value = "";

/* FORCE SCROLL */
messages.scrollTop = messages.scrollHeight;

try{

const res = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
}
);

const data = await res.json();

/* UPDATE ONLY THIS MESSAGE */
aiRow.innerHTML = "<b>Datta AI:</b> " + data.reply;

}catch(e){

aiRow.innerHTML = "<b>Datta AI:</b> Server error";

}

}

</script>

</body>
</html>
