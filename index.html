<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
margin-bottom:20px;
}

.logo img{
width:28px;
}

.newchat{
background:#1e1e1e;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
font-size:14px;
}

.history div{
padding:8px;
cursor:pointer;
border-radius:5px;
}

.history div:hover{
background:#1e1e1e;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
}

/* USER MESSAGE */

.user{
text-align:right;
margin:14px 0;
}

/* AI MESSAGE */

.ai{
margin:14px 0;
line-height:1.6;
}

/* START SCREEN */

.start{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.start input{
width:500px;
max-width:90%;
padding:14px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* INPUT AREA */

.inputArea{
display:none;
padding:15px;
border-top:1px solid #222;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send{
width:40px;
height:40px;
border-radius:50%;
background:#2ecc71;
border:none;
color:white;
margin-left:10px;
cursor:pointer;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
width:100%;
}

/* LOADER */

.loader{
margin:15px 0;
}

.spin{
width:24px;
height:24px;
border:3px solid #2ecc71;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style></head><body><!-- SIDEBAR --><div class="sidebar"><div class="logo">
<img src="logo.jpeg">
Datta AI
</div><button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history"></div></div><!-- MAIN --><div class="main"><div id="start" class="start">
<input id="startInput" placeholder="Ask anything">
</div><div id="chat" class="chat" style="display:none;"></div><div id="inputArea" class="inputArea"><div class="inputWrap"><input id="message" placeholder="Ask anything"><button class="send" onclick="send()">➤</button>

</div></div></div><script>

/* CHAT STORAGE */

let chats = JSON.parse(localStorage.getItem("dattaChats")) || []
let currentChat = []

/* LOAD SIDEBAR */

function loadSidebar(){

const history = document.querySelector(".history")

history.innerHTML=""

chats.forEach((chat,index)=>{

let div=document.createElement("div")

div.innerText = chat[0].message.substring(0,40)

div.onclick=()=>openChat(index)

history.appendChild(div)

})

}

/* OPEN OLD CHAT */

function openChat(index){

currentChat = chats[index]

const chat=document.getElementById("chat")

chat.innerHTML=""

document.getElementById("start").style.display="none"
chat.style.display="block"
document.getElementById("inputArea").style.display="block"

currentChat.forEach(m=>{

if(m.role==="user"){
chat.innerHTML+=`<div class="user">${m.message}</div>`
}else{
chat.innerHTML+=`<div class="ai">${m.message}</div>`
}

})

}

/* NEW CHAT */

function newChat(){

currentChat=[]

document.getElementById("chat").innerHTML=""

}

/* SAVE CHATS */

function saveChats(){

localStorage.setItem("dattaChats", JSON.stringify(chats))

}

/* ENTER KEY */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

if(document.activeElement.id==="startInput"){

document.getElementById("message").value =
document.getElementById("startInput").value

send()

}

else if(document.activeElement.id==="message"){

send()

}

}

})

/* SEND MESSAGE */

async function send(){

const start=document.getElementById("start")
const chat=document.getElementById("chat")
const inputArea=document.getElementById("inputArea")

const msgInput=document.getElementById("message")
const startInput=document.getElementById("startInput")

let text = msgInput.value || startInput.value

text=text.trim()

if(!text) return

start.style.display="none"
chat.style.display="block"
inputArea.style.display="block"

chat.innerHTML += `<div class="user">${text}</div>`

msgInput.value=""
startInput.value=""

/* LOADER */

chat.innerHTML+=`
<div class="loader" id="load">
<div class="spin"></div>
</div>
`

chat.scrollTop=chat.scrollHeight

try{

const res = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data = await res.json()

document.getElementById("load").remove()

chat.innerHTML += `<div class="ai">${data.reply}</div>`

/* SAVE CHAT */

currentChat.push({
role:"user",
message:text
})

currentChat.push({
role:"ai",
message:data.reply
})

if(!chats.includes(currentChat)){
chats.push(currentChat)
}

saveChats()
loadSidebar()

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("load").innerText="Server error"

}

}

/* LOAD CHATS ON START */

loadSidebar()

</script></body>
</html>
