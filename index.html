<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1e1e;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
transition:opacity .8s ease;
}

.big-logo{
width:120px;
margin-bottom:20px;
animation:logoIntro 1.6s ease;
}

#splash h1{
font-size:32px;
}

@keyframes logoIntro{
0%{opacity:0;transform:scale(.6);}
60%{opacity:1;transform:scale(1.05);}
100%{transform:scale(1);}
}

/* APP */

#app{
display:none;
width:100%;
height:100%;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111;
padding:15px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
transition:transform .3s ease;
}

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.logo img{
width:22px;
height:22px;
}

.logo span{
font-size:18px;
font-weight:bold;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:8px;
background:#222;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#333;
}

#chatHistory{
flex:1;
overflow-y:auto;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #333;
padding:10px;
position:relative;
}

.menu-btn{
position:absolute;
left:10px;
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

.title{
text-align:center;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* BUBBLES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

/* INPUT */

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #333;
}

#message{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
text-transform:capitalize;
}

.send-btn{
width:46px;
height:46px;
background:#00a67e;
border:none;
color:white;
cursor:pointer;
border-radius:50%;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */

@media (max-width:768px){

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
transform:translateX(-100%);
z-index:1000;
}

.sidebar.open{
transform:translateX(0);
}

}

</style>

</head>

<body>

<div id="splash">
<img src="logo.jpeg" class="big-logo">
<h1>Datta AI</h1>
</div>

<div id="app">

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
<span>Datta AI</span>
</div>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="chatHistory"></div>

</div>

<div class="main">

<div class="header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="title">
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script>

/* ENTER SEND */

document.getElementById("message").addEventListener("keypress",function(e){
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

/* SIDEBAR TOGGLE */

function toggleMenu(){

const sidebar=document.querySelector(".sidebar");

sidebar.classList.toggle("open");

}

/* STORAGE */

let chats=JSON.parse(localStorage.getItem("dattaChats"))||{};
let currentChat=null;

function saveChats(){
localStorage.setItem("dattaChats",JSON.stringify(chats));
}

/* SIDEBAR */

function renderSidebar(){

const history=document.getElementById("chatHistory");
history.innerHTML="";

for(const id in chats){

const btn=document.createElement("button");
btn.innerText=chats[id].title;
btn.onclick=()=>loadChat(id);

history.appendChild(btn);

}

}

/* NEW CHAT */

function newChat(){
currentChat=null;
document.getElementById("chatbox").innerHTML="";
}

/* LOAD CHAT */

function loadChat(id){

currentChat=id;

const chatbox=document.getElementById("chatbox");
chatbox.innerHTML="";

chats[id].messages.forEach(m=>{
chatbox.innerHTML+=`<div class="${m.role}">${m.text}</div>`;
});

}

/* TYPING EFFECT */

function typeText(el,text,speed=15){

let i=0;

function typing(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}

typing();

}

/* SEND */

async function sendMessage(){

const input=document.getElementById("message");
let message=input.value.trim();

if(!message) return;

message=message.charAt(0).toUpperCase()+message.slice(1);

const chatbox=document.getElementById("chatbox");

chatbox.innerHTML+=`<div class="user">${message}</div>`;

input.value="";

if(!currentChat){

currentChat=Date.now();

chats[currentChat]={
title:message.substring(0,40),
messages:[]
};

}

chats[currentChat].messages.push({
role:"user",
text:message
});

saveChats();
renderSidebar();

const thinkingId="t"+Date.now();

chatbox.innerHTML+=`<div class="ai" id="${thinkingId}">Datta AI is thinking...</div>`;

chatbox.scrollTop=chatbox.scrollHeight;

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
});

const data=await res.json();

document.getElementById(thinkingId).remove();

const aiDiv=document.createElement("div");
aiDiv.className="ai";
chatbox.appendChild(aiDiv);

typeText(aiDiv,data.reply);

chats[currentChat].messages.push({
role:"ai",
text:data.reply
});

saveChats();

}catch{

document.getElementById(thinkingId).innerText="Server error";

}

}

/* SPLASH */

setTimeout(()=>{

const splash=document.getElementById("splash");

splash.style.opacity="0";

setTimeout(()=>{
splash.style.display="none";
document.getElementById("app").style.display="flex";
},800);

},2000);

renderSidebar();

</script>

</body>
</html>
