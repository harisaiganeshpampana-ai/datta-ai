<!DOCTYPE html>
<html>

<head>
<title>Datta AI</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#chatbox{
border:1px solid white;
padding:10px;
height:400px;
overflow-y:auto;
text-align:left;
margin-bottom:10px;
}

.user{
color:#00ffcc;
margin:6px 0;
}

.ai{
color:white;
margin:6px 0;
}

.input-area{
display:flex;
gap:5px;
}

#message{
flex:1;
padding:8px;
font-size:16px;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Datta AI</h1>
<p>Testing page + Chat</p>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("message");
const chatbox = document.getElementById("chatbox");

const message = input.value;

if(message.trim() === "") return;

chatbox.innerHTML += "<div class='user'><b>You:</b> " + message + "</div>";

input.value = "";

chatbox.scrollTop = chatbox.scrollHeight;

try{

const response = await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data = await response.json();

chatbox.innerHTML += "<div class='ai'><b>Datta AI:</b> " + data.reply + "</div>";

chatbox.scrollTop = chatbox.scrollHeight;

}catch(err){

chatbox.innerHTML += "<div class='ai'>Server error</div>";

}

}

</script>

</body>
</html>
