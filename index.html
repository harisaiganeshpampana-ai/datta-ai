<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

/* APP LAYOUT */

#app{
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111;
padding:15px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
transition:transform .3s ease;
}

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.logo img{
width:22px;
height:22px;
}

.sidebar button{
padding:10px;
margin-bottom:8px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#333;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #333;
padding:10px;
position:relative;
}

.menu-btn{
position:absolute;
left:10px;
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGE */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:10px;
max-width:75%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:10px;
max-width:75%;
}

/* INPUT */

.input-area{
display:flex;
padding:10px;
border-top:1px solid #333;
background:#1e1e1e;
}

#message{
flex:1;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
}

.send-btn{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:20px;
margin-left:8px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
position:fixed;
top:0;
left:0;
height:100%;
transform:translateX(-100%);
z-index:1000;
}

.sidebar.open{
transform:translateX(0);
}

.main{
width:100%;
}

}

</style>
</head>

<body>

<div id="app">

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
<span>Datta AI</span>
</div>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="chatHistory"></div>

</div>

<div class="main">

<div class="header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div>
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something...">
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script>

/* ENTER SEND */

document.getElementById("message").addEventListener("keypress",function(e){
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

/* MENU */

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("open");
}

/* CHAT STORAGE */

let chats=JSON.parse(localStorage.getItem("dattaChats"))||{};
let currentChat=null;

function saveChats(){
localStorage.setItem("dattaChats",JSON.stringify(chats));
}

/* SIDEBAR */

function renderSidebar(){

const history=document.getElementById("chatHistory");
history.innerHTML="";

for(const id in chats){

const btn=document.createElement("button");
btn.innerText=chats[id].title;
btn.onclick=()=>loadChat(id);

history.appendChild(btn);

}

}

/* NEW CHAT */

function newChat(){
currentChat=null;
document.getElementById("chatbox").innerHTML="";
}

/* LOAD CHAT */

function loadChat(id){

currentChat=id;

const chatbox=document.getElementById("chatbox");
chatbox.innerHTML="";

chats[id].messages.forEach(m=>{
chatbox.innerHTML+=`<div class="${m.role}">${m.text}</div>`;
});

}

/* SEND MESSAGE */

async function sendMessage(){

const input=document.getElementById("message");
let message=input.value.trim();

if(!message) return;

message=message.charAt(0).toUpperCase()+message.slice(1);

const chatbox=document.getElementById("chatbox");

chatbox.innerHTML+=`<div class="user">${message}</div>`;

input.value="";

if(!currentChat){

currentChat=Date.now();

chats[currentChat]={
title:message.substring(0,40),
messages:[]
};

}

chats[currentChat].messages.push({
role:"user",
text:message
});

saveChats();
renderSidebar();

const thinkingId="t"+Date.now();

chatbox.innerHTML+=`<div class="ai" id="${thinkingId}">Datta AI is thinking...</div>`;

chatbox.scrollTop=chatbox.scrollHeight;

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
});

const data=await res.json();

document.getElementById(thinkingId).remove();

chatbox.innerHTML+=`<div class="ai">${data.reply}</div>`;

chats[currentChat].messages.push({
role:"ai",
text:data.reply
});

saveChats();

chatbox.scrollTop=chatbox.scrollHeight;

}catch{

document.getElementById(thinkingId).innerText="Server error";

}

}

renderSidebar();

</script>

</body>
</html>
