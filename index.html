<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:80px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

#chat{
display:none;
margin-top:30px;
}

input{
padding:10px;
width:60%;
}

#messages{
margin-top:20px;
text-align:left;
width:60%;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>Datta AI</h1>
<p>Your AI assistant for learning and technology</p>

<button onclick="startChat()">Start Chat</button>

<div id="chat">
<br>
<input id="userInput" placeholder="Ask something...">
<button onclick="send()">Send</button>

<div id="messages"></div>
</div>

<script>

function startChat(){
document.getElementById("chat").style.display="block";
}

function send(){

let input=document.getElementById("userInput").value;

let messages=document.getElementById("messages");

messages.innerHTML += "<p><b>You:</b> "+input+"</p>";
messages.innerHTML += "<p><b>Datta AI:</b> Thinking...</p>";

}

</script>

</body>
</html>
