<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;font-family:Arial;background:#0f0f0f;color:white;display:flex;height:100vh;}
.sidebar{width:230px;background:#151515;padding:15px;display:flex;flex-direction:column;}
.logo{display:flex;align-items:center;gap:10px;font-weight:bold;margin-bottom:20px;}
.logo img{width:26px;}
.newchat{background:#222;border:none;padding:10px;color:white;border-radius:6px;cursor:pointer;margin-bottom:20px;}

.history{flex:1;overflow:auto;}

.chatItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-radius:6px;
cursor:pointer;
}

.chatItem:hover{background:#222;}

.deleteBtn{
background:none;
border:none;
color:#ff6b6b;
cursor:pointer;
font-size:14px;
}

.main{flex:1;display:flex;flex-direction:column;}
.chat{flex:1;overflow:auto;padding:40px;max-width:900px;margin:auto;width:100%;}
.user{text-align:right;margin:12px 0;}
.ai{margin:12px 0;line-height:1.6;}

.inputArea{padding:15px;border-top:1px solid #222;}
.inputWrap{display:flex;max-width:900px;margin:auto;gap:10px;}

#message{flex:1;padding:12px;border-radius:25px;border:none;background:#1e1e1e;color:white;}

.send,.voice,.upload{
width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;color:white;
}

.send{background:#2ecc71;}
.voice{background:#3498db;}
.upload{background:#9b59b6;}

.ai button{
margin-left:8px;
cursor:pointer;
border:none;
background:#222;
color:white;
padding:4px 6px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
Datta AI
</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">
<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>
</div>

</div>

<script>

if(!localStorage.getItem("sessionId")){
localStorage.setItem("sessionId",Date.now().toString())
}

const sessionId = localStorage.getItem("sessionId")
const chatBox=document.getElementById("chat")

let currentChatId=null

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("message")
let text=input.value.trim()

if(!text) return

chatBox.innerHTML+=`<div class="user">${escapeHTML(text)}</div>`

input.value=""

let aiDiv=document.createElement("div")
aiDiv.className="ai"
aiDiv.innerHTML=`<span id="stream"></span>`   /* buttons removed here */

chatBox.appendChild(aiDiv)

scrollBottom()

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
sessionId:sessionId,
chatId:currentChatId
})
})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let streamText=""
let streamSpan=aiDiv.querySelector("#stream")

while(true){

const {done,value}=await reader.read()

if(done) break

const chunk=decoder.decode(value)

if(chunk.includes("__CHATID__")){

const parts=chunk.split("__CHATID__")

streamText+=parts[0]
streamSpan.innerHTML=escapeHTML(streamText)

currentChatId=parts[1]

}else{

streamText+=chunk
streamSpan.innerHTML=escapeHTML(streamText)

}

scrollBottom()

}

/* ADD VOICE BUTTONS AFTER ANSWER */

aiDiv.innerHTML+=`
<button onclick="speakText(this)">🗣</button>
<button onclick="stopVoice()">⏹</button>
`

loadSidebar()

}

/* LOAD SIDEBAR */

async function loadSidebar(){

const res=await fetch(
"https://datta-ai-server.onrender.com/chats/"+sessionId
)

const chats=await res.json()

const history=document.getElementById("history")
history.innerHTML=""

chats.forEach(chat=>{

let div=document.createElement("div")
div.className="chatItem"

div.innerHTML=`
<span onclick="openChat('${chat._id}')">${chat.title}</span>
<button class="deleteBtn" onclick="deleteChat(event,'${chat._id}')">🗑</button>
`

history.appendChild(div)

})

}

/* DELETE CHAT */

async function deleteChat(e,chatId){

e.stopPropagation()

if(!confirm("Delete this chat?")) return

await fetch(
"https://datta-ai-server.onrender.com/chat/"+chatId,
{method:"DELETE"}
)

if(currentChatId===chatId){
chatBox.innerHTML=""
currentChatId=null
}

loadSidebar()

}

/* OPEN CHAT */

async function openChat(chatId){

currentChatId=chatId
chatBox.innerHTML=""

const res=await fetch(
"https://datta-ai-server.onrender.com/chat/"+chatId
)

const messages=await res.json()

messages.forEach(m=>{

if(m.role==="user"){
chatBox.innerHTML+=`<div class="user">${escapeHTML(m.content)}</div>`
}else if(m.role==="assistant"){
chatBox.innerHTML+=`
<div class="ai">
${escapeHTML(m.content)}
<button onclick="speakText(this)">🗣</button>
<button onclick="stopVoice()">⏹</button>
</div>`
}

})

scrollBottom()

}

/* NEW CHAT */

function newChat(){
currentChatId=null
chatBox.innerHTML=""
}

/* VOICE READER */

function speakText(btn){

const text=btn.parentElement.innerText
.replace("🗣","")
.replace("⏹","")

const speech=new SpeechSynthesisUtterance(text)
speech.lang="en-US"

speechSynthesis.speak(speech)

}

function stopVoice(){
speechSynthesis.cancel()
}

/* VOICE INPUT */

function startAssistant(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-US"
recognition.start()

recognition.onresult=function(event){

const voiceText=event.results[0][0].transcript
document.getElementById("message").value=voiceText

send()

}

}

function uploadFile(){

const file=document.getElementById("file").files[0]

if(!file) return

alert("File uploaded: "+file.name)

}

function escapeHTML(str){
return str.replace(/[&<>"']/g,function(m){
return({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
})[m]
})
}

function scrollBottom(){
chatBox.scrollTop=chatBox.scrollHeight
}

document.getElementById("message").addEventListener("keydown",function(e){
if(e.key==="Enter"){send()}
})

loadSidebar()

</script>

</body>
</html>
