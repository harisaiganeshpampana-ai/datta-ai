<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

/* PAGE */

body{
background:black;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111;
padding:15px;
border-right:1px solid #333;
transition:0.3s;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#222;
color:white;
border:none;
cursor:pointer;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* MENU BUTTON */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
align-self:flex-start;
margin-bottom:10px;
}

/* CHATBOX */

#chatbox{
flex:1;
width:90%;
max-width:600px;
border:1px solid white;
padding:10px;
overflow-y:auto;
text-align:left;
}

/* MESSAGE STYLE */

.user{
color:#00ffcc;
margin:6px 0;
}

.ai{
color:white;
margin:6px 0;
}

/* INPUT AREA */

.input-area{
display:flex;
gap:5px;
padding:10px;
width:90%;
max-width:600px;
}

#message{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-250px;
top:0;
height:100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-btn{
display:block;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Datta AI</h2>

<button onclick="newChat()">+ New Chat</button>
<button>Search Chats</button>
<button>More</button>

<hr>

<div id="chatHistory"></div>

</div>


<!-- MAIN -->

<div class="main">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<h1>Datta AI</h1>
<p>Testing page + Chat</p>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>


<script>

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("active");
}

function newChat(){
document.getElementById("chatbox").innerHTML="";
}

async function sendMessage(){

const input=document.getElementById("message");
const chatbox=document.getElementById("chatbox");

const message=input.value;

if(message.trim()==="") return;

chatbox.innerHTML += "<div class='user'><b>You:</b> "+message+"</div>";

input.value="";

chatbox.scrollTop=chatbox.scrollHeight;

try{

const response=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await response.json();

chatbox.innerHTML += "<div class='ai'><b>Datta AI:</b> "+data.reply+"</div>";

chatbox.scrollTop=chatbox.scrollHeight;

}catch(err){

chatbox.innerHTML += "<div class='ai'>Server error</div>";

}

}

</script>

</body>
</html>
