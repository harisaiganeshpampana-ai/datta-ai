<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg" alt="Datta AI Logo">
<span>Datta AI</span>
</div>

<button class="newchat" onclick="newChat()">✏️ New Chat</button>

<input
id="search"
class="searchBox"
type="text"
placeholder="🔍 Search chats"
onkeyup="searchChats()"
>

<!-- CHAT HISTORY (auto generated by chat.js) -->

<div class="history" id="history"></div>

</div>

<!-- MAIN CHAT AREA -->

<div class="main">

<!-- WELCOME SCREEN (NEW FEATURE ADDED) -->

<div id="welcomeScreen" class="welcomeScreen">

<h1 class="welcomeTitle">Ask a question</h1>

<div class="suggestions">

<button onclick="fillPrompt('Help me stay focused at work')">
Help me stay focused at work
</button>

<button onclick="fillPrompt('Recommend something to watch today')">
Recommend something to watch today
</button>

<button onclick="fillPrompt('Write a friendly follow-up email')">
Write a friendly follow-up email
</button>

<button onclick="fillPrompt('Suggest a sleep schedule that works')">
Suggest a sleep schedule that works
</button>

</div>

</div>

<div class="chat" id="chat"></div>

<!-- INPUT AREA -->

<div class="inputArea">

<div class="inputWrap">

<input
id="message"
type="text"
placeholder="Ask anything"
autocomplete="off"
>

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input
type="file"
id="file"
hidden
onchange="uploadFile()"
>
</label>

</div>

</div>

</div>

<!-- LOAD SCRIPT (cache-buster added) -->

<script src="chat.js?v=4"></script>

</body>
</html>
