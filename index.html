<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Glowing ring around logo */
.splash-ring {
  position: relative;
  width: 150px;
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: splashPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
.splash-ring::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #00ff88, #00ccff, #0066ff, #00ff88);
  animation: spinRing 2s linear infinite;
  filter: blur(2px);
  opacity: 0.85;
}
.splash-ring::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: #000;
}
@keyframes spinRing {
  to { transform: rotate(360deg); }
}

.splash-logo {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 1;
}

@keyframes splashPop {
  0%   { transform: scale(0.2); opacity: 0; }
  70%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}

.splash-title {
  margin-top: 28px;
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(90deg, #00ff88, #00ccff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  animation: splashFadeUp 0.6s ease 0.7s forwards;
  letter-spacing: 1px;
}

.splash-subtitle {
  margin-top: 8px;
  font-size: 12px;
  color: #555;
  opacity: 0;
  letter-spacing: 4px;
  text-transform: uppercase;
  animation: splashFadeUp 0.6s ease 1s forwards;
}

@keyframes splashFadeUp {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}

.splash-dots {
  margin-top: 50px;
  display: flex;
  gap: 10px;
  opacity: 0;
  animation: splashFadeUp 0.4s ease 1.3s forwards;
}
.splash-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #333;
  animation: dotBounce 1s infinite ease-in-out;
}
.splash-dots span:nth-child(1) { animation-delay: 0s; }
.splash-dots span:nth-child(2) { animation-delay: 0.2s; }
.splash-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { background: #333; transform: scale(1); }
  40%            { background: #00ff88; transform: scale(1.5); box-shadow: 0 0 8px #00ff88; }
}


  40%            { background: white; transform: scale(1.4); }
}

#uploadBtn {
  background: transparent;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
  margin-right: 4px;
  padding: 0 6px;
  line-height: 1;
}

#filePreview {
  color: #aaa;
  font-size: 12px;
  margin-right: 6px;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: inline-block;
  vertical-align: middle;
}

#clearFile {
  background: transparent;
  border: none;
  color: #aaa;
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  display: none;
  vertical-align: middle;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-ring">
    <img class="splash-logo" src="logo.jpeg" alt="Datta AI Logo">
  </div>
  <div class="splash-title">Datta AI</div>
  <div class="splash-subtitle">Welcome</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <button onclick="toggleSidebar()" class="menuBtn">☰</button>
    <span class="topTitle">Datta AI</span>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="logo.jpeg" alt="Datta AI Logo">
        <span>Datta AI</span>
    </div>

    <button class="newchat" onclick="newChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
        </svg>
        <span>New Chat</span>
    </button>

    <!-- SEARCH -->
    <input 
        id="search" 
        class="searchBox" 
        type="text" 
        placeholder="Search chats" 
        onkeyup="searchChats()"
    >

    <div class="history" id="history"></div>

</div>

<!-- MAIN CHAT AREA -->
<div class="main">

    <!-- WELCOME -->
    <div id="welcomeScreen" class="welcomeScreen">
        <h1 class="welcomeTitle">Ask a question</h1>
    </div>

    <!-- CHAT -->
    <div class="chatWrapper">
        <div class="chat" id="chat"></div>
        <button id="scrollDownBtn">↓</button>
    </div>

    <!-- INPUT -->
    <div class="inputArea">
        <div class="inputWrap">

            <!-- FILE INPUT (hidden) - accepts ALL file types -->
            <input type="file" id="imageInput" accept="*/*" style="display: none;">

            <!-- Upload button -->
            <button id="uploadBtn" title="Attach file">+</button>

            <!-- File preview label -->
            <span id="filePreview"></span>
            <button id="clearFile" title="Remove file">✕</button>

            <!-- TEXT INPUT -->
            <input 
                id="message"
                type="text"
                placeholder="Ask Datta AI"
                autocomplete="off"
            >

            <button class="modeBtn">Fast</button>

            <button class="assistant" onclick="startAssistant()">
                <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
                    <line x1="6" y1="9" x2="6" y2="15"></line>
                    <line x1="10" y1="6" x2="10" y2="18"></line>
                    <line x1="14" y1="10" x2="14" y2="14"></line>
                    <line x1="18" y1="8" x2="18" y2="16"></line>
                </svg>
            </button>

            <button class="send" onclick="send()">
                <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>

        </div>
    </div>

</div>

<script src="chat.js?v=5"></script>

<script>
  const uploadBtn = document.getElementById("uploadBtn")
  const fileInput = document.getElementById("imageInput")
  const filePreview = document.getElementById("filePreview")
  const clearFile = document.getElementById("clearFile")

  // Open file picker on button click
  uploadBtn.addEventListener("click", () => {
    fileInput.click()
  })

  // Show file name after user selects a file
  fileInput.addEventListener("change", function () {
    const file = fileInput.files[0]
    if (!file) return
    filePreview.textContent = "📄 " + file.name
    clearFile.style.display = "inline"
  })

  // Clear selected file
  clearFile.addEventListener("click", () => {
    fileInput.value = ""
    filePreview.textContent = ""
    clearFile.style.display = "none"
  })
</script>


<script>
  window.addEventListener('load', function() {
    setTimeout(function() {
      document.getElementById('splash').classList.add('hide')
    }, 3000)
  })
</script>
</body>
</html>
