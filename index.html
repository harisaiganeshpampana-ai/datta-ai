<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

/* APP */

#app{
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111;
padding:15px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
transition:0.3s;
}

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.logo img{
width:22px;
height:22px;
}

.sidebar button{
padding:10px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #333;
padding:12px;
position:relative;
}

.menu{
position:absolute;
left:10px;
font-size:22px;
cursor:pointer;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:10px;
max-width:75%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:10px;
max-width:75%;
}

/* INPUT */

.input{
display:flex;
padding:10px;
border-top:1px solid #333;
background:#1e1e1e;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
}

.send{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:20px;
margin-left:8px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
transform:translateX(-100%);
z-index:1000;
}

.sidebar.open{
transform:translateX(0);
}

.main{
width:100%;
height:100vh;
}

.input{
position:fixed;
bottom:0;
left:0;
right:0;
}

#chatbox{
padding-bottom:80px;
}

}

</style>

</head>

<body>

<div id="app">

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
<span>Datta AI</span>
</div>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="history"></div>

</div>

<div class="main">

<div class="header">

<div class="menu" onclick="toggle()">☰</div>

<div>
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

</div>

<div id="chatbox"></div>

<div class="input">

<input id="msg" placeholder="Ask something...">

<button class="send" onclick="send()">➤</button>

</div>

</div>

</div>

<script>

document.getElementById("msg").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
})

function toggle(){
document.querySelector(".sidebar").classList.toggle("open")
}

/* CHAT STORAGE */

let chats=JSON.parse(localStorage.getItem("dattaChats"))||{}
let current=null

function save(){
localStorage.setItem("dattaChats",JSON.stringify(chats))
}

/* SIDEBAR */

function render(){

const box=document.getElementById("history")
box.innerHTML=""

for(const id in chats){

const b=document.createElement("button")
b.innerText=chats[id].title
b.onclick=()=>load(id)

box.appendChild(b)

}

}

/* NEW CHAT */

function newChat(){
current=null
document.getElementById("chatbox").innerHTML=""
}

/* LOAD */

function load(id){

current=id
const box=document.getElementById("chatbox")
box.innerHTML=""

chats[id].messages.forEach(m=>{
box.innerHTML+=`<div class="${m.role}">${m.text}</div>`
})

}

/* SEND */

async function send(){

const input=document.getElementById("msg")
let text=input.value.trim()

if(!text) return

text=text.charAt(0).toUpperCase()+text.slice(1)

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${text}</div>`

input.value=""

if(!current){

current=Date.now()

chats[current]={
title:text.substring(0,40),
messages:[]
}

}

chats[current].messages.push({role:"user",text})

save()
render()

const thinking="t"+Date.now()

chat.innerHTML+=`<div class="ai" id="${thinking}">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById(thinking).remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chats[current].messages.push({role:"ai",text:data.reply})

save()

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById(thinking).innerText="Server error"

}

}

render()

</script>

</body>
</html>
