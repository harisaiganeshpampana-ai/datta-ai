<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SPLASH SCREEN */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1e1e;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

.big-logo{
width:120px;
margin-bottom:20px;
}

#app{
display:none;
width:100%;
height:100%;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111;
padding:15px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.logo img{
width:22px;
height:22px;
border-radius:4px;
}

.logo span{
font-size:18px;
font-weight:bold;
}

/* BUTTONS */

.sidebar button{
width:100%;
padding:10px;
margin-bottom:8px;
background:#222;
color:white;
border:none;
cursor:pointer;
text-align:left;
border-radius:6px;
}

.sidebar button:hover{
background:#333;
}

#chatHistory{
flex:1;
overflow-y:auto;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #333;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGE BUBBLES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

/* INPUT */

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #333;
}

#message{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

.send-btn{
padding:12px 18px;
background:#00a67e;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

</style>

</head>


<body>

<!-- SPLASH SCREEN -->

<div id="splash">

<img src="logo.jpeg" class="big-logo">

<h1>Datta AI</h1>

</div>


<!-- MAIN APP -->

<div id="app">

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
<span>Datta AI</span>
</div>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="chatHistory"></div>

</div>


<div class="main">

<div class="header">
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something...">
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>

</div>


<script>

/* REMOVE OLD BROKEN CHATS */

localStorage.removeItem("dattaChats");


let chats = JSON.parse(localStorage.getItem("dattaChats")) || {};
let currentChat = null;


/* SAVE */

function saveChats(){

localStorage.setItem("dattaChats", JSON.stringify(chats));

}


/* SIDEBAR */

function renderSidebar(){

const history=document.getElementById("chatHistory");

history.innerHTML="";

for(const id in chats){

if(!chats[id].title) continue;

const btn=document.createElement("button");

btn.innerText=chats[id].title;

btn.onclick=()=>loadChat(id);

history.appendChild(btn);

}

}


/* NEW CHAT */

function newChat(){

currentChat=null;

document.getElementById("chatbox").innerHTML="";

}


/* LOAD CHAT */

function loadChat(id){

currentChat=id;

const chatbox=document.getElementById("chatbox");

chatbox.innerHTML="";

chats[id].messages.forEach(m=>{

chatbox.innerHTML+=`<div class="${m.role}">${m.text}</div>`;

});

}


/* SEND MESSAGE */

async function sendMessage(){

const input=document.getElementById("message");

const chatbox=document.getElementById("chatbox");

const message=input.value.trim();

if(!message) return;


chatbox.innerHTML+=`<div class="user">${message}</div>`;

input.value="";


/* CREATE CHAT AFTER FIRST MESSAGE */

if(!currentChat){

currentChat=Date.now();

chats[currentChat]={

title:message.substring(0,40),

messages:[]

};

}


/* SAVE USER MESSAGE */

chats[currentChat].messages.push({

role:"user",

text:message

});


saveChats();

renderSidebar();


const thinkingId="t"+Date.now();


chatbox.innerHTML+=`<div class="ai" id="${thinkingId}">Datta AI is thinking...</div>`;


chatbox.scrollTop=chatbox.scrollHeight;


try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message})

});


const data=await res.json();


document.getElementById(thinkingId).remove();


chatbox.innerHTML+=`<div class="ai">${data.reply}</div>`;


chats[currentChat].messages.push({

role:"ai",

text:data.reply

});


saveChats();


chatbox.scrollTop=chatbox.scrollHeight;


}catch(err){

document.getElementById(thinkingId).innerText="Server error";

}

}


/* STARTUP SCREEN */

setTimeout(()=>{

document.getElementById("splash").style.display="none";

document.getElementById("app").style.display="flex";

},2000);


renderSidebar();

</script>

</body>
</html>
