<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#1e1e1e;
color:white;

/* MOBILE SAFE HEIGHT */
height:100dvh;

display:flex;
flex-direction:column;
overflow:hidden;
}

/* INTRO ANIMATION */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1e1e;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
animation:fadeout 1s ease 2s forwards;
}

#intro img{
width:90px;
margin-bottom:10px;
}

@keyframes fadeout{
to{
opacity:0;
visibility:hidden;
}
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
padding:10px;
border-bottom:1px solid #333;
}

.header img{
width:24px;
margin-right:8px;
}

/* CHAT AREA */

#chatbox{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:110px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGE BUBBLES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

/* INPUT BAR */

.input{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
padding:10px;
border-top:1px solid #333;
background:#1e1e1e;
z-index:10;
}

#msg{
flex:1;
padding:12px;
border-radius:20px;
border:none;
font-size:16px;
outline:none;
}

.send{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:18px;
margin-left:8px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">
<img src="logo.jpeg">
<h2>Datta AI</h2>
</div>

<!-- HEADER -->

<div class="header">

<img src="logo.jpeg">

<b>Datta AI</b>

</div>

<!-- CHAT -->

<div id="chatbox">

<div class="ai">Hello! How can I assist you today?</div>

</div>

<!-- INPUT -->

<div class="input">

<input id="msg" placeholder="Ask anything...">

<button class="send" onclick="send()">➤</button>

</div>

<script>

/* ENTER KEY SEND */

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

const input=document.getElementById("msg")

let message=input.value.trim()

if(!message) return

message=message.charAt(0).toUpperCase()+message.slice(1)

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${message}</div>`

input.value=""

chat.innerHTML+=`<div class="ai" id="thinking">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error"

}

}

</script>

</body>
</html>
