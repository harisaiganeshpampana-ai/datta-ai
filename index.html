<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-ring">
    <img class="splash-logo" src="logo.jpeg" alt="Datta AI Logo">
  </div>
  <div class="splash-title">Datta AI</div>
  <div class="splash-subtitle">Welcome</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <button onclick="toggleSidebar()" class="menuBtn">☰</button>
  <span class="topTitle">Datta AI</span>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <!-- TOP: Logo + New Chat -->
  <div class="sidebarTop">
    <div class="sidebarBrand">Datta AI</div>
    <button class="newChatBtn" onclick="newChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="16"></line>
        <line x1="8" y1="12" x2="16" y2="12"></line>
      </svg>
      New chat
    </button>
  </div>

  <!-- NAV ITEMS -->
  <div class="sidebarNav">
    <button class="navItem active" onclick="showSection('chats')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Chats
    </button>
    <button class="navItem" onclick="showSection('projects')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"></rect>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
      </svg>
      Projects
    </button>
    <button class="navItem" onclick="showSection('artifacts')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
      Artifacts
    </button>
  </div>

  <div class="sidebarDivider"></div>

  <!-- RECENTS LABEL -->
  <div class="recentsLabel" id="recentsLabel">Recents</div>

  <!-- SEARCH -->
  <input id="search" class="searchBox" type="text" placeholder="Search chats" onkeyup="searchChats()">

  <!-- SECTIONS -->
  <div class="sidebarSection" id="section-chats">
    <div class="history" id="history"></div>
  </div>

  <div class="sidebarSection" id="section-projects" style="display:none;">
    <div class="emptySection">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5">
        <rect x="2" y="7" width="20" height="14" rx="2"></rect>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
      </svg>
      <p>No projects yet</p>
    </div>
  </div>

  <div class="sidebarSection" id="section-artifacts" style="display:none;">
    <div class="emptySection">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
      <p>No artifacts yet</p>
    </div>
  </div>

  <!-- BOTTOM USER PROFILE -->
  <div class="sidebarProfile" onclick="logout()">
    <div class="profileAvatar">G</div>
    <div class="profileInfo">
      <div class="profileName">Ganesh</div>
      <div class="profileSub">Free Plan</div>
    </div>
    <button class="profileSettings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

</div>

<!-- MAIN CHAT AREA -->
<div class="main">

  <!-- WELCOME -->
  <div id="welcomeScreen" class="welcomeScreen">
    <h1 class="welcomeTitle">Ask a question</h1>
  </div>

  <!-- CHAT -->
  <div class="chatWrapper">
    <div class="chat" id="chat"></div>
    <button id="scrollDownBtn">↓</button>
  </div>

  <!-- INPUT -->
  <div class="inputArea">
    <div class="inputWrap">

      <input type="file" id="imageInput" accept="image/*,.pdf,.txt,.csv,.js,.py,.html,.css,.json,.md,.doc,.docx" style="display:none;">
      <button id="uploadBtn" title="Attach file">+</button>
      <span id="filePreview"></span>
      <button id="clearFile" title="Remove file">✕</button>

      <input id="message" type="text" placeholder="Ask Datta AI" autocomplete="off">

      <button class="modeBtn">Fast</button>

      <button class="assistant" onclick="startAssistant()">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
          <line x1="6" y1="9" x2="6" y2="15"></line>
          <line x1="10" y1="6" x2="10" y2="18"></line>
          <line x1="14" y1="10" x2="14" y2="14"></line>
          <line x1="18" y1="8" x2="18" y2="16"></line>
        </svg>
      </button>

      <button class="send" onclick="send()">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>

    </div>
  </div>

</div>

<script src="chat.js?v=6"></script>

<script>
  // File upload
  const uploadBtn = document.getElementById("uploadBtn")
  const fileInput = document.getElementById("imageInput")
  const filePreview = document.getElementById("filePreview")
  const clearFileBtn = document.getElementById("clearFile")

  uploadBtn.addEventListener("click", () => fileInput.click())

  fileInput.addEventListener("change", function() {
    const file = fileInput.files[0]
    if (!file) return
    filePreview.textContent = "📄 " + file.name
    clearFileBtn.style.display = "inline"
  })

  clearFileBtn.addEventListener("click", () => {
    fileInput.value = ""
    filePreview.textContent = ""
    clearFileBtn.style.display = "none"
  })

  // Splash screen
  window.addEventListener("load", function() {
    setTimeout(function() {
      document.getElementById("splash").classList.add("hide")
    }, 3000)
  })
</script>

</body>
</html>
