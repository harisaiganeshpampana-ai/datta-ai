<script>

async function send(){

let inputBox = document.getElementById("userInput");
let input = inputBox.value.trim();

if(input==="") return;

let messages = document.getElementById("messages");

/* show user message */

let userMsg = document.createElement("p");
userMsg.innerHTML = "<b>You:</b> " + input;
messages.appendChild(userMsg);

/* create AI placeholder */

let aiMsg = document.createElement("p");
aiMsg.innerHTML = "<b>Datta AI:</b> Thinking...";
messages.appendChild(aiMsg);

inputBox.value = "";

try{

const response = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({message:input})
}
);

const data = await response.json();

/* update ONLY this message */

aiMsg.innerHTML = "<b>Datta AI:</b> " + data.reply;

}
catch(error){

aiMsg.innerHTML = "<b>Datta AI:</b> Server error";

}

}

</script>
