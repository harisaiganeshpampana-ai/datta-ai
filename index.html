<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111;
padding:20px;
box-sizing:border-box;
border-right:1px solid #222;
}

.sidebar h2{
font-size:16px;
margin-bottom:20px;
}

.newChat{
background:#2ecc71;
border:none;
padding:10px;
border-radius:8px;
width:100%;
cursor:pointer;
color:white;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* START SCREEN */

.start{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.start h1{
font-size:28px;
margin-bottom:20px;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
width:100%;
margin:auto;
display:none;
}

/* MESSAGES */

.ai{
background:#1e1e1e;
padding:12px 16px;
border-radius:12px;
margin:10px 0;
max-width:600px;
line-height:1.6;
}

.user{
background:#2ecc71;
padding:10px 14px;
border-radius:14px;
margin:10px 0;
max-width:320px;
margin-left:auto;
}

/* INPUT */

.inputArea{
display:flex;
padding:15px;
border-top:1px solid #222;
}

#message{
flex:1;
padding:12px 16px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.sendBtn{
margin-left:10px;
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;
}

</style></head><body><div class="sidebar">
<h2>Datta AI</h2>
<button class="newChat" onclick="location.reload()">+ New Chat</button>
</div><div class="main"><div class="start" id="startScreen">
<h1>What’s on the agenda today?</h1>
</div><div id="chat"></div><div class="inputArea">
<input id="message" placeholder="Ask anything">
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div></div><script>

async function sendMessage(){

const input=document.getElementById("message")
const chat=document.getElementById("chat")
const start=document.getElementById("startScreen")

const text=input.value.trim()

if(text==="") return

start.style.display="none"
chat.style.display="block"

chat.innerHTML+=`<div class="user">${text}</div>`

input.value=""

chat.innerHTML+=`<div class="ai" id="thinking">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error. Try again."

}

}

</script></body>
</html>
