<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#messages{
border:1px solid white;
padding:10px;
min-height:200px;
text-align:left;
margin-bottom:10px;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px 16px;
}
</style>
</head>

<body>

<h1>Datta AI</h1>
<p>Testing page + Chat</p>

<button onclick="test()">Test Button</button>
<p id="testmsg"></p>

<div class="container">

<div id="messages"></div>

<input id="userInput" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

/* TEST BUTTON (proves JS works) */

function test(){
document.getElementById("testmsg").innerText="Javascript working";
}


/* CHAT FUNCTION */

async function sendMessage(){

const inputBox = document.getElementById("userInput");
const text = inputBox.value.trim();

if(text==="") return;

const messages = document.getElementById("messages");

/* USER MESSAGE */

const user = document.createElement("p");
user.innerHTML = "<b>You:</b> " + text;
messages.appendChild(user);

/* AI PLACEHOLDER */

const ai = document.createElement("p");
ai.innerHTML = "<b>Datta AI:</b> Thinking...";
messages.appendChild(ai);

inputBox.value="";

try{

const response = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
}
);

const data = await response.json();

/* UPDATE MESSAGE */

ai.innerHTML = "<b>Datta AI:</b> " + data.reply;

}catch(err){

ai.innerHTML = "<b>Datta AI:</b> Server error";

}

}

</script>

</body>
</html>
