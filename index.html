<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>
body{
background:#0b1a33;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#messages{
background:#0f2345;
padding:20px;
border-radius:10px;
text-align:left;
min-height:200px;
margin-bottom:10px;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:#16a34a;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Datta AI</h1>
<p>Your AI assistant</p>

<div id="messages"></div>

<input id="userInput" placeholder="Ask something..." />
<button onclick="send()">Send</button>

</div>

<script>

async function send(){

const inputBox = document.getElementById("userInput");
const text = inputBox.value.trim();

if(!text) return;

const messages = document.getElementById("messages");

/* user message */

const user = document.createElement("p");
user.innerHTML = "<b>You:</b> "+text;
messages.appendChild(user);

/* ai placeholder */

const ai = document.createElement("p");
ai.innerHTML = "<b>Datta AI:</b> Thinking...";
messages.appendChild(ai);

inputBox.value="";

try{

const res = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
}
);

const data = await res.json();

/* update correct message */

ai.innerHTML = "<b>Datta AI:</b> "+data.reply;

}catch(err){

ai.innerHTML = "<b>Datta AI:</b> Server error";

}

}

</script>

</body>
</html>
