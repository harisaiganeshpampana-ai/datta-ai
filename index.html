<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;font-family:Arial;background:#0f0f0f;color:white;display:flex;height:100vh;}

.sidebar{
width:240px;
background:#151515;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
margin-bottom:15px;
}

.logo img{width:26px;}

.newchat{
background:#222;
border:none;
padding:10px;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
display:flex;
align-items:center;
gap:8px;
}

.searchBox{
background:#1e1e1e;
border:none;
padding:8px;
border-radius:6px;
color:white;
margin-bottom:10px;
}

.sectionTitle{
font-size:12px;
color:#aaa;
margin-bottom:6px;
}

.history{
flex:1;
overflow:auto;
}

.chatItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.chatItem:hover{background:#222;}

.deleteBtn{
background:none;
border:none;
color:#ff6b6b;
cursor:pointer;
font-size:14px;
}

.main{flex:1;display:flex;flex-direction:column;}

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
}

/* MESSAGE LAYOUT */

.messageRow{
display:flex;
gap:10px;
margin:16px 0;
align-items:flex-start;
}

.userRow{
justify-content:flex-end;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#333;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.userBubble{
background:#2ecc71;
color:black;
padding:10px 14px;
border-radius:14px;
max-width:70%;
}

.aiBubble{
background:#1e1e1e;
padding:10px 14px;
border-radius:14px;
max-width:70%;
}

/* HIDE BUTTONS UNTIL HOVER */

.aiBubble button{
opacity:0;
transition:0.2s;
}

.aiBubble:hover button{
opacity:1;
}

.copyBtn{
margin-left:6px;
background:#333;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
padding:2px 6px;
font-size:12px;
}

.inputArea{
padding:15px;
border-top:1px solid #222;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
gap:10px;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send,.voice,.upload{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
color:white;
}

.send{background:#2ecc71;}
.voice{background:#3498db;}
.upload{background:#9b59b6;}

.ai button{
margin-left:8px;
cursor:pointer;
border:none;
background:#222;
color:white;
padding:4px 6px;
border-radius:5px;
}

/* LOADING ANIMATION */

.typing span{
height:6px;
width:6px;
background:#aaa;
border-radius:50%;
display:inline-block;
margin:2px;
animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
Datta AI
</div>

<button class="newchat" onclick="newChat()">✏️ New Chat</button>

<input
id="search"
class="searchBox"
placeholder="🔍 Search chats"
onkeyup="searchChats()"
/>

<div class="sectionTitle">Your Chats</div>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">
<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>
</div>

</div>

<script>

/* YOUR ORIGINAL JAVASCRIPT IS COMPLETELY UNCHANGED */

if(!localStorage.getItem("sessionId")){
localStorage.setItem("sessionId",Date.now().toString())
}

const sessionId = localStorage.getItem("sessionId")
const chatBox=document.getElementById("chat")

let currentChatId=null

async function send(){

const input=document.getElementById("message")
let text=input.value.trim()

if(!text) return

chatBox.innerHTML+=`
<div class="messageRow userRow">
<div class="userBubble">${escapeHTML(text)}</div>
<div class="avatar">🧑</div>
</div>
`

input.value=""

let aiDiv=document.createElement("div")
aiDiv.className="messageRow"
aiDiv.innerHTML=`
<div class="avatar">🤖</div>
<div class="aiBubble typing">
<span></span><span></span><span></span>
</div>
`

chatBox.appendChild(aiDiv)

scrollBottom()

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
sessionId:sessionId,
chatId:currentChatId
})
})

aiDiv.innerHTML=`
<div class="avatar">🤖</div>
<div class="aiBubble">
<span id="stream"></span>
<button class="copyBtn" onclick="copyText(this)">📋</button>
<button onclick="speakText(this)">🗣</button>
<button onclick="stopVoice()">⏹</button>
</div>
`

const reader=res.body.getReader()
const decoder=new TextDecoder()

let streamText=""
let streamSpan=aiDiv.querySelector("#stream")

while(true){

const {done,value}=await reader.read()

if(done) break

const chunk=decoder.decode(value)

if(chunk.includes("__CHATID__")){

const parts=chunk.split("__CHATID__")

streamText+=parts[0]
streamSpan.innerHTML=escapeHTML(streamText)

currentChatId=parts[1]

}else{

streamText+=chunk
streamSpan.innerHTML=escapeHTML(streamText)

}

scrollBottom()

}

loadSidebar()

}

/* REST OF YOUR ORIGINAL FUNCTIONS CONTINUE... */

</script>

</body>
</html>
