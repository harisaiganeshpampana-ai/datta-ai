<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:10px;
padding:15px 20px;
border-bottom:1px solid #222;
}

.logo{
width:28px;
height:28px;
border-radius:6px;
}

.title{
font-size:18px;
font-weight:bold;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
width:100%;
margin:auto;
}

/* AI MESSAGE */

.ai{
background:#1e1e1e;
padding:12px 16px;
border-radius:12px;
margin:10px 0;
max-width:600px;
line-height:1.6;
}

/* USER MESSAGE */

.user{
background:#2ecc71;
padding:10px 14px;
border-radius:14px;
margin:10px 0;
max-width:320px;
margin-left:auto;
}

/* INPUT AREA */

.inputArea{
display:flex;
padding:15px;
border-top:1px solid #222;
background:#0f0f0f;
}

#message{
flex:1;
padding:12px 16px;
border-radius:25px;
border:none;
outline:none;
background:#1e1e1e;
color:white;
}

/* SEND BUTTON (ARROW STYLE) */

.sendBtn{
margin-left:10px;
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;
}

.sendBtn:hover{
opacity:0.9;
}

/* MOBILE */

@media(max-width:600px){

#chat{
padding:15px;
}

.ai{
max-width:90%;
}

.user{
max-width:80%;
}

}

</style></head><body><div class="header">
<img src="logo.jpeg" class="logo">
<div class="title">Datta AI</div>
</div><div id="chat">
<div class="ai">Hello! How can I assist you today?</div>
</div><div class="inputArea">
<input id="message" placeholder="Ask anything">
<button class="sendBtn" onclick="sendMessage()">➤</button>
</div><script>

async function sendMessage(){

const input=document.getElementById("message")
const chat=document.getElementById("chat")

const text=input.value.trim()

if(text==="") return

chat.innerHTML+=`<div class="user">${text}</div>`

input.value=""

chat.innerHTML+=`<div class="ai" id="thinking">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error. Try again."

}

}

</script></body>
</html>
