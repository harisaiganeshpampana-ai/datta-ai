<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#111;
padding:15px;
border-right:1px solid #333;
overflow-y:auto;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:8px;
background:#222;
color:white;
border:none;
cursor:pointer;
text-align:left;
}

.sidebar button:hover{
background:#333;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #333;
}

#chatbox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #333;
}

#message{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

.send-btn{
padding:12px 18px;
background:#00a67e;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Datta AI</h2>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="chatHistory"></div>

</div>


<div class="main">

<div class="header">
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something...">
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>


<script>

/* CLEAR BROKEN DATA */
if(localStorage.getItem("dattaChats") === "undefined"){
localStorage.removeItem("dattaChats");
}

let chats = JSON.parse(localStorage.getItem("dattaChats")) || {};
let currentChat = null;

/* SAVE */

function saveChats(){
localStorage.setItem("dattaChats", JSON.stringify(chats));
}

/* SIDEBAR */

function renderSidebar(){

const history=document.getElementById("chatHistory");
history.innerHTML="";

for(const id in chats){

if(!chats[id].title) continue;

const btn=document.createElement("button");

btn.innerText=chats[id].title;

btn.onclick=()=>loadChat(id);

history.appendChild(btn);

}

}

/* NEW CHAT */

function newChat(){

currentChat=null;

document.getElementById("chatbox").innerHTML="";

}

/* LOAD CHAT */

function loadChat(id){

currentChat=id;

const chatbox=document.getElementById("chatbox");

chatbox.innerHTML="";

chats[id].messages.forEach(m=>{
chatbox.innerHTML+=`<div class="${m.role}">${m.text}</div>`;
});

}

/* SEND MESSAGE */

async function sendMessage(){

const input=document.getElementById("message");
const chatbox=document.getElementById("chatbox");

const message=input.value.trim();

if(!message) return;

chatbox.innerHTML+=`<div class="user">${message}</div>`;

input.value="";

/* CREATE CHAT ONLY AFTER FIRST MESSAGE */

if(!currentChat){

currentChat=Date.now();

chats[currentChat]={

title:message.substring(0,40),

messages:[]

};

}

/* SAVE USER MESSAGE */

chats[currentChat].messages.push({

role:"user",

text:message

});

saveChats();
renderSidebar();

const thinkingId="t"+Date.now();

chatbox.innerHTML+=`<div class="ai" id="${thinkingId}">Datta AI is thinking...</div>`;

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message})

});

const data=await res.json();

document.getElementById(thinkingId).remove();

chatbox.innerHTML+=`<div class="ai">${data.reply}</div>`;

chats[currentChat].messages.push({

role:"ai",

text:data.reply

});

saveChats();

chatbox.scrollTop=chatbox.scrollHeight;

}catch(err){

document.getElementById(thinkingId).innerText="Server error";

}

}

renderSidebar();

</script>

</body>
</html>
