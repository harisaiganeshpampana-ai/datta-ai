<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#0f0f0f;color:white;display:flex;height:100vh;}

.sidebar{width:240px;background:#151515;padding:15px;display:flex;flex-direction:column;}

.logo{display:flex;align-items:center;gap:10px;font-weight:bold;margin-bottom:15px;}
.logo img{width:26px;}

.newchat{background:#222;border:none;padding:10px;color:white;border-radius:6px;cursor:pointer;margin-bottom:10px;}

.searchBox{background:#1e1e1e;border:none;padding:8px;border-radius:6px;color:white;margin-bottom:10px;}

.sectionTitle{font-size:12px;color:#aaa;margin-bottom:6px;}

.history{flex:1;overflow:auto;}

.chatItem{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:6px;cursor:pointer;font-size:14px;}
.chatItem:hover{background:#222;}

.chatActions{display:flex;align-items:center;gap:5px;position:relative;}

.menuBtn{background:none;border:none;color:white;cursor:pointer;font-size:16px;}

.chatMenu{display:none;position:absolute;right:0;top:22px;background:#1e1e1e;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.6);}

.chatMenu button{display:block;width:140px;padding:8px;background:none;border:none;color:white;text-align:left;cursor:pointer;}
.chatMenu button:hover{background:#333;}

.main{flex:1;display:flex;flex-direction:column;}

.chat{flex:1;overflow:auto;padding:40px;max-width:900px;margin:auto;width:100%;}

.messageRow{display:flex;gap:10px;margin:16px 0;align-items:flex-start;}

.userRow{justify-content:flex-end;}

.avatar{width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;}

.userBubble{background:#2ecc71;color:black;padding:10px 14px;border-radius:14px;max-width:70%;}

.aiBubble{background:#1e1e1e;padding:10px 14px;border-radius:14px;max-width:70%;}

.aiBubble button{opacity:0;transition:.2s;}
.aiBubble:hover button{opacity:1;}

.copyBtn{margin-left:6px;background:#333;border:none;color:white;cursor:pointer;border-radius:4px;padding:2px 6px;}

pre{background:#111;padding:12px;border-radius:8px;overflow:auto;}
code{color:#00ff9d;}

.inputArea{padding:15px;border-top:1px solid #222;}

.inputWrap{display:flex;max-width:900px;margin:auto;gap:10px;}

#message{flex:1;padding:12px;border-radius:25px;border:none;background:#1e1e1e;color:white;}

.send,.voice,.upload{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;color:white;}

.send{background:#2ecc71;}
.voice{background:#3498db;}
.upload{background:#9b59b6;}

.typing span{
height:6px;width:6px;background:#aaa;border-radius:50%;display:inline-block;margin:2px;
animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg"> Datta AI
</div>

<button class="newchat" onclick="newChat()">✏️ New Chat</button>

<input id="search" class="searchBox" placeholder="🔍 Search chats" onkeyup="searchChats()">

<div class="sectionTitle">Your Chats</div>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">
<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>
<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>
</div>

</div>

<script>

if(!localStorage.getItem("sessionId")){
localStorage.setItem("sessionId",Date.now().toString())
}

const sessionId=localStorage.getItem("sessionId")
const chatBox=document.getElementById("chat")

let currentChatId=null
let lastUserMessage=""

/* SEND */

async function send(){

const input=document.getElementById("message")
let text=input.value.trim()
if(!text) return

lastUserMessage=text

chatBox.innerHTML+=`
<div class="messageRow userRow">
<div class="userBubble">
${escapeHTML(text)}
<button onclick="editMessage(this)">✏️</button>
</div>
<div class="avatar">🧑</div>
</div>
`

input.value=""

let aiDiv=document.createElement("div")
aiDiv.className="messageRow"

aiDiv.innerHTML=`
<div class="avatar">🤖</div>
<div class="aiBubble typing">
<span></span><span></span><span></span>
</div>
`

chatBox.appendChild(aiDiv)

scrollBottom()

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
sessionId:sessionId,
chatId:currentChatId
})
})

aiDiv.innerHTML=`
<div class="avatar">🤖</div>
<div class="aiBubble">
<span id="stream"></span>
<button class="copyBtn" onclick="copyText(this)">📋</button>
<button onclick="speakText(this)">🗣</button>
<button onclick="stopVoice()">⏹</button>
<button onclick="regenerate()">🔄</button>
</div>
`

const reader=res.body.getReader()
const decoder=new TextDecoder()

let streamText=""
let span=aiDiv.querySelector("#stream")

while(true){

const {done,value}=await reader.read()
if(done) break

const chunk=decoder.decode(value)

if(chunk.includes("__CHATID__")){

const parts=chunk.split("__CHATID__")
streamText+=parts[0]
span.innerHTML=marked.parse(streamText)
currentChatId=parts[1]

}else{

streamText+=chunk
span.innerHTML=marked.parse(streamText)

}

scrollBottom()

}

loadSidebar()

}

/* EDIT MESSAGE */

function editMessage(btn){

const text=btn.parentElement.innerText.replace("✏️","")
document.getElementById("message").value=text

}

/* REGENERATE */

function regenerate(){

if(!lastUserMessage) return

document.getElementById("message").value=lastUserMessage
send()

}

/* COPY */

function copyText(btn){

const text=btn.parentElement.innerText
navigator.clipboard.writeText(text)

btn.innerText="✓"

setTimeout(()=>{
btn.innerText="📋"
},1000)

}

/* SIDEBAR */

async function loadSidebar(){

const res=await fetch("https://datta-ai-server.onrender.com/chats/"+sessionId)
const chats=await res.json()

const history=document.getElementById("history")
history.innerHTML=""

chats.forEach(chat=>{

let div=document.createElement("div")
div.className="chatItem"

div.innerHTML=`
<span onclick="openChat('${chat._id}')">${chat.title}</span>
<div class="chatActions">
<button class="menuBtn" onclick="toggleMenu(event,'${chat._id}')">⋮</button>
<div class="chatMenu" id="menu-${chat._id}">
<button onclick="deleteChat(event,'${chat._id}')">🗑 Delete</button>
</div>
</div>
`

history.appendChild(div)

})

}

/* OPEN CHAT */

async function openChat(chatId){

currentChatId=chatId
chatBox.innerHTML=""

const res=await fetch("https://datta-ai-server.onrender.com/chat/"+chatId)
const messages=await res.json()

messages.forEach(m=>{

if(m.role==="user"){

chatBox.innerHTML+=`
<div class="messageRow userRow">
<div class="userBubble">${escapeHTML(m.content)}</div>
<div class="avatar">🧑</div>
</div>
`

}else{

chatBox.innerHTML+=`
<div class="messageRow">
<div class="avatar">🤖</div>
<div class="aiBubble">
${marked.parse(m.content)}
<button class="copyBtn" onclick="copyText(this)">📋</button>
<button onclick="speakText(this)">🗣</button>
<button onclick="stopVoice()">⏹</button>
<button onclick="regenerate()">🔄</button>
</div>
</div>
`

}

})

scrollBottom()

}

/* DELETE */

async function deleteChat(e,id){

e.stopPropagation()

await fetch("https://datta-ai-server.onrender.com/chat/"+id,{method:"DELETE"})

loadSidebar()

}

/* SEARCH */

function searchChats(){

const input=document.getElementById("search").value.toLowerCase()
const items=document.querySelectorAll(".chatItem")

items.forEach(i=>{
i.style.display=i.innerText.toLowerCase().includes(input)?"flex":"none"
})

}

/* VOICE */

function speakText(btn){

const text=btn.parentElement.innerText
const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"
speechSynthesis.speak(speech)

}

function stopVoice(){
speechSynthesis.cancel()
}

/* VOICE INPUT */

function startAssistant(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-US"
recognition.start()

recognition.onresult=function(e){

document.getElementById("message").value=e.results[0][0].transcript
send()

}

}

/* FILE */

function uploadFile(){
const file=document.getElementById("file").files[0]
if(file) alert("File uploaded: "+file.name)
}

/* NEW CHAT */

function newChat(){
currentChatId=null
chatBox.innerHTML=""
}

/* UTILS */

function escapeHTML(str){
return str.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))
}

function scrollBottom(){
chatBox.scrollTop=chatBox.scrollHeight
}

/* ENTER SEND */

document.getElementById("message").addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault()
send()
}
})

loadSidebar()

</script>

</body>
</html>
