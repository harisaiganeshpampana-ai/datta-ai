<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:50px;
}

#chatbox{
width:80%;
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
}

#messages{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<h1>Datta AI</h1>

<div id="chatbox">

<div id="messages"></div>

<input id="userInput" placeholder="Ask something...">
<button onclick="send()">Send</button>

</div>

<script>

function send(){

let input=document.getElementById("userInput").value;

let messages=document.getElementById("messages");

messages.innerHTML += "<p><b>You:</b> "+input+"</p>";

messages.innerHTML += "<p><b>Datta AI:</b> Thinking...</p>";

}

</script>

</body>
</html>
