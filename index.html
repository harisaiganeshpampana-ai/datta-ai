<script>

let chats = JSON.parse(localStorage.getItem("dattaChats")) || {};
let currentChat = null;

function saveChats(){
localStorage.setItem("dattaChats", JSON.stringify(chats));
}

function renderSidebar(){

const history = document.getElementById("chatHistory");
history.innerHTML="";

for(const id in chats){

const btn = document.createElement("button");

btn.innerText = chats[id].title || "New Chat";

btn.onclick = () => loadChat(id);

history.appendChild(btn);

}

}

function createNewChat(){

currentChat = Date.now();

chats[currentChat] = {
title:"",
messages:[]
};

saveChats();
renderSidebar();

document.getElementById("chatbox").innerHTML="";

}

function loadChat(id){

currentChat = id;

const chatbox = document.getElementById("chatbox");
chatbox.innerHTML="";

chats[id].messages.forEach(m=>{
chatbox.innerHTML += `<div class="${m.role}">${m.text}</div>`;
});

}

async function sendMessage(){

const input = document.getElementById("message");
const chatbox = document.getElementById("chatbox");

const message = input.value.trim();
if(!message) return;

if(!currentChat) createNewChat();

chatbox.innerHTML += `<div class="user">${message}</div>`;

input.value="";

if(chats[currentChat].messages.length === 0){

chats[currentChat].title = message.substring(0,40);

}

chats[currentChat].messages.push({
role:"user",
text:message
});

saveChats();
renderSidebar();

chatbox.scrollTop = chatbox.scrollHeight;

const thinkingId = "t"+Date.now();

chatbox.innerHTML += `<div class="ai" id="${thinkingId}">Datta AI is thinking...</div>`;

try{

const res = await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
});

const data = await res.json();

document.getElementById(thinkingId).remove();

chatbox.innerHTML += `<div class="ai">${data.reply}</div>`;

chats[currentChat].messages.push({
role:"ai",
text:data.reply
});

saveChats();

chatbox.scrollTop = chatbox.scrollHeight;

}catch(err){

document.getElementById(thinkingId).innerText="Server error";

}

}

renderSidebar();

</script>
