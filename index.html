<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>
body{
background:#0b1a33;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#messages{
background:#0f2345;
padding:20px;
border-radius:10px;
text-align:left;
min-height:200px;
margin-bottom:10px;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:#16a34a;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Datta AI</h1>
<p>Your AI assistant for learning and technology</p>

<div id="messages"></div>

<input id="userInput" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const text = input.value.trim();

if(text === "") return;

const messages = document.getElementById("messages");

/* USER MESSAGE */

const userMsg = document.createElement("p");
userMsg.innerHTML = "<b>You:</b> " + text;
messages.appendChild(userMsg);

/* AI PLACEHOLDER */

const aiMsg = document.createElement("p");
aiMsg.innerHTML = "<b>Datta AI:</b> Thinking...";
messages.appendChild(aiMsg);

input.value = "";

try{

const res = await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

const data = await res.json();

aiMsg.innerHTML = "<b>Datta AI:</b> " + data.reply;

}catch(err){

aiMsg.innerHTML = "<b>Datta AI:</b> Server error";

}

}

</script>

</body>
</html>
