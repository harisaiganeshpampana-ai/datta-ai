<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#151515;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
margin-bottom:20px;
}

.logo img{
width:26px;
}

.newchat{
background:#222;
border:none;
padding:10px;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
}

.history div{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.history div:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
}

.user{
text-align:right;
margin:12px 0;
}

.ai{
margin:12px 0;
line-height:1.6;
}

.inputArea{
padding:15px;
border-top:1px solid #222;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
gap:10px;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send,.voice,.upload{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
color:white;
}

.send{background:#2ecc71;}
.voice{background:#3498db;}
.upload{background:#9b59b6;}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
Datta AI
</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">

<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>

</div>

</div>

<script>

/* SESSION */

if(!localStorage.getItem("sessionId")){
localStorage.setItem("sessionId",Date.now().toString())
}

const sessionId = localStorage.getItem("sessionId")

const chatBox=document.getElementById("chat")

let chatId=null

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("message")
let text=input.value.trim()

if(!text) return

chatBox.innerHTML+=`<div class="user">${escapeHTML(text)}</div>`

input.value=""

scrollBottom()

try{

const res = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
message:text,
sessionId:sessionId,
chatId:chatId
})
})

const data = await res.json()

chatId=data.chatId

chatBox.innerHTML+=`
<div class="ai">${escapeHTML(data.reply)}</div>
`

scrollBottom()

loadSidebar()

}catch{

chatBox.innerHTML+=`<div class="ai">Server error</div>`

}

}

/* LOAD SIDEBAR */

async function loadSidebar(){

const res = await fetch(
"https://datta-ai-server.onrender.com/chats/"+sessionId
)

const chats = await res.json()

const history=document.getElementById("history")

history.innerHTML=""

chats.forEach(chat=>{

let div=document.createElement("div")

div.innerText=chat.title

div.onclick=()=>openChat(chat._id)

history.appendChild(div)

})

}

/* OPEN CHAT */

async function openChat(id){

chatId=id

const res = await fetch(
"https://datta-ai-server.onrender.com/chat/"+id
)

const chat = await res.json()

chatBox.innerHTML=""

chat.messages.forEach(m=>{

if(m.role==="user"){

chatBox.innerHTML+=`<div class="user">${escapeHTML(m.content)}</div>`

}else{

chatBox.innerHTML+=`<div class="ai">${escapeHTML(m.content)}</div>`

}

})

scrollBottom()

}

/* NEW CHAT */

function newChat(){

chatId=null
chatBox.innerHTML=""

}

/* ENTER KEY */

document.getElementById("message").addEventListener("keydown",function(e){

if(e.key==="Enter") send()

})

/* VOICE */

function startAssistant(){

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

document.getElementById("message").value=event.results[0][0].transcript

send()

}

}

/* FILE */

function uploadFile(){

const file=document.getElementById("file").files[0]

if(!file) return

alert("File uploaded: "+file.name)

}

/* SECURITY */

function escapeHTML(str){

return str.replace(/[&<>"']/g,function(m){

return({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
})[m]

})

}

/* SCROLL */

function scrollBottom(){

chatBox.scrollTop=chatBox.scrollHeight

}

loadSidebar()

</script>

</body>
</html>
