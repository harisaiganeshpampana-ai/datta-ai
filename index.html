<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
font-weight:bold;
}

.logo img{
width:28px;
}

.newchat{
background:#1e1e1e;
border:none;
padding:10px;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
}

.history div{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.history div:hover{
background:#1e1e1e;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* START PAGE */

.start{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.start img{
width:70px;
margin-bottom:10px;
}

.start input{
width:500px;
max-width:90%;
padding:14px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

/* CHAT */

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
display:none;
}

.user{
text-align:right;
margin:14px 0;
}

.ai{
margin:14px 0;
line-height:1.6;
}

/* INPUT */

.inputArea{
display:none;
padding:15px;
border-top:1px solid #222;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send{
width:40px;
height:40px;
border-radius:50%;
background:#2ecc71;
border:none;
margin-left:10px;
cursor:pointer;
color:white;
}

.voice{
width:40px;
height:40px;
border-radius:50%;
background:#3498db;
border:none;
margin-left:10px;
cursor:pointer;
color:white;
}

/* LOADER */

.loader{
margin:15px 0;
}

.spin{
width:24px;
height:24px;
border:3px solid #2ecc71;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
Datta AI
</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="start" id="start">

<img src="logo.jpeg">

<h2 id="welcome"></h2>

<input id="startInput" placeholder="Ask anything">

</div>

<div class="chat" id="chat"></div>

<div class="inputArea" id="inputArea">

<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="voice()">🎤</button>

</div>

</div>

</div>

<script>

/* USER NAME */

let username = localStorage.getItem("dattaUser")

if(!username){
username = prompt("Enter your name")
localStorage.setItem("dattaUser",username)
}

document.getElementById("welcome").innerText =
"Hi " + username + ", how can I help you?"

/* SESSION */

const sessionId = localStorage.getItem("dattaSession") || Date.now().toString()
localStorage.setItem("dattaSession",sessionId)

/* STORAGE */

let chats = JSON.parse(localStorage.getItem("dattaChats")) || []
let currentChat = null

/* SIDEBAR */

function loadSidebar(){

const history=document.getElementById("history")
history.innerHTML=""

chats.forEach((chat,index)=>{

let div=document.createElement("div")
div.innerText=chat.title
div.onclick=()=>openChat(index)

history.appendChild(div)

})

}

/* OPEN CHAT */

function openChat(index){

currentChat = chats[index]

const chatBox=document.getElementById("chat")

chatBox.innerHTML=""

document.getElementById("start").style.display="none"
chatBox.style.display="block"
document.getElementById("inputArea").style.display="block"

currentChat.messages.forEach(m=>{

if(m.role==="user"){
chatBox.innerHTML+=`<div class="user">${m.text}</div>`
}else{
chatBox.innerHTML+=`<div class="ai">${m.text}</div>`
}

})

}

/* NEW CHAT */

function newChat(){

if(currentChat && currentChat.messages.length>0){

chats.push(currentChat)
localStorage.setItem("dattaChats",JSON.stringify(chats))
loadSidebar()

}

currentChat=null

document.getElementById("chat").innerHTML=""
document.getElementById("start").style.display="flex"
document.getElementById("chat").style.display="none"
document.getElementById("inputArea").style.display="none"

}

/* ENTER KEY */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

if(document.activeElement.id==="startInput"){

document.getElementById("message").value =
document.getElementById("startInput").value

send()

}

else if(document.activeElement.id==="message"){

send()

}

}

})

/* SPEAK FUNCTION */

function speak(text){

const speech = new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speech.rate=1

speech.pitch=1

speechSynthesis.speak(speech)

}

/* SEND MESSAGE */

async function send(){

const chatBox=document.getElementById("chat")
const start=document.getElementById("start")
const msgInput=document.getElementById("message")
const startInput=document.getElementById("startInput")

let text = msgInput.value || startInput.value

text=text.trim()

if(!text) return

start.style.display="none"
chatBox.style.display="block"
document.getElementById("inputArea").style.display="block"

chatBox.innerHTML+=`<div class="user">${text}</div>`

msgInput.value=""
startInput.value=""

chatBox.innerHTML+=`<div id="loader" class="loader"><div class="spin"></div></div>`

try{

const res = await fetch("https://datta-ai-server.onrender.com/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
message:text,
sessionId:sessionId
})

})

const data = await res.json()

document.getElementById("loader").remove()

chatBox.innerHTML+=`<div class="ai">${data.reply}</div>`

speak(data.reply)

if(!currentChat){

currentChat={
title:text.substring(0,30),
messages:[]
}

}

currentChat.messages.push({role:"user",text:text})
currentChat.messages.push({role:"ai",text:data.reply})

chatBox.scrollTop = chatBox.scrollHeight

}catch{

document.getElementById("loader").innerText="Server error"

}

}

/* VOICE INPUT */

function voice(){

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

const speech = event.results[0][0].transcript

document.getElementById("message").value = speech

send()

}

}

/* LOAD SIDEBAR */

loadSidebar()

</script>

</body>
</html>
