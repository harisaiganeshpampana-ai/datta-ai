<!DOCTYPE html>
<html>
<head>

<title>Datta AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

/* PAGE */

body{
background:#1e1e1e;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111;
padding:15px;
border-right:1px solid #333;
transition:0.3s;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#222;
color:white;
border:none;
cursor:pointer;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP HEADER */

.header{
text-align:center;
padding:15px;
border-bottom:1px solid #333;
}

/* CHAT AREA */

#chatbox{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* USER MESSAGE */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:12px;
max-width:70%;
word-wrap:break-word;
}

/* AI MESSAGE */

.ai{
align-self:flex-start;
background:#2a2a2a;
padding:10px 14px;
border-radius:12px;
max-width:70%;
word-wrap:break-word;
}

/* INPUT AREA */

.input-area{
display:flex;
gap:8px;
padding:15px;
border-top:1px solid #333;
}

#message{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

.send-btn{
padding:12px 20px;
background:#00a67e;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

/* MOBILE */

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
margin-bottom:10px;
}

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
position:fixed;
left:-250px;
top:0;
height:100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-btn{
display:block;
}

}

</style>

</head>


<body>

<div class="sidebar">

<h2>Datta AI</h2>

<button onclick="newChat()">+ New Chat</button>
<button>Search Chats</button>
<button>More</button>

<hr>

<div id="chatHistory"></div>

</div>


<div class="main">

<div class="header">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<h2>Datta AI</h2>
<p>Ask anything</p>

</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="message" placeholder="Ask something..." />
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>


<script>

function toggleMenu(){
document.querySelector(".sidebar").classList.toggle("active");
}

function newChat(){
document.getElementById("chatbox").innerHTML="";
}

async function sendMessage(){

const input=document.getElementById("message");
const chatbox=document.getElementById("chatbox");

const message=input.value;

if(message.trim()==="") return;

chatbox.innerHTML += "<div class='user'>"+message+"</div>";

input.value="";

chatbox.scrollTop=chatbox.scrollHeight;

const thinkingId="thinking-"+Date.now();

chatbox.innerHTML += "<div class='ai' id='"+thinkingId+"'>Datta AI is thinking...</div>";

chatbox.scrollTop=chatbox.scrollHeight;

try{

const response=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await response.json();

document.getElementById(thinkingId).remove();

chatbox.innerHTML += "<div class='ai'>"+data.reply+"</div>";

chatbox.scrollTop=chatbox.scrollHeight;

}catch(err){

document.getElementById(thinkingId).innerHTML="Server error";

}

}

</script>

</body>
</html>
