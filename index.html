<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="chat-fonts.css">
<link rel="stylesheet" href="theme-vars.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080800; color:#fff8e7; font-family:'DM Sans',sans-serif; min-height:100vh; overflow:hidden; }

.topbar { position:fixed; top:0; left:0; right:0; height:54px; background:rgba(8,8,0,0.96); border-bottom:1px solid rgba(255,215,0,0.1); display:flex; align-items:center; padding:0 16px; gap:10px; z-index:500; }
.menuBtn { background:none; border:none; color:#665500; cursor:pointer; font-size:20px; padding:4px 8px; }

.sidebar { position:fixed; top:54px; left:0; bottom:0; width:280px; background:#060600; border-right:1px solid rgba(255,215,0,0.08); display:flex; flex-direction:column; z-index:400; overflow-y:auto; }
@media(max-width:767px){ .sidebar { transform:translateX(-280px); transition:transform 0.3s ease; } .sidebar.show { transform:translateX(0); } }

.main { position:fixed; top:54px; left:280px; right:0; bottom:0; display:flex; flex-direction:column; overflow:hidden; }
@media(max-width:900px){ .main { left:0 !important; } }

.chatWrapper { flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.chat { flex:1; overflow-y:auto; padding:20px 16px 100px; display:flex; flex-direction:column; gap:16px; }

.messageRow { display:flex; align-items:flex-start; gap:10px; animation:msgIn 0.3s ease; width:100%; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.messageRow.userRow { flex-direction:row-reverse; }
.userBubble { background:rgba(255,215,0,0.12); border:1px solid rgba(255,215,0,0.25); border-radius:18px 18px 4px 18px; padding:10px 16px; max-width:70%; color:#fff8e7; word-wrap:break-word; font-family:'Cormorant Garamond',serif; font-size:15px; }
.aiBubble { background:#0f0e00; border:1px solid rgba(255,215,0,0.08); border-radius:4px 18px 18px 18px; padding:12px 16px; max-width:75%; color:#fff8e7; font-family:'Nunito',sans-serif; font-size:14px; line-height:1.6; }
.aiBubble.typing span { display:inline-block; width:6px; height:6px; background:#ffd700; border-radius:50%; animation:dot 1.2s infinite; margin:0 2px; }
.aiBubble.typing span:nth-child(2){animation-delay:0.2s}
.aiBubble.typing span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.avatar { width:30px; height:30px; border-radius:50%; background:rgba(255,215,0,0.1); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.aiActions { display:flex; gap:6px; opacity:0; transition:opacity 0.2s; }
.messageRow:hover .aiActions { opacity:1; }
.actionBtn { background:none; border:none; color:#443300; cursor:pointer; padding:3px; border-radius:6px; }
.actionBtn:hover { color:#ffd700; }
.cursor { animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.inputArea { padding:10px 16px 16px; background:#080800; border-top:1px solid rgba(255,215,0,0.06); }
.inputWrap { background:#0f0e00; border:1px solid rgba(255,215,0,0.12); border-radius:16px; padding:8px 10px; max-width:800px; margin:0 auto; }
.inputRow { display:flex; align-items:center; gap:8px; }
#message { flex:1; background:none; border:none; outline:none; color:#fff8e7; font-size:15px; padding:4px 0; }
#message::placeholder { color:#332200; }
.sendBtn { width:34px; height:34px; background:#ffd700; border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#000; transition:all 0.2s; }
.sendBtn:hover { transform:scale(1.05); }
.micBtn { background:none; border:none; color:#554400; cursor:pointer; padding:6px; }
.plusBtn { background:none; border:1px solid rgba(255,215,0,0.1); border-radius:10px; color:#554400; cursor:pointer; width:30px; height:30px; }

.navItem { width:100%; display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; border:none; background:none; color:#665500; cursor:pointer; font-size:13px; text-align:left; }
.navItem:hover, .navItem.active { background:rgba(255,215,0,0.08); color:#ffd700; }

.history { display:flex; flex-direction:column; gap:2px; padding:0 8px; }
.chatItem { padding:8px 10px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
.chatItem:hover { background:rgba(255,215,0,0.06); }
.chatTitle { font-size:13px; color:#665500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.deleteBtn { background:none; border:none; color:#443300; cursor:pointer; opacity:0; padding:2px 4px; }
.chatItem:hover .deleteBtn { opacity:1; }

.emptySection { display:flex; flex-direction:column; align-items:center; gap:8px; padding:30px 20px; color:#332200; text-align:center; }
.welcomeScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px; }
.welcomeLogo { width:72px; height:72px; border-radius:20px; margin-bottom:20px; }
.welcomeTitle { font-size:32px; font-family:'Bebas Neue',sans-serif; background:linear-gradient(135deg,#fff8e7,#ffd700); -webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.welcomeChips { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:480px; margin-top:20px; }
.chip { background:rgba(255,215,0,0.03); border:1px solid rgba(255,215,0,0.08); border-radius:14px; padding:12px; cursor:pointer; }
.chip:hover { background:rgba(255,215,0,0.07); border-color:rgba(255,215,0,0.3); }

.projectItem { padding:12px; background:rgba(255,215,0,0.03); border:1px solid rgba(255,215,0,0.08); border-radius:10px; cursor:pointer; margin-bottom:8px; }
.projectItem:hover { background:rgba(255,215,0,0.08); }
.projectActive { background:rgba(255,215,0,0.15) !important; border-color:#ffd700 !important; }

.sidebarBottom { margin-top:auto; padding:10px; border-top:1px solid rgba(255,215,0,0.08); }
.profileName { font-size:11px; font-weight:600; word-break:break-all; line-height:1.3; }
.profileSub { font-size:10px; color:#554400; }
.profileAvatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#ffd700,#ff8c00); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#000; flex-shrink:0; }

#scrollDownBtn { position:absolute; bottom:80px; right:20px; width:32px; height:32px; background:#0f0e00; border:1px solid rgba(255,215,0,0.2); border-radius:50%; color:#ffd700; cursor:pointer; display:none; }

/* Modal Styles - Like ChatGPT */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-content {
  background: #0f0e00;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  padding: 24px;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.modal-title {
  font-size: 24px;
  font-family: 'Bebas Neue', sans-serif;
  margin-bottom: 8px;
  color: #ffd700;
}
.modal-subtitle {
  font-size: 13px;
  color: #665500;
  margin-bottom: 20px;
}
.modal-input {
  width: 100%;
  padding: 12px;
  background: #1a1a0a;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 12px;
  color: #fff8e7;
  font-size: 14px;
  margin-bottom: 16px;
}
.modal-input:focus {
  outline: none;
  border-color: #ffd700;
}
.modal-suggestions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.suggestion-chip {
  background: rgba(255,215,0,0.08);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.suggestion-chip:hover {
  background: rgba(255,215,0,0.15);
  border-color: #ffd700;
}
.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.modal-btn {
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}
.modal-btn-cancel {
  background: none;
  border: 1px solid rgba(255,215,0,0.2);
  color: #665500;
}
.modal-btn-create {
  background: #ffd700;
  border: none;
  color: #000;
  font-weight: 600;
}
.modal-btn-create:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="toggleSidebar()" class="menuBtn">☰</button>
  <div style="display:flex;align-items:center;gap:6px;">
    <img src="logo.jpeg" style="width:24px;height:24px;border-radius:6px;">
    <span style="font-family:'Bebas Neue';font-size:16px;background:linear-gradient(90deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">DATTA AI</span>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <button id="moodToggleBtn" onclick="toggleMoodPanel()" style="background:none;border:1px solid rgba(255,255,255,0.08);width:32px;height:32px;border-radius:50%;cursor:pointer;">😊</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div style="padding:16px 14px 8px; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-family:'Bebas Neue';font-size:20px;">👑 DATTA AI</div>
    <button onclick="createNewChat()" style="padding:6px 12px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); border-radius:8px; color:#ffd700; cursor:pointer;">+ New Chat</button>
  </div>

  <div style="padding:0 12px 8px;">
    <div style="background:rgba(255,255,255,0.04); border-radius:10px; padding:7px 12px;">
      <input id="search" type="text" placeholder="Search chats" onkeyup="searchChats()" style="background:none; border:none; outline:none; color:#fff8e7; width:100%;">
    </div>
  </div>

  <div style="padding:0 8px 4px;">
    <button class="navItem active" onclick="showSection('chats')">💬 Chats</button>
    <button class="navItem" onclick="showSection('projects'); loadProjects()">📁 Projects</button>
    <button class="navItem" onclick="showSection('artifacts'); loadArtifacts()">📦 Artifacts</button>
  </div>

  <div id="recentsLabel" style="padding:8px 14px 4px; font-size:10px; color:#332200;">RECENTS</div>

  <div id="section-chats" class="sidebarSection" style="flex:1; overflow-y:auto;">
    <div class="history" id="history"></div>
  </div>
  <div id="section-projects" class="sidebarSection" style="display:none; flex:1; overflow-y:auto; padding:8px;"></div>
  <div id="section-artifacts" class="sidebarSection" style="display:none; flex:1; overflow-y:auto; padding:8px;"></div>

  <div class="sidebarBottom">
    <div id="versionTag" style="text-align:center; font-size:9px; color:#252000;">DATTA AI v2.0 · SHAKTI</div>
    
    <div onclick="toggleProfileMenu()" style="margin:8px 0; padding:8px; display:flex; align-items:center; gap:8px; cursor:pointer;">
      <div class="profileAvatar" id="profileAvatar">G</div>
      <div style="flex:1; min-width:0;">
        <div class="profileName" id="profileName">Loading...</div>
        <div class="profileSub" id="profileSub">Free Plan</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#443300"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    
    <div id="profileMenu" style="display:none; position:fixed; bottom:80px; left:10px; width:200px; background:#0f0e00; border:1px solid rgba(255,215,0,0.15); border-radius:10px; padding:5px; z-index:1000;">
      <button onclick="window.location.href='settings.html'" style="width:100%; padding:8px; background:none; border:none; color:#665500; cursor:pointer; text-align:left;">⚙️ Settings</button>
      <button onclick="logout()" style="width:100%; padding:8px; background:none; border:none; color:#ff4444; cursor:pointer; text-align:left;">🚪 Logout</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="welcomeScreen" class="welcomeScreen">
    <img src="logo.jpeg" class="welcomeLogo">
    <h1 class="welcomeTitle">How can I help you today?</h1>
    <p class="welcomeSub">Think Less. Do More.</p>
    <div class="welcomeChips">
      <div class="chip" onclick="fillPrompt('Generate image of a futuristic city')">🎨 Generate image</div>
      <div class="chip" onclick="fillPrompt('What are the latest AI news?')">🌐 Search the web</div>
      <div class="chip" onclick="fillPrompt('Write Python code to sort numbers')">💻 Write code</div>
      <div class="chip" onclick="fillPrompt('Explain quantum computing simply')">🧠 Explain anything</div>
    </div>
  </div>

  <div class="chatWrapper">
    <div class="chat" id="chat"></div>
    <button id="scrollDownBtn" onclick="scrollToBottom()">↓</button>
  </div>

  <div class="inputArea">
    <div class="inputWrap">
      <div class="inputRow">
        <button class="plusBtn" onclick="togglePlusMenu()">+</button>
        <input id="message" type="text" placeholder="Message Datta AI..." autocomplete="off">
        <button class="micBtn" onclick="startVoiceInput()">🎤</button>
        <button class="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// AUTHENTICATION
// ============================================
function getToken() { return localStorage.getItem("datta_token") || ""; }
function getUser() { try { return JSON.parse(localStorage.getItem("datta_user") || "null"); } catch(e) { return null; } }

if (!getToken()) { window.location.href = "login.html"; }
window.dattaUser = getUser();

// ============================================
// GLOBAL VARIABLES
// ============================================
let currentProject = null;
let currentProjectChat = null;
let projects = JSON.parse(localStorage.getItem('datta_projects') || '[]');
let projectPasswords = JSON.parse(localStorage.getItem('datta_project_passwords') || '{}');

// ============================================
// UTILITY FUNCTIONS
// ============================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  let t = document.getElementById("toastMsg");
  if (!t) {
    t = document.createElement("div");
    t.id = "toastMsg";
    t.style.cssText = "position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0f0e00;border:1px solid #00ff88;border-radius:50px;padding:8px 18px;color:#00ff88;z-index:9999;";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  if (chat) chat.scrollTop = chat.scrollHeight;
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("show");
}

function showSection(section) {
  document.getElementById("section-chats").style.display = section === "chats" ? "block" : "none";
  document.getElementById("section-projects").style.display = section === "projects" ? "block" : "none";
  document.getElementById("section-artifacts").style.display = section === "artifacts" ? "block" : "none";
  document.querySelectorAll(".navItem").forEach((btn, i) => btn.classList.toggle("active", i === ["chats","projects","artifacts"].indexOf(section)));
}

function searchChats() {
  const query = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".chatItem").forEach(item => {
    const title = item.querySelector(".chatTitle")?.textContent.toLowerCase() || "";
    item.style.display = title.includes(query) ? "flex" : "none";
  });
}

function togglePlusMenu() {
  showToast("📎 Upload coming soon!");
}

// ============================================
// CHAT FUNCTIONS
// ============================================
function createNewChat() {
  if (currentProject) {
    newChatInProject();
  } else {
    // Create standalone chat
    document.getElementById("chat").innerHTML = "";
    document.getElementById("welcomeScreen").style.display = "flex";
    currentProjectChat = null;
    showToast("✨ New chat created");
  }
}

function newChatInProject() {
  if (!currentProject) {
    showToast("Please open a project first");
    return;
  }
  
  const newChat = {
    id: 'chat_' + Date.now(),
    title: 'New Chat',
    messages: [],
    created: Date.now()
  };
  
  const project = projects.find(p => p.id === currentProject);
  if (project) {
    project.chats = project.chats || [];
    project.chats.unshift(newChat);
    localStorage.setItem('datta_projects', JSON.stringify(projects));
    currentProjectChat = newChat;
    
    document.getElementById("chat").innerHTML = "";
    document.getElementById("welcomeScreen").style.display = "flex";
    loadProjectChats(project);
    showToast("✨ New chat created in project");
  }
}

function openChat(chat) {
  currentProjectChat = chat;
  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";
  document.getElementById("welcomeScreen").style.display = "none";
  
  chat.messages.forEach(msg => {
    if (msg.role === 'user') {
      chatBox.innerHTML += `<div class="messageRow userRow"><div class="userBubble">${escapeHtml(msg.content)}</div><div class="avatar">🧑</div></div>`;
    } else {
      chatBox.innerHTML += `<div class="messageRow"><div class="avatar">🤖</div><div class="aiBubble">${marked.parse(msg.content)}</div></div>`;
    }
  });
  scrollToBottom();
}

// ============================================
// PROJECTS FUNCTIONS - Like ChatGPT Modal
// ============================================

function showCreateProjectModal() {
  // Remove existing modal if any
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-content">
      <div class="modal-title">Create Project</div>
      <div class="modal-subtitle">Give your project a name to organize your chats</div>
      <input type="text" id="projectNameInput" class="modal-input" placeholder="Project name" autocomplete="off">
      <div class="modal-suggestions">
        <div class="suggestion-chip" onclick="document.getElementById('projectNameInput').value='Party planning'">🎉 Party planning</div>
        <div class="suggestion-chip" onclick="document.getElementById('projectNameInput').value='Homework'">📚 Homework</div>
        <div class="suggestion-chip" onclick="document.getElementById('projectNameInput').value='Investing'">📈 Investing</div>
        <div class="suggestion-chip" onclick="document.getElementById('projectNameInput').value='Writing'">✍️ Writing</div>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn modal-btn-create" onclick="createProjectFromModal()">Create Project</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  // Focus input
  setTimeout(() => {
    const input = document.getElementById('projectNameInput');
    if (input) input.focus();
  }, 100);
}

function closeModal() {
  const modal = document.querySelector('.modal-overlay');
  if (modal) modal.remove();
}

function createProjectFromModal() {
  const input = document.getElementById('projectNameInput');
  const name = input?.value.trim();
  if (!name) {
    showToast("Please enter a project name");
    return;
  }
  
  createProjectWithName(name);
  closeModal();
}

function createProjectWithName(name) {
  // Optional: Ask for password
  const lockProject = confirm(`Lock "${name}" with a password?`);
  let password = null;
  if (lockProject) {
    password = prompt("Set a password for this project:");
    if (!password) return;
  }
  
  const newProject = {
    id: 'project_' + Date.now(),
    name: name,
    chats: [],
    locked: lockProject,
    created: Date.now()
  };
  
  projects.push(newProject);
  localStorage.setItem('datta_projects', JSON.stringify(projects));
  
  if (password) {
    projectPasswords[newProject.id] = password;
    localStorage.setItem('datta_project_passwords', JSON.stringify(projectPasswords));
  }
  
  loadProjects();
  showToast(`📁 Project "${name}" created`);
  
  // Automatically open the new project
  openProject(newProject.id);
}

function loadProjects() {
  const container = document.getElementById("section-projects");
  if (!container) return;
  
  if (projects.length === 0) {
    container.innerHTML = `
      <div class="emptySection">
        📁 No projects yet
        <button onclick="showCreateProjectModal()" style="margin-top:12px;padding:10px 20px;background:#ffd70020;border:1px solid #ffd70040;border-radius:10px;color:#ffd700;cursor:pointer;">+ Create Project</button>
      </div>
    `;
    return;
  }
  
  container.innerHTML = `
    <button onclick="showCreateProjectModal()" style="width:100%;padding:10px;margin-bottom:12px;background:#ffd70010;border:1px solid #ffd70020;border-radius:10px;color:#ffd700;cursor:pointer;">+ New Project</button>
    ${projects.map(project => `
      <div class="projectItem ${currentProject === project.id ? 'projectActive' : ''}" onclick="openProject('${project.id}')">
        <div style="display:flex;align-items:center;gap:10px;">
          <span>${project.locked ? '🔒' : '📁'}</span>
          <div style="flex:1;">
            <div style="font-weight:600;">${escapeHtml(project.name)}</div>
            <div style="font-size:10px;color:#665500;">${project.chats?.length || 0} chats</div>
          </div>
          <div style="display:flex;gap:5px;">
            ${project.locked ? `<button onclick="event.stopPropagation();unlockProject('${project.id}')" style="background:none;border:none;color:#ffd700;cursor:pointer;">🔓</button>` : 
                               `<button onclick="event.stopPropagation();lockProject('${project.id}')" style="background:none;border:none;color:#665500;cursor:pointer;">🔒</button>`}
            <button onclick="event.stopPropagation();renameProject('${project.id}')" style="background:none;border:none;color:#665500;cursor:pointer;">✏️</button>
            <button onclick="event.stopPropagation();deleteProject('${project.id}')" style="background:none;border:none;color:#ff6666;cursor:pointer;">🗑️</button>
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

function openProject(projectId) {
  const project = projects.find(p => p.id === projectId);
  if (!project) return;
  
  if (project.locked) {
    const password = prompt(`Project "${project.name}" is locked. Enter password:`);
    if (!password || projectPasswords[projectId] !== password) {
      showToast("❌ Incorrect password!");
      return;
    }
  }
  
  currentProject = projectId;
  localStorage.setItem('datta_current_project', projectId);
  
  // Update UI - Show project header with close button
  const recentsLabel = document.getElementById("recentsLabel");
  if (recentsLabel) {
    recentsLabel.innerHTML = `📁 ${escapeHtml(project.name)} <button onclick="closeProject()" style="margin-left:8px;background:none;border:none;color:#665500;cursor:pointer;">✕</button>`;
  }
  
  // Show project welcome screen
  const welcomeScreen = document.getElementById("welcomeScreen");
  if (welcomeScreen) {
    welcomeScreen.style.display = "flex";
    const welcomeTitle = welcomeScreen.querySelector(".welcomeTitle");
    if (welcomeTitle) welcomeTitle.innerHTML = `📁 ${escapeHtml(project.name)}`;
    const welcomeSub = welcomeScreen.querySelector(".welcomeSub");
    if (welcomeSub) welcomeSub.innerHTML = "Chats in this project will appear here";
  }
  
  document.getElementById("chat").innerHTML = "";
  
  loadProjectChats(project);
  loadProjects(); // Update active state
  showToast(`📁 Opened project: ${project.name}`);
}

function loadProjectChats(project) {
  const historyContainer = document.getElementById("history");
  if (!historyContainer) return;
  
  historyContainer.innerHTML = '';
  
  if (!project.chats || project.chats.length === 0) {
    historyContainer.innerHTML = `<div class="emptySection">💬 No chats<br><button onclick="newChatInProject()" style="margin-top:10px;padding:8px 16px;background:#ffd70020;border:1px solid #ffd70040;border-radius:10px;color:#ffd700;cursor:pointer;">+ New Chat</button></div>`;
    return;
  }
  
  project.chats.forEach(chat => {
    const div = document.createElement("div");
    div.className = "chatItem";
    div.innerHTML = `
      <div class="chatTitle">${escapeHtml(chat.title || "New Chat")}</div>
      <button class="deleteBtn" onclick="event.stopPropagation();deleteChatFromProject('${chat.id}')">🗑️</button>
    `;
    div.onclick = () => openChat(chat);
    historyContainer.appendChild(div);
  });
}

function deleteChatFromProject(chatId) {
  if (!confirm("Delete this chat?")) return;
  
  const project = projects.find(p => p.id === currentProject);
  if (project) {
    project.chats = project.chats.filter(c => c.id !== chatId);
    localStorage.setItem('datta_projects', JSON.stringify(projects));
    
    if (currentProjectChat?.id === chatId) {
      currentProjectChat = null;
      document.getElementById("chat").innerHTML = "";
      document.getElementById("welcomeScreen").style.display = "flex";
    }
    
    loadProjectChats(project);
    showToast("🗑️ Chat deleted");
  }
}

function closeProject() {
  currentProject = null;
  currentProjectChat = null;
  localStorage.removeItem('datta_current_project');
  
  const recentsLabel = document.getElementById("recentsLabel");
  if (recentsLabel) recentsLabel.innerHTML = "RECENTS";
  
  const welcomeScreen = document.getElementById("welcomeScreen");
  if (welcomeScreen) {
    welcomeScreen.style.display = "flex";
    const welcomeTitle = welcomeScreen.querySelector(".welcomeTitle");
    if (welcomeTitle) welcomeTitle.innerHTML = "How can I help you today?";
    const welcomeSub = welcomeScreen.querySelector(".welcomeSub");
    if (welcomeSub) welcomeSub.innerHTML = "Think Less. Do More.";
  }
  
  document.getElementById("history").innerHTML = "";
  document.getElementById("chat").innerHTML = "";
  loadProjects();
  showToast("📁 Closed project");
}

function lockProject(projectId) {
  const password = prompt("Set password to lock this project:");
  if (!password) return;
  
  const project = projects.find(p => p.id === projectId);
  if (project) {
    project.locked = true;
    projectPasswords[projectId] = password;
    localStorage.setItem('datta_projects', JSON.stringify(projects));
    localStorage.setItem('datta_project_passwords', JSON.stringify(projectPasswords));
    loadProjects();
    if (currentProject === projectId) closeProject();
    showToast(`🔒 Project "${project.name}" locked`);
  }
}

function unlockProject(projectId) {
  const project = projects.find(p => p.id === projectId);
  if (!project) return;
  
  const password = prompt(`Enter password to unlock "${project.name}":`);
  if (projectPasswords[projectId] !== password) {
    showToast("❌ Incorrect password!");
    return;
  }
  
  project.locked = false;
  localStorage.setItem('datta_projects', JSON.stringify(projects));
  loadProjects();
  showToast(`🔓 Project "${project.name}" unlocked`);
}

function renameProject(projectId) {
  const project = projects.find(p => p.id === projectId);
  if (!project) return;
  
  const newName = prompt("New project name:", project.name);
  if (!newName) return;
  
  project.name = newName.trim();
  localStorage.setItem('datta_projects', JSON.stringify(projects));
  loadProjects();
  if (currentProject === projectId) {
    const recentsLabel = document.getElementById("recentsLabel");
    if (recentsLabel) recentsLabel.innerHTML = `📁 ${escapeHtml(project.name)} <button onclick="closeProject()">✕</button>`;
  }
  showToast(`✏️ Renamed to "${project.name}"`);
}

function deleteProject(projectId) {
  if (!confirm("Delete this project? All chats will be lost!")) return;
  
  projects = projects.filter(p => p.id !== projectId);
  localStorage.setItem('datta_projects', JSON.stringify(projects));
  delete projectPasswords[projectId];
  localStorage.setItem('datta_project_passwords', JSON.stringify(projectPasswords));
  
  if (currentProject === projectId) closeProject();
  loadProjects();
  showToast("🗑️ Project deleted");
}

// ============================================
// SEND MESSAGE FUNCTION
// ============================================
async function sendMessage() {
  const input = document.getElementById("message");
  const text = input.value.trim();
  if (!text) return;
  
  input.value = "";
  
  // Save user message to current chat
  if (currentProjectChat) {
    currentProjectChat.messages.push({ role: 'user', content: text, timestamp: Date.now() });
    if (currentProjectChat.title === 'New Chat') {
      currentProjectChat.title = text.substring(0, 40);
    }
    
    const project = projects.find(p => p.id === currentProject);
    if (project) {
      const chatIndex = project.chats.findIndex(c => c.id === currentProjectChat.id);
      if (chatIndex !== -1) project.chats[chatIndex] = currentProjectChat;
      localStorage.setItem('datta_projects', JSON.stringify(projects));
      loadProjectChats(project);
    }
  }
  
  const chatBox = document.getElementById("chat");
  document.getElementById("welcomeScreen").style.display = "none";
  
  // Add user message
  chatBox.innerHTML += `<div class="messageRow userRow"><div class="userBubble">${escapeHtml(text)}</div><div class="avatar">🧑</div></div>`;
  scrollToBottom();
  
  // Add typing indicator
  const aiId = 'ai_' + Date.now();
  chatBox.innerHTML += `<div class="messageRow" id="${aiId}"><div class="avatar">🤖</div><div class="aiBubble typing"><span></span><span></span><span></span></div></div>`;
  scrollToBottom();
  
  // Send to backend
  const formData = new FormData();
  formData.append('message', text);
  formData.append('token', getToken());
  formData.append('language', localStorage.getItem('datta_language') || 'English');
  
  try {
    const response = await fetch('https://datta-ai-server.onrender.com/chat', { method: 'POST', body: formData });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    const aiDiv = document.getElementById(aiId);
    
    if (aiDiv) {
      aiDiv.innerHTML = `<div class="avatar">🤖</div><div class="aiBubble"><span class="stream"></span></div>`;
    }
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      fullText += chunk;
      
      const streamSpan = aiDiv?.querySelector('.stream');
      if (streamSpan) {
        streamSpan.innerHTML = marked.parse(fullText) + '<span class="cursor">▌</span>';
        scrollToBottom();
      }
    }
    
    const streamSpan = aiDiv?.querySelector('.stream');
    if (streamSpan) streamSpan.innerHTML = marked.parse(fullText);
    
    // Save AI response
    if (currentProjectChat) {
      currentProjectChat.messages.push({ role: 'assistant', content: fullText, timestamp: Date.now() });
      const project = projects.find(p => p.id === currentProject);
      if (project) {
        const chatIndex = project.chats.findIndex(c => c.id === currentProjectChat.id);
        if (chatIndex !== -1) project.chats[chatIndex] = currentProjectChat;
        localStorage.setItem('datta_projects', JSON.stringify(projects));
      }
    }
    
  } catch (error) {
    const aiDiv = document.getElementById(aiId);
    if (aiDiv) {
      aiDiv.innerHTML = `<div class="avatar">🤖</div><div class="aiBubble" style="color:#ff8888;">⚠️ Connection error. Please try again.</div>`;
    }
  }
}

// ============================================
// ARTIFACTS FUNCTIONS
// ============================================
let artifacts = JSON.parse(localStorage.getItem('datta_artifacts') || '[]');

function loadArtifacts() {
  const container = document.getElementById("section-artifacts");
  if (!container) return;
  
  if (artifacts.length === 0) {
    container.innerHTML = `<div class="emptySection">📦 No artifacts yet<br><button onclick="createNewArtifact()" style="margin-top:10px;padding:8px 16px;background:#ffd70020;border:1px solid #ffd70040;border-radius:10px;color:#ffd700;cursor:pointer;">+ Create Artifact</button></div>`;
    return;
  }
  
  container.innerHTML = `
    <button onclick="createNewArtifact()" style="width:100%;padding:10px;margin-bottom:12px;background:#ffd70010;border:1px solid #ffd70020;border-radius:10px;color:#ffd700;cursor:pointer;">+ New Artifact</button>
    ${artifacts.map(artifact => `
      <div class="projectItem" style="display:flex;align-items:center;gap:10px;">
        <span>${artifact.type === 'image' ? '🎨' : artifact.type === 'code' ? '💻' : '📄'}</span>
        <div style="flex:1;">
          <div style="font-weight:600;">${escapeHtml(artifact.name)}</div>
          <div style="font-size:10px;color:#665500;">${new Date(artifact.created).toLocaleDateString()}</div>
        </div>
        <button onclick="deleteArtifact('${artifact.id}')" style="background:none;border:none;color:#ff6666;cursor:pointer;">🗑️</button>
      </div>
    `).join('')}
  `;
}

function createNewArtifact() {
  const type = prompt("Type (image/code/document):", "image");
  if (!type) return;
  const name = prompt("Artifact name:", "My Artifact");
  if (!name) return;
  
  artifacts.push({
    id: 'artifact_' + Date.now(),
    name: name.trim(),
    type: type.toLowerCase(),
    created: Date.now()
  });
  localStorage.setItem('datta_artifacts', JSON.stringify(artifacts));
  loadArtifacts();
  showToast(`✨ Artifact "${name}" created`);
}

function deleteArtifact(id) {
  if (!confirm("Delete this artifact?")) return;
  artifacts = artifacts.filter(a => a.id !== id);
  localStorage.setItem('datta_artifacts', JSON.stringify(artifacts));
  loadArtifacts();
  showToast("🗑️ Artifact deleted");
}

// ============================================
// OTHER FUNCTIONS
// ============================================
function fillPrompt(text) {
  document.getElementById("message").value = text;
  sendMessage();
}

function startVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast("Speech recognition not supported");
    return;
  }
  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.onresult = (e) => {
    document.getElementById("message").value = e.results[0][0].transcript;
    sendMessage();
  };
  recognition.start();
}

function toggleMoodPanel() {
  showToast("Mood panel coming soon!");
}

function toggleProfileMenu() {
  const menu = document.getElementById("profileMenu");
  menu.style.display = menu.style.display === "none" ? "block" : "none";
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

// ============================================
// INITIALIZATION
// ============================================
window.addEventListener('load', () => {
  // Load data
  projects = JSON.parse(localStorage.getItem('datta_projects') || '[]');
  projectPasswords = JSON.parse(localStorage.getItem('datta_project_passwords') || '{}');
  artifacts = JSON.parse(localStorage.getItem('datta_artifacts') || '[]');
  
  // Restore current project
  const savedProject = localStorage.getItem('datta_current_project');
  if (savedProject) {
    const project = projects.find(p => p.id === savedProject);
    if (project && !project.locked) {
      openProject(savedProject);
    }
  }
  
  // Update profile
  const user = getUser();
  if (user) {
    document.getElementById("profileName").textContent = user.username || user.email || "User";
    document.getElementById("profileAvatar").textContent = (user.username || "U")[0].toUpperCase();
  }
  
  // Enter key
  document.getElementById("message").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  // Hide splash
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) splash.style.display = "none";
  }, 2000);
  
  // Greeting
  const hour = new Date().getHours();
  const greet = hour < 12 ? "Good morning ☀️" : hour < 17 ? "Good afternoon 🌤️" : hour < 21 ? "Good evening 🌙" : "Good night 🌟";
  const greetEl = document.querySelector(".welcomeGreeting");
  if (greetEl) greetEl.textContent = greet;
  
  loadProjects();
  loadArtifacts();
  showToast("✨ Datta AI Ready!");
});
