<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg"> Datta AI
</div>

<button class="newchat" onclick="newChat()">✏️ New Chat</button>

<input id="search" class="searchBox" placeholder="🔍 Search chats" onkeyup="searchChats()">

<!-- Chat sections will be generated automatically -->
<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">
<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>
<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>
</div>

</div>

<script src="chat.js?v=2"></script>

</body>
</html>
