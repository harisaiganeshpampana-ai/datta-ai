<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<script>
if (window.innerWidth < 768) {
  window.location.href = "mobile.html";
}
</script>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

#app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111;
padding:15px;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.logo img{
width:22px;
height:22px;
}

.sidebar button{
padding:10px;
margin-bottom:10px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #333;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:12px;
max-width:70%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:12px;
max-width:70%;
}

/* INPUT */

.input{
display:flex;
padding:10px;
border-top:1px solid #333;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:20px;
font-size:16px;
}

.send{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:20px;
margin-left:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="app">

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
<b>Datta AI</b>
</div>

<button onclick="newChat()">+ New Chat</button>

<hr>

<div id="history"></div>

</div>

<div class="main">

<div class="header">
<h2>Datta AI</h2>
<p>Ask anything</p>
</div>

<div id="chatbox"></div>

<div class="input">
<input id="msg" placeholder="Ask something...">
<button class="send" onclick="send()">➤</button>
</div>

</div>

</div>

<script>

/* ENTER SEND */

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

/* STORAGE */

let chats=JSON.parse(localStorage.getItem("dattaChats"))||{}
let current=null

function save(){
localStorage.setItem("dattaChats",JSON.stringify(chats))
}

/* SIDEBAR */

function render(){

const box=document.getElementById("history")
box.innerHTML=""

for(const id in chats){

const btn=document.createElement("button")
btn.innerText=chats[id].title
btn.onclick=()=>load(id)

box.appendChild(btn)

}

}

/* NEW CHAT */

function newChat(){
current=null
document.getElementById("chatbox").innerHTML=""
}

/* LOAD CHAT */

function load(id){

current=id
const chat=document.getElementById("chatbox")
chat.innerHTML=""

chats[id].messages.forEach(m=>{
chat.innerHTML+=`<div class="${m.role}">${m.text}</div>`
})

}

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("msg")
let message=input.value.trim()

if(!message) return

message=message.charAt(0).toUpperCase()+message.slice(1)

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${message}</div>`

input.value=""

if(!current){

current=Date.now()

chats[current]={
title:message.substring(0,40),
messages:[]
}

}

chats[current].messages.push({role:"user",text:message})

save()
render()

const thinking="t"+Date.now()

chat.innerHTML+=`<div class="ai" id="${thinking}">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

document.getElementById(thinking).remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chats[current].messages.push({role:"ai",text:data.reply})

save()

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById(thinking).innerText="Server error"

}

}

render()

</script>

</body>
</html>
