<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datta AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:#151515;
padding:15px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
margin-bottom:20px;
}

.logo img{
width:26px;
}

.newchat{
background:#222;
border:none;
padding:10px;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

.history{
flex:1;
overflow:auto;
}

.history div{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.history div:hover{
background:#222;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:40px;
max-width:900px;
margin:auto;
width:100%;
}

.user{
text-align:right;
margin:12px 0;
}

.ai{
margin:12px 0;
line-height:1.6;
}

.inputArea{
padding:15px;
border-top:1px solid #222;
}

.inputWrap{
display:flex;
max-width:900px;
margin:auto;
gap:10px;
}

#message{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1e1e1e;
color:white;
}

.send,
.voice,
.upload{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
color:white;
}

.send{background:#2ecc71;}
.voice{background:#3498db;}
.upload{background:#9b59b6;}

.ai button{
margin-left:8px;
cursor:pointer;
border:none;
background:#222;
color:white;
padding:4px 6px;
border-radius:5px;
}

.typing span{
height:6px;
width:6px;
background:#aaa;
border-radius:50%;
display:inline-block;
margin:2px;
animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="logo.jpeg">
Datta AI
</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputArea">

<div class="inputWrap">

<input id="message" placeholder="Ask anything">

<button class="send" onclick="send()">➤</button>

<button class="voice" onclick="startAssistant()">🎤</button>

<label class="upload">
📎
<input type="file" id="file" hidden onchange="uploadFile()">
</label>

</div>

</div>

</div>

<script>

/* SESSION FIX (NEW) */

if(!localStorage.getItem("sessionId")){
localStorage.setItem("sessionId",Date.now().toString())
}

/* STORAGE */

let chats = JSON.parse(localStorage.getItem("dattaChats")) || []
let currentChat = null
let speech = null

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("message")
let text=input.value.trim()
if(!text) return

const chatBox=document.getElementById("chat")

chatBox.innerHTML += `<div class="user">${text}</div>`
input.value=""

chatBox.innerHTML += `
<div id="loading" class="ai typing">
<span></span><span></span><span></span>
</div>
`

chatBox.scrollTop = chatBox.scrollHeight

try{

const res = await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
message:text,
sessionId:localStorage.getItem("sessionId")   /* NEW */
})
})

const data = await res.json()

document.getElementById("loading").remove()

chatBox.innerHTML += `
<div class="ai">
${data.reply}
<button onclick="speakText(this)">▶</button>
<button onclick="stopVoice()">⏹</button>
</div>
`

chatBox.scrollTop = chatBox.scrollHeight

/* SAVE CHAT */

if(!currentChat){

currentChat={
title:text.slice(0,40),
messages:[]
}

chats.unshift(currentChat)

}

currentChat.messages.push({role:"user",text:text})
currentChat.messages.push({role:"ai",text:data.reply})

localStorage.setItem("dattaChats",JSON.stringify(chats))
loadSidebar()

}catch{

document.getElementById("loading").innerText="Server error"

}

}

/* ENTER KEY */

document.getElementById("message").addEventListener("keypress",function(e){
if(e.key==="Enter"){ send() }
})

/* VOICE */

function speakText(btn){

const text = btn.parentElement.innerText
.replace("▶","")
.replace("⏹","")

speech = new SpeechSynthesisUtterance(text)
speech.lang="en-US"

speechSynthesis.speak(speech)

}

function stopVoice(){
speechSynthesis.cancel()
}

/* FILE */

function uploadFile(){

const file=document.getElementById("file").files[0]
if(!file) return

alert("File uploaded: "+file.name)

}

/* NEW CHAT (UPDATED) */

function newChat(){

localStorage.setItem("sessionId",Date.now().toString()) /* NEW */

currentChat=null
document.getElementById("chat").innerHTML=""
document.getElementById("message").focus()

}

/* SIDEBAR */

function loadSidebar(){

const history=document.getElementById("history")
history.innerHTML=""

chats.forEach((chat,index)=>{

let div=document.createElement("div")
div.innerText=chat.title

div.onclick=()=>openChat(index)

history.appendChild(div)

})

}

/* OPEN OLD CHAT */

function openChat(index){

currentChat=chats[index]

const chatBox=document.getElementById("chat")
chatBox.innerHTML=""

currentChat.messages.forEach(m=>{

if(m.role==="user"){
chatBox.innerHTML+=`<div class="user">${m.text}</div>`
}else{
chatBox.innerHTML+=`
<div class="ai">
${m.text}
<button onclick="speakText(this)">▶</button>
<button onclick="stopVoice()">⏹</button>
</div>`
}

})

}

/* AI VOICE ASSISTANT */

function startAssistant(){

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.lang = "en-US"

recognition.start()

recognition.onresult = function(event){

const voiceText = event.results[0][0].transcript
document.getElementById("message").value = voiceText
send()

}

}

/* LOAD HISTORY */

loadSidebar()

</script>

</body>
</html>
