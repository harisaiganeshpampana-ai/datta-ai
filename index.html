<!DOCTYPE html>
<html>
<head>
<title>Datta AI</title>

<style>

body{
background:#0b1a33;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:40px;
}

#messages{
background:#0f2345;
padding:20px;
border-radius:10px;
text-align:left;
min-height:200px;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
background:#16a34a;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Datta AI</h1>
<p>Your AI assistant for learning and technology</p>

<div id="messages"></div>

<input id="userInput" placeholder="Ask something..." />
<button onclick="send()">Send</button>

</div>

<script>

async function send(){

let inputBox = document.getElementById("userInput");
let input = inputBox.value.trim();

if(!input) return;

let messages = document.getElementById("messages");

/* USER MESSAGE */

let userRow = document.createElement("div");
userRow.innerHTML = "<p><b>You:</b> "+input+"</p>";
messages.appendChild(userRow);

/* AI MESSAGE PLACEHOLDER */

let aiRow = document.createElement("div");
aiRow.innerHTML = "<p><b>Datta AI:</b> Thinking...</p>";
messages.appendChild(aiRow);

inputBox.value="";

try{

const response = await fetch(
"https://datta-ai-server.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:input})
}
);

const data = await response.json();

/* UPDATE ONLY THIS ROW */

aiRow.innerHTML = "<p><b>Datta AI:</b> "+data.reply+"</p>";

}catch(err){

aiRow.innerHTML = "<p><b>Datta AI:</b> Server error</p>";

}

}

</script>

</body>
</html>
