<!DOCTYPE html>
<html lang="en">
<head>
<script>
// ── INLINE PLAN GUARD — runs before page renders ──────
(function() {
  var FEATURES = {
    arambh:  {smartMemory: false},
    shakti:  {smartMemory: true},
    agni:    {smartMemory: true},
    brahma:  {smartMemory: true}
  };
  function isCreator() {
    try {
      var u = (JSON.parse(localStorage.getItem('datta_user')||'{}').username||'').toLowerCase();
      return ['pampana_hari_sai_ganesh','harisaiganesh','ganesh','admin','creator','dattaai'].some(function(c){return u.indexOf(c)!==-1});
    } catch(e){return false;}
  }
  if (isCreator()) return;
  var plan = localStorage.getItem('datta_plan') || 'arambh';
  var allowed = FEATURES[plan] && FEATURES[plan]['smartMemory'] === true;
  if (!allowed) {
    var PLAN_NAMES = {arambh:'🌱 Arambh (Free)', shakti:'⚡ Shakti', agni:'🔥 Agni', brahma:'👑 Brahma'};
    var UNLOCK_PLAN = '⚡ Shakti';
    var FEATURE_DISPLAY = '🧾 Smart Memory';
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'none';
    });
    // Redirect immediately before any content shows
    document.write('<html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080800;color:#fff8e7;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}</style></head><body><div><div style="font-size:60px;margin-bottom:16px">🔒</div><div style="font-family:sans-serif;font-size:22px;font-weight:700;color:#ffd700;letter-spacing:3px;margin-bottom:8px">' + FEATURE_DISPLAY + '</div><div style="font-size:13px;color:#665500;margin-bottom:6px">Requires ' + UNLOCK_PLAN + ' plan or higher</div><div style="font-size:12px;color:#443300;margin-bottom:24px">You are on ' + (PLAN_NAMES[plan]||plan) + '</div><button onclick="window.location.href='pricing.html'" style="padding:13px 32px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:50px;color:#000;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:10px;display:block;width:100%;max-width:260px;margin:0 auto 10px">👑 UPGRADE NOW</button><br><button onclick="window.history.back()" style="padding:10px 24px;background:none;border:1px solid rgba(255,215,0,0.2);border-radius:50px;color:#665500;font-size:12px;cursor:pointer;margin-top:10px">← Go Back</button></div></body></html>');
    document.close();
    return;
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Memory | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }
.topbar { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(20px); }
.back { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px; }
.back:hover { color:var(--accent); }
.pageTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#00ff88,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.main { padding:70px 16px 40px;max-width:600px;margin:0 auto; }
.emptyState { text-align:center;padding:60px 20px;color:#443300; }
.emptyState div:first-child { font-size:48px;margin-bottom:16px; }
.memCard { background:#0f0e00;border:1px solid rgba(0,255,136,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px; }
.memKey { font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;color:#332200;margin-bottom:3px; }
.memVal { font-size:14px;color:#fff8e7; }
.delBtn { background:none;border:none;color:#332200;cursor:pointer;font-size:16px;padding:4px;margin-left:auto; }
.delBtn:hover { color:#ff4444; }
.clearBtn { width:100%;padding:12px;background:none;border:1px solid rgba(255,60,60,0.2);border-radius:50px;color:#ff4444;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;margin-top:20px; }
.tipBox { background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.1);border-radius:14px;padding:14px;margin-bottom:20px;font-size:13px;color:#443300;line-height:1.6; }
.tipBox b { color:#00ff88; }
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="pageTitle">🧾 Smart Memory</div>
</div>
<div class="main">
  <div class="tipBox">
    <b>How it works:</b> Datta AI automatically remembers facts you share in chat.<br>
    Try saying: <b>"My name is..."</b> · <b>"I work at..."</b> · <b>"I love..."</b>
  </div>
  <div id="memList"></div>
  <button class="clearBtn" onclick="clearAll()">🗑️ Clear All Memories</button>
</div>
<script src="theme.js"></script>
<script>
function getMemory() {
  try { return JSON.parse(localStorage.getItem("datta_memory") || "{}") } catch { return {} }
}
function render() {
  const memory = getMemory()
  const keys = Object.keys(memory).filter(k => !k.endsWith("_time"))
  const list = document.getElementById("memList")
  if (keys.length === 0) {
    list.innerHTML = '<div class="emptyState"><div>🌱</div><div style="font-family:Rajdhani,sans-serif;font-size:14px;letter-spacing:1px;">No memories yet.<br>Start chatting to build your memory!</div></div>'
    return
  }
  list.innerHTML = keys.map(k => `
    <div class="memCard">
      <div style="flex:1">
        <div class="memKey">${k.replace(/_/g," ").toUpperCase()}</div>
        <div class="memVal">${memory[k]}</div>
      </div>
      <button class="delBtn" onclick="del('${k}')">🗑</button>
    </div>`).join("")
}
function del(key) {
  const m = getMemory()
  delete m[key]; delete m[key+"_time"]
  localStorage.setItem("datta_memory", JSON.stringify(m))
  render()
}
function clearAll() {
  if (confirm("Clear all memories?")) {
    localStorage.removeItem("datta_memory")
    render()
  }
}
render()
</script>
</body>
</html>
