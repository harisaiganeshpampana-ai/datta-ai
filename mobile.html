<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
padding:14px;
border-bottom:1px solid #333;
}

.header img{
width:22px;
margin-right:8px;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

/* INPUT */

.input{
display:flex;
padding:10px;
border-top:1px solid #333;
background:#1e1e1e;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:20px;
font-size:16px;
}

.send{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:20px;
margin-left:8px;
}

</style>

</head>

<body>

<div class="header">
<img src="logo.jpeg">
<b>Datta AI</b>
</div>

<div id="chatbox"></div>

<div class="input">
<input id="msg" placeholder="Ask anything...">
<button class="send" onclick="send()">➤</button>
</div>

<script>

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

const input=document.getElementById("msg")
let message=input.value.trim()

if(!message) return

message=message.charAt(0).toUpperCase()+message.slice(1)

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${message}</div>`

input.value=""

const id="t"+Date.now()

chat.innerHTML+=`<div class="ai" id="${id}">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

document.getElementById(id).remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById(id).innerText="Server error"

}

}

</script>

</body>
</html>
