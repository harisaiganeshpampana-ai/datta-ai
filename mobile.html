<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

/* INTRO ANIMATION */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1e1e;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
animation:fadeout 1s ease 2s forwards;
}

#intro img{
width:90px;
margin-bottom:10px;
}

@keyframes fadeout{
to{
opacity:0;
visibility:hidden;
}
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
border-bottom:1px solid #333;
padding:0 10px;
}

.menu{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.header img{
width:22px;
margin-right:6px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-240px;
width:240px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
z-index:1000;
}

.sidebar.open{
left:0;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#222;
border:none;
color:white;
border-radius:6px;
}

/* CHAT */

#chatbox{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

/* MESSAGE BUBBLES */

.user{
align-self:flex-end;
background:#00a67e;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

.ai{
align-self:flex-start;
background:#333;
padding:10px 14px;
border-radius:12px;
max-width:80%;
}

/* INPUT */

.input{
height:70px;
display:flex;
align-items:center;
padding:10px;
border-top:1px solid #333;
background:#1e1e1e;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:20px;
font-size:16px;
}

.send{
width:45px;
height:45px;
border-radius:50%;
background:#00a67e;
border:none;
color:white;
font-size:20px;
margin-left:8px;
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">
<img src="logo.jpeg">
<h2>Datta AI</h2>
</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<button onclick="newChat()">+ New Chat</button>

<div id="history"></div>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<img src="logo.jpeg">

<b>Datta AI</b>

</div>

<!-- CHAT -->

<div id="chatbox"></div>

<!-- INPUT -->

<div class="input">

<input id="msg" placeholder="Ask anything...">

<button class="send" onclick="send()">➤</button>

</div>

<script>

/* ENTER SEND */

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

/* SIDEBAR */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open")
}

/* STORAGE */

let chats=JSON.parse(localStorage.getItem("dattaChats"))||{}
let current=null

function save(){
localStorage.setItem("dattaChats",JSON.stringify(chats))
}

/* SIDEBAR LIST */

function render(){

const box=document.getElementById("history")
box.innerHTML=""

for(const id in chats){

const btn=document.createElement("button")
btn.innerText=chats[id].title
btn.onclick=()=>load(id)

box.appendChild(btn)

}

}

/* NEW CHAT */

function newChat(){
current=null
document.getElementById("chatbox").innerHTML=""
}

/* LOAD */

function load(id){

current=id

const chat=document.getElementById("chatbox")
chat.innerHTML=""

chats[id].messages.forEach(m=>{
chat.innerHTML+=`<div class="${m.role}">${m.text}</div>`
})

}

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("msg")
let message=input.value.trim()

if(!message) return

message=message.charAt(0).toUpperCase()+message.slice(1)

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${message}</div>`

input.value=""

if(!current){

current=Date.now()

chats[current]={
title:message.substring(0,40),
messages:[]
}

}

chats[current].messages.push({role:"user",text:message})

save()
render()

const thinking="t"+Date.now()

chat.innerHTML+=`<div class="ai" id="${thinking}">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

document.getElementById(thinking).remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chats[current].messages.push({role:"ai",text:data.reply})

save()

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById(thinking).innerText="Server error"

}

}

render()

</script>

</body>
</html>
