<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }
.topbar { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(20px); }
.back { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px;transition:color 0.2s; }
.back:hover { color:var(--accent); }
.pageTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#ec4899,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.main { padding:70px 16px 120px;max-width:700px;margin:0 auto; }

.grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px; }
@media(min-width:500px){ .grid { grid-template-columns:1fr 1fr 1fr; } }

.card { background:#0f0e00;border:2px solid rgba(255,215,0,0.07);border-radius:16px;padding:18px 12px;cursor:pointer;transition:all 0.2s;text-align:center;user-select:none; }
.card:hover { transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.card.active { transform:translateY(-2px); }
.card .emoji { font-size:32px;margin-bottom:8px;display:block; }
.card .name { font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:3px; }
.card .desc { font-size:11px;color:#443300; }

.player { position:fixed;bottom:0;left:0;right:0;background:#0a0900;border-top:1px solid rgba(255,215,0,0.1);z-index:50; }
.playerBar { display:flex;align-items:center;gap:12px;padding:10px 16px;max-width:700px;margin:0 auto; }
.playerInfo { flex:1;min-width:0; }
.playerName { font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px; }
.playerDesc { font-size:11px;color:#443300;margin-top:1px; }
.playerEmoji { font-size:24px;flex-shrink:0; }
.expandBtn { background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.15);border-radius:8px;color:var(--accent);font-size:11px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;padding:5px 12px;cursor:pointer;white-space:nowrap; }

.playerFull { max-height:0;overflow:hidden;transition:max-height 0.4s ease; }
.playerFull.open { max-height:260px; }
.playerFull iframe { width:100%;height:220px;border:none;display:block; }

.emptyState { text-align:center;padding:40px 20px;color:#443300; }
.emptyState .big { font-size:48px;margin-bottom:12px; }
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="pageTitle">🎵 Music Player</div>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<!-- FIXED BOTTOM PLAYER -->
<div class="player" id="player" style="display:none;">
  <div class="playerBar">
    <span class="playerEmoji" id="pEmoji">🎵</span>
    <div class="playerInfo">
      <div class="playerName" id="pName">—</div>
      <div class="playerDesc" id="pDesc">Select a mood above</div>
    </div>
    <button class="expandBtn" onclick="togglePlayer()">▲ OPEN</button>
  </div>
  <div class="playerFull" id="playerFull">
    <iframe id="musicFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
const SONGS = [
  { key:"happy",    emoji:"😄", name:"Happy",           color:"#ffd700", desc:"Feel good & upbeat",      vid:"H-2j5IIbEKw" },
  { key:"telugu",   emoji:"🎬", name:"Telugu Hits",     color:"#a855f7", desc:"Tollywood blockbusters",  vid:"xdSKyEt6kSA" },
  { key:"bollywood",emoji:"🇮🇳", name:"Bollywood",      color:"#f43f5e", desc:"Hindi superhits",         vid:"Cez_YsMUXCY"  },
  { key:"healing",  emoji:"🫂", name:"Healing",         color:"#22c55e", desc:"Meditation & calm",       vid:"lFcSrYw2ARY"  },
  { key:"classical",emoji:"🎻", name:"Indian Classical",color:"#eab308", desc:"Ragas & classical",       vid:"Y_OOafCBmgs"  },
  { key:"workout",  emoji:"💪", name:"Workout",         color:"#ef4444", desc:"Gym & energy beats",      vid:"igyR3UIXwAs"  },
  { key:"rock",     emoji:"🎸", name:"Rock & Indie",    color:"#818cf8", desc:"Rock classics & indie",   vid:"dQw4w9WgXcQ"  },
]

let currentKey = null
let playerOpen = false

const grid = document.getElementById("grid")

SONGS.forEach(s => {
  const card = document.createElement("div")
  card.className = "card"
  card.id = "card-" + s.key
  card.style.borderColor = "rgba(255,215,0,0.07)"
  card.innerHTML = `
    <span class="emoji">${s.emoji}</span>
    <div class="name" style="color:${s.color}">${s.name}</div>
    <div class="desc">${s.desc}</div>
  `
  card.onclick = () => play(s)
  grid.appendChild(card)
})

function play(s) {
  // Deactivate all
  SONGS.forEach(x => {
    const c = document.getElementById("card-" + x.key)
    if (c) { c.classList.remove("active"); c.style.borderColor = "rgba(255,215,0,0.07)" }
  })

  // Activate selected
  const card = document.getElementById("card-" + s.key)
  if (card) { card.classList.add("active"); card.style.borderColor = s.color + "66" }

  // Update player bar
  document.getElementById("pEmoji").textContent = s.emoji
  document.getElementById("pName").textContent = s.name
  document.getElementById("pDesc").textContent = s.desc
  document.getElementById("pName").style.color = s.color

  // Load iframe
  document.getElementById("musicFrame").src =
    `https://www.youtube.com/embed/${s.vid}?autoplay=1&controls=1&modestbranding=1&rel=0`

  // Show player
  document.getElementById("player").style.display = "block"

  // Auto open player
  if (!playerOpen) togglePlayer()
  currentKey = s.key
}

function togglePlayer() {
  const full = document.getElementById("playerFull")
  const btn = document.querySelector(".expandBtn")
  playerOpen = !playerOpen
  full.classList.toggle("open", playerOpen)
  btn.textContent = playerOpen ? "▼ CLOSE" : "▲ OPEN"
}
</script>
</body>
</html>
