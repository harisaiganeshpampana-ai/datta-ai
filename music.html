<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }
.topbar { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(20px); }
.back { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px; }
.back:hover { color:var(--accent); }
.pageTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#ec4899,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.main { padding:70px 16px 40px;max-width:600px;margin:0 auto; }
.moodGrid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px; }
.moodCard { background:#0f0e00;border:1px solid rgba(255,215,0,0.08);border-radius:14px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:center; }
.moodCard:hover, .moodCard.active { transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4); }
.moodCard .emoji { font-size:28px;margin-bottom:6px; }
.moodCard .name { font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px; }
.moodCard .desc { font-size:11px;color:#443300;margin-top:2px; }
.player { background:#0f0e00;border:1px solid rgba(255,215,0,0.1);border-radius:16px;overflow:hidden; }
.playerLabel { padding:12px 16px;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:2px;color:#443300;border-bottom:1px solid rgba(255,215,0,0.06); }
iframe { width:100%;height:220px;border:none;display:block; }
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="pageTitle">🎵 Music Player</div>
</div>
<div class="main">
  <div class="moodGrid" id="moodGrid"></div>
  <div class="player">
    <div class="playerLabel" id="playerLabel">🎧 Select a mood to play music</div>
    <iframe id="musicFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>
<script>
const PLAYLISTS = {
  focused:  { emoji:"🎯", name:"Focused",     color:"#00ccff", desc:"Lo-Fi study beats",    vid:"jfKfPfyJRdk" },
  happy:    { emoji:"😄", name:"Happy",       color:"#ffd700", desc:"Upbeat feel good",      vid:"H-2j5IIbEKw" },
  stressed: { emoji:"😮‍💨", name:"Stressed",  color:"#00ff88", desc:"Calm & relaxing",      vid:"1ZYbU82GVz4" },
  creative: { emoji:"🎨", name:"Creative",    color:"#c084fc", desc:"Creative flow state",   vid:"DWcJFNfaw9c" },
  lazy:     { emoji:"😴", name:"Lazy",        color:"#f97316", desc:"Chill sunday beats",    vid:"4oStw0r33so" },
  curious:  { emoji:"🔍", name:"Curious",     color:"#ec4899", desc:"Deep focus music",      vid:"WPni755-Krg" },
  night:    { emoji:"🌙", name:"Night Brain", color:"#818cf8", desc:"Late night lo-fi",      vid:"rUxyKA_-grg" },
  support:  { emoji:"🫂", name:"Healing",     color:"#00ff88", desc:"Healing meditation",    vid:"lFcSrYw2ARY" },
}
const grid = document.getElementById("moodGrid")
let active = null

// Auto-load saved mood
const savedMood = localStorage.getItem("datta_mood") || "focused"

Object.entries(PLAYLISTS).forEach(([key, pl]) => {
  const card = document.createElement("div")
  card.className = "moodCard" + (key === savedMood ? " active" : "")
  card.style.borderColor = key === savedMood ? pl.color+"44" : ""
  card.innerHTML = `<div class="emoji">${pl.emoji}</div><div class="name" style="color:${pl.color}">${pl.name}</div><div class="desc">${pl.desc}</div>`
  card.onclick = () => play(key, card)
  grid.appendChild(card)
})

function play(key, card) {
  document.querySelectorAll(".moodCard").forEach(c => { c.classList.remove("active"); c.style.borderColor="" })
  card.classList.add("active")
  card.style.borderColor = PLAYLISTS[key].color + "44"
  const pl = PLAYLISTS[key]
  document.getElementById("playerLabel").textContent = `${pl.emoji} ${pl.name} — ${pl.desc}`
  document.getElementById("musicFrame").src = `https://www.youtube.com/embed/${pl.vid}?autoplay=1&controls=1&modestbranding=1&rel=0`
}

// Auto-play saved mood
setTimeout(() => {
  const card = grid.children[Object.keys(PLAYLISTS).indexOf(savedMood)]
  if (card) play(savedMood, card)
}, 500)
</script>
</body>
</html>
