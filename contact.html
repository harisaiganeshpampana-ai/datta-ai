<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Datta AI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
  }

  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    color: #555;
    font-size: 13px;
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #00ff88; }
  input::placeholder { color: #444; }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00cc6a, #00aaff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    margin-top: 18px;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
  }

  .msg.success {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.25);
    color: #00ff88;
  }

  .msg.error {
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.25);
    color: #ff4444;
  }

  .back {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #444;
    font-size: 13px;
    text-decoration: none;
  }
  .back:hover { color: #888; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">DATTA AI</div>
  <div class="subtitle">Get in touch — we'll reply shortly</div>

  <label>Your Name</label>
  <input id="nameInput" type="text" placeholder="e.g. Venu, రాజు, राज" autocomplete="name">

  <label>Email Address</label>
  <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="email">

  <button id="submitBtn" onclick="submitForm()">Send Message</button>

  <div class="msg" id="msg"></div>

  <a href="index.html" class="back">← Back to Datta AI</a>
</div>

<script>
const SERVER = "https://datta-ai-server.onrender.com"

async function submitForm() {
  const name  = document.getElementById("nameInput").value.trim()
  const email = document.getElementById("emailInput").value.trim()
  const btn   = document.getElementById("submitBtn")
  const msg   = document.getElementById("msg")

  // Reset
  msg.style.display = "none"
  msg.className = "msg"

  // Validate
  if (!name) { showMsg("error", "Please enter your name."); return }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg("error", "Please enter a valid email address.")
    return
  }

  // Loading state
  btn.disabled = true
  btn.textContent = "Sending..."

  try {
    const res = await fetch(SERVER + "/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email })
    })

    const data = await res.json()

    if (res.ok && data.success) {
      showMsg("success", "✓ Email sent! Welcome to Datta AI, " + name + " 🎉")
      document.getElementById("nameInput").value = ""
      document.getElementById("emailInput").value = ""
    } else {
      showMsg("error", data.error || "Something went wrong. Please try again.")
    }
  } catch(err) {
    showMsg("error", "Connection failed. Check your internet and try again.")
  } finally {
    btn.disabled = false
    btn.textContent = "Send Message"
  }
}

function showMsg(type, text) {
  const el = document.getElementById("msg")
  el.className = "msg " + type
  el.textContent = text
  el.style.display = "block"
}

// Allow Enter key to submit
document.addEventListener("keydown", e => {
  if (e.key === "Enter") submitForm()
})
</script>

</body>
</html>
