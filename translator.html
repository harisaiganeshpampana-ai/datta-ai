<!DOCTYPE html>
<html lang="en">
<head>
<script>
// ── INLINE PLAN GUARD — runs before page renders ──────
(function() {
  var FEATURES = {
    arambh:  {translator: false},
    shakti:  {translator: true},
    agni:    {translator: true},
    brahma:  {translator: true}
  };
  function isCreator() {
    try {
      var u = (JSON.parse(localStorage.getItem('datta_user')||'{}').username||'').toLowerCase();
      return ['pampana_hari_sai_ganesh','harisaiganesh','ganesh','admin','creator','dattaai'].some(function(c){return u.indexOf(c)!==-1});
    } catch(e){return false;}
  }
  if (isCreator()) return;
  var plan = localStorage.getItem('datta_plan') || 'arambh';
  var allowed = FEATURES[plan] && FEATURES[plan]['translator'] === true;
  if (!allowed) {
    var PLAN_NAMES = {arambh:'🌱 Arambh (Free)', shakti:'⚡ Shakti', agni:'🔥 Agni', brahma:'👑 Brahma'};
    var UNLOCK_PLAN = '⚡ Shakti';
    var FEATURE_DISPLAY = '🌍 Translator';
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'none';
    });
    // Redirect immediately before any content shows
    document.write('<html><head><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080800;color:#fff8e7;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}</style></head><body><div><div style="font-size:60px;margin-bottom:16px">🔒</div><div style="font-family:sans-serif;font-size:22px;font-weight:700;color:#ffd700;letter-spacing:3px;margin-bottom:8px">' + FEATURE_DISPLAY + '</div><div style="font-size:13px;color:#665500;margin-bottom:6px">Requires ' + UNLOCK_PLAN + ' plan or higher</div><div style="font-size:12px;color:#443300;margin-bottom:24px">You are on ' + (PLAN_NAMES[plan]||plan) + '</div><button onclick="window.location.href='pricing.html'" style="padding:13px 32px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:50px;color:#000;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:10px;display:block;width:100%;max-width:260px;margin:0 auto 10px">👑 UPGRADE NOW</button><br><button onclick="window.history.back()" style="padding:10px 24px;background:none;border:1px solid rgba(255,215,0,0.2);border-radius:50px;color:#665500;font-size:12px;cursor:pointer;margin-top:10px">← Go Back</button></div></body></html>');
    document.close();
    return;
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translator | Datta AI</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<link rel="stylesheet" href="theme-vars.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#080800;color:#fff8e7;font-family:'DM Sans',sans-serif;min-height:100vh; }
.topbar { position:fixed;top:0;left:0;right:0;height:54px;background:rgba(8,8,0,0.96);border-bottom:1px solid rgba(255,215,0,0.1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(20px); }
.back { background:none;border:none;color:#665500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px; }
.back:hover { color:var(--accent); }
.pageTitle { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#00ccff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.main { padding:70px 16px 40px;max-width:600px;margin:0 auto; }
textarea { width:100%;height:120px;background:#0f0e00;border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:14px;color:#fff8e7;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;margin-bottom:10px; }
textarea:focus { border-color:rgba(0,204,255,0.3); }
select { width:100%;background:#0f0e00;border:1px solid rgba(255,215,0,0.1);border-radius:12px;padding:10px 14px;color:#fff8e7;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;margin-bottom:10px; }
.transBtn { width:100%;padding:13px;background:rgba(0,204,255,0.1);border:1px solid rgba(0,204,255,0.3);border-radius:50px;color:#00ccff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:14px; }
.transBtn:hover { background:rgba(0,204,255,0.18); }
.output { min-height:100px;background:#0f0e00;border:1px solid rgba(255,215,0,0.08);border-radius:14px;padding:14px;font-size:14px;color:#665500;line-height:1.7;margin-bottom:10px; }
.copyBtn { width:100%;padding:10px;background:none;border:1px solid rgba(255,215,0,0.12);border-radius:50px;color:#443300;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1px;cursor:pointer; }
.copyBtn:hover { color:var(--accent);border-color:rgba(255,215,0,0.3); }
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="window.location.href='index.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="pageTitle">🌍 Translator</div>
</div>
<div class="main">
  <textarea id="input" placeholder="Type or paste text to translate..."></textarea>
  <select id="langSelect">
    <option value="English">🇺🇸 English</option>
    <option value="Hindi">🇮🇳 Hindi</option>
    <option value="Telugu">🇮🇳 Telugu</option>
    <option value="Tamil">🇮🇳 Tamil</option>
    <option value="Kannada">🇮🇳 Kannada</option>
    <option value="Malayalam">🇮🇳 Malayalam</option>
    <option value="Bengali">🇮🇳 Bengali</option>
    <option value="Marathi">🇮🇳 Marathi</option>
    <option value="Gujarati">🇮🇳 Gujarati</option>
    <option value="Punjabi">🇮🇳 Punjabi</option>
    <option value="Urdu">🇵🇰 Urdu</option>
    <option value="Spanish">🇪🇸 Spanish</option>
    <option value="French">🇫🇷 French</option>
    <option value="German">🇩🇪 German</option>
    <option value="Arabic">🇸🇦 Arabic</option>
    <option value="Chinese">🇨🇳 Chinese</option>
    <option value="Japanese">🇯🇵 Japanese</option>
    <option value="Korean">🇰🇷 Korean</option>
    <option value="Portuguese">🇧🇷 Portuguese</option>
    <option value="Russian">🇷🇺 Russian</option>
    <option value="Italian">🇮🇹 Italian</option>
    <option value="Turkish">🇹🇷 Turkish</option>
  </select>
  <button class="transBtn" onclick="runTranslate()">🌍 TRANSLATE</button>
  <div class="output" id="output">Translation will appear here...</div>
  <button class="copyBtn" onclick="copy()">📋 Copy Translation</button>
</div>
<script>
async function runTranslate() {
  const text = document.getElementById("input").value.trim()
  const lang = document.getElementById("langSelect").value
  const out = document.getElementById("output")
  const btn = document.querySelector(".transBtn")
  if (!text) { out.textContent = "Please enter text to translate!"; return }

  const token = localStorage.getItem("datta_token") || ""
  if (!token) {
    out.style.color = "#ff4444"
    out.textContent = "Please log in to Datta AI first to use the translator."
    return
  }

  out.style.color = "#443300"
  out.textContent = "Translating..."
  btn.textContent = "⏳ Translating..."
  btn.disabled = true

  try {
    const fd = new FormData()
    fd.append("message", `Translate the following text to ${lang}. Reply with ONLY the translated text, nothing else, no explanation: "${text}"`)
    fd.append("token", token)
    const res = await fetch("https://datta-ai-server.onrender.com/chat", { method:"POST", body:fd })
    if (!res.ok) throw new Error("Server error")
    const reader = res.body.getReader()
    const dec = new TextDecoder()
    let result = ""
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      result += dec.decode(value)
    }
    out.style.color = "#fff8e7"
    out.textContent = result.split("CHATID")[0].trim()
  } catch(e) {
    out.style.color = "#ff4444"
    out.textContent = "Translation failed. Make sure you are logged in and try again."
  } finally {
    btn.textContent = "🌍 TRANSLATE"
    btn.disabled = false
  }
}
function copy() {
  const t = document.getElementById("output").textContent
  navigator.clipboard.writeText(t)
  document.querySelector(".copyBtn").textContent = "✓ Copied!"
  setTimeout(() => document.querySelector(".copyBtn").textContent = "📋 Copy Translation", 2000)
}
</script>
</body>
</html>
