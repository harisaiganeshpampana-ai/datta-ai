<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Datta AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#1e1e1e;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
padding:0 15px;
border-bottom:1px solid #333;
flex-shrink:0;
}

.logo{
width:26px;
margin-right:8px;
}

/* CHAT AREA */

#chatbox{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGE */

.user{
background:#00a67e;
padding:10px 14px;
border-radius:14px;
margin:8px 0;
align-self:flex-end;
max-width:80%;
}

.ai{
background:#333;
padding:10px 14px;
border-radius:14px;
margin:8px 0;
align-self:flex-start;
max-width:80%;
}

/* INPUT AREA */

.input-area{
height:70px;
display:flex;
padding:10px;
background:#1e1e1e;
border-top:1px solid #333;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:25px;
font-size:16px;
outline:none;
}

.send{
width:45px;
height:45px;
margin-left:8px;
border:none;
border-radius:50%;
background:#00a67e;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<img src="logo.jpeg" class="logo">
<b>Datta AI</b>
</div>

<div id="chatbox">
<div class="ai">Hello! How can I assist you today?</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Ask anything...">
<button class="send" onclick="send()">➤</button>
</div>

<script>

const input=document.getElementById("msg")

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

let message=input.value.trim()

if(!message) return

const chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="user">${message}</div>`

input.value=""

chat.innerHTML+=`<div class="ai" id="thinking">Datta AI is thinking...</div>`

chat.scrollTop=chat.scrollHeight

try{

const res=await fetch("https://datta-ai-server.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

const data=await res.json()

document.getElementById("thinking").remove()

chat.innerHTML+=`<div class="ai">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}catch{

document.getElementById("thinking").innerText="Server error"

}

}

</script>

</body>
</html>
