<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Datta AI - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,Arial,sans-serif; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,255,136,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 24px 20px;
}
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
  animation: fadeDown 0.6s ease forwards;
}
.logoRing {
  position: relative;
  width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.logoRing::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #00ff88, #00ccff, #0066ff, #00ff88);
  animation: spin 3s linear infinite;
  filter: blur(2px);
  opacity: 0.8;
}
.logoRing::after {
  content: ''; position: absolute; inset: 1px;
  border-radius: 50%; background: #0a0a0a;
}
@keyframes spin { to { transform: rotate(360deg); } }
.logoRing img {
  width: 62px; height: 62px;
  border-radius: 50%; object-fit: cover;
  position: relative; z-index: 1;
}
.logoTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #00ff88, #00ccff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logoSub {
  font-size: 13px; color: #555;
  margin-top: 4px; letter-spacing: 1px;
}
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-20px); }
  to { opacity:1; transform:translateY(0); }
}
.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 20px;
  padding: 28px 24px;
  animation: fadeUp 0.6s ease 0.2s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.tabs {
  display: flex;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 9px;
  background: none; border: none;
  color: #666; font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.5px;
}
.tab.active {
  background: #222; color: white;
}
.formSection { display: none; }
.formSection.active { display: block; }
.formTitle {
  font-size: 20px; font-weight: 700;
  margin-bottom: 6px;
}
.formSub {
  font-size: 13px; color: #555;
  margin-bottom: 22px;
}
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 12px; color: #888;
  margin-bottom: 6px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.field input {
  width: 100%;
  padding: 12px 14px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: white; font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus {
  border-color: #00ff88;
}
.field input::placeholder { color: #444; }
.submitBtn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #00cc6a, #00aaff);
  border: none; border-radius: 12px;
  color: white; font-size: 15px;
  font-weight: 700; cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.1s;
}
.submitBtn:hover { opacity: 0.9; }
.submitBtn:active { transform: scale(0.98); }
.submitBtn:disabled { opacity: 0.5; cursor: not-allowed; }
.divider {
  display: flex; align-items: center;
  gap: 12px; margin: 20px 0;
  color: #444; font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #222;
}
.socialBtns {
  display: flex; flex-direction: column; gap: 10px;
}
.socialBtn {
  width: 100%; padding: 12px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  color: white; font-size: 14px;
  font-weight: 500; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.socialBtn:hover {
  background: #222; border-color: #333;
}
.socialBtn img { width: 20px; height: 20px; }
.phoneRow {
  display: flex; gap: 8px;
}
.phoneRow .countryCode {
  width: 80px; padding: 12px 10px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: white; font-size: 15px;
  outline: none;
}
.phoneRow .field { flex: 1; margin: 0; }
.guestBtn {
  width: 100%; padding: 12px;
  background: none;
  border: 1px dashed #2a2a2a;
  border-radius: 12px;
  color: #666; font-size: 14px;
  cursor: pointer; margin-top: 10px;
  transition: all 0.2s;
}
.guestBtn:hover { border-color: #444; color: #aaa; }
.msg {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}
.msg.error { background: #2a1010; border: 1px solid #441010; color: #ff6666; display: block; }
.msg.success { background: #0a2a1a; border: 1px solid #104410; color: #44ff88; display: block; }
.msg.warn { background: #2a2010; border: 1px solid #443010; color: #ffcc44; display: block; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block; vertical-align: middle;
  margin-right: 6px;
}
/* Server status indicator */
.serverStatus {
  font-size: 11px;
  color: #555;
  text-align: center;
  margin-top: 8px;
  display: none;
}
.serverStatus.visible { display: block; }
.serverStatus.waking { color: #ffaa00; }
.serverStatus.ready { color: #00ff88; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <div class="logoRing">
      <img src="logo.jpeg" alt="Datta AI">
    </div>
    <div class="logoTitle">Datta AI</div>
    <div class="logoSub">Your personal AI assistant</div>
    <div style="font-size:10px;color:#444;letter-spacing:2px;margin-top:6px;font-family:'Rajdhani',sans-serif;">v2.0 SHAKTI</div>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- ERROR/SUCCESS MSG -->
    <div class="msg" id="msg"></div>

    <!-- LOGIN SECTION -->
    <div class="formSection active" id="loginSection">
      <div class="formTitle">Welcome back</div>
      <div class="formSub">Login to continue to Datta AI</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="submitBtn" id="loginBtn" onclick="handleLogin()">Login</button>
      <div class="divider">or continue with</div>
      <div class="socialBtns">
        <button class="socialBtn" onclick="handleGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continue with Google
        </button>
        <button class="socialBtn" onclick="switchTab('phone')">
          📱 Continue with Phone
        </button>
      </div>
      <button class="guestBtn" onclick="handleGuest()">
        👤 Continue as Guest
      </button>
    </div>

    <!-- SIGNUP SECTION -->
    <div class="formSection" id="signupSection">
      <div class="formTitle">Create account</div>
      <div class="formSub">Join Datta AI for free</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUsername" placeholder="Choose a username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters">
      </div>
      <button class="submitBtn" id="signupBtn" onclick="handleSignup()">Create Account</button>
      <div class="divider">or continue with</div>
      <div class="socialBtns">
        <button class="socialBtn" onclick="handleGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continue with Google
        </button>
      </div>
      <button class="guestBtn" onclick="handleGuest()">
        👤 Continue as Guest
      </button>
    </div>

    <!-- PHONE SECTION -->
    <div class="formSection" id="phoneSection">
      <div class="formTitle">Phone Login</div>
      <div class="formSub">We'll send a 6-digit OTP to your number</div>

      <div class="field">
        <label>Phone Number</label>
        <div class="phoneRow">
          <input class="countryCode" type="text" id="countryCode" value="+91">
          <div class="field">
            <input type="tel" id="phoneNumber" placeholder="9876543210" maxlength="10">
          </div>
        </div>
      </div>

      <!-- OTP field — hidden until OTP is sent -->
      <div class="field" id="otpField" style="display:none;">
        <label>OTP</label>
        <input type="number" id="otpCode" placeholder="Enter 6-digit OTP" maxlength="6">
      </div>

      <button class="submitBtn" id="phoneBtn" onclick="handlePhone()">Send OTP</button>
      <div class="serverStatus" id="serverStatus"></div>

      <button class="guestBtn" onclick="switchTab('login')" style="margin-top:10px;">
        ← Back to Login
      </button>
    </div>

  </div>
</div>

<script>
const SERVER = "https://datta-ai-server.onrender.com";

// ─── WAKE UP SERVER ON PAGE LOAD ────────────────────────────────────────────
// Render free tier sleeps after 15 min. Ping it immediately so it's ready.
(function wakeServer() {
  const status = document.getElementById("serverStatus");
  fetch(SERVER + "/health", { method: "GET" })
    .then(r => {
      if (r.ok) {
        status.textContent = "✅ Server ready";
        status.className = "serverStatus visible ready";
        setTimeout(() => status.classList.remove("visible"), 3000);
      }
    })
    .catch(() => {
      // Server is cold-starting, show warning only when on phone tab
      status.textContent = "⚠️ Server is waking up... (may take 30s)";
      status.className = "serverStatus visible waking";
    });
})();

// ─── HANDLE OAUTH TOKEN IN URL ───────────────────────────────────────────────
;(function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  if (token) {
    localStorage.setItem("datta_token", token);
    const userStr = params.get("user");
    if (userStr) {
      try { localStorage.setItem("datta_user", decodeURIComponent(userStr)); } catch(e) {}
    }
    const hasPlan = localStorage.getItem("datta_plan");
    window.location.replace(hasPlan ? "index.html" : "pricing.html");
  }
})();

// ─── CHECK IF ALREADY LOGGED IN ──────────────────────────────────────────────
window.addEventListener("load", function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("token")) return;
  const token = localStorage.getItem("datta_token");
  let user = null;
  try {
    const raw = localStorage.getItem("datta_user");
    if (raw && raw !== "null") user = JSON.parse(raw);
  } catch(e) {}
  if (token && user) window.location.href = "index.html";
  handleGoogleCallback();
});

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".formSection").forEach(s => s.classList.remove("active"));
  clearMsg();

  if (tab === "login") {
    document.querySelectorAll(".tab")[0].classList.add("active");
    document.getElementById("loginSection").classList.add("active");
  } else if (tab === "signup") {
    document.querySelectorAll(".tab")[1].classList.add("active");
    document.getElementById("signupSection").classList.add("active");
  } else if (tab === "phone") {
    document.getElementById("phoneSection").classList.add("active");
    // Show server status on phone tab so user knows if server is waking
    document.getElementById("serverStatus").classList.add("visible");
  }
}

// ─── MESSAGES ────────────────────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
}
function clearMsg() {
  const el = document.getElementById("msg");
  el.className = "msg";
  el.textContent = "";
}

// ─── EMAIL LOGIN ──────────────────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  clearMsg();
  if (!email || !password) return showMsg("Please fill in all fields", "error");

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in...';

  try {
    const res = await fetch(SERVER + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg(data.error || "Login failed", "error");
      btn.disabled = false; btn.textContent = "Login";
      return;
    }
    localStorage.setItem("datta_token", data.token);
    localStorage.setItem("datta_user", JSON.stringify(data.user));
    showMsg("Login successful! Redirecting...", "success");
    setTimeout(() => {
      const hasPlan = localStorage.getItem("datta_plan");
      window.location.href = hasPlan ? "index.html" : "pricing.html";
    }, 1000);
  } catch (e) {
    showMsg("Server is starting up. Please wait 30 seconds and try again.", "error");
    btn.disabled = false; btn.textContent = "Login";
  }
}

// ─── EMAIL SIGNUP ─────────────────────────────────────────────────────────────
async function handleSignup() {
  const username = document.getElementById("signupUsername").value.trim();
  const email = document.getElementById("signupEmail").value.trim();
  const password = document.getElementById("signupPassword").value;
  clearMsg();
  if (!username || !email || !password) return showMsg("Please fill in all fields", "error");
  if (password.length < 6) return showMsg("Password must be at least 6 characters", "error");
  if (username.length < 3) return showMsg("Username must be at least 3 characters", "error");

  const btn = document.getElementById("signupBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account...';

  try {
    const res = await fetch(SERVER + "/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      showMsg(data.error || "Signup failed", "error");
      btn.disabled = false; btn.textContent = "Create Account";
      return;
    }
    localStorage.setItem("datta_token", data.token);
    localStorage.setItem("datta_user", JSON.stringify(data.user));
    showMsg("Account created! Redirecting...", "success");
    setTimeout(() => window.location.href = "pricing.html", 1000);
  } catch (e) {
    showMsg("Server is starting up. Please wait 30 seconds and try again.", "error");
    btn.disabled = false; btn.textContent = "Create Account";
  }
}

// ─── PHONE OTP ────────────────────────────────────────────────────────────────
let otpSent = false;

async function handlePhone() {
  const code = document.getElementById("countryCode").value.trim();
  const phone = document.getElementById("phoneNumber").value.trim();
  const btn = document.getElementById("phoneBtn");
  const statusEl = document.getElementById("serverStatus");

  if (!otpSent) {
    // ── SEND OTP ──
    if (!phone || phone.length < 10) return showMsg("Enter a valid 10-digit phone number", "error");
    clearMsg();

    const fullPhone = code + phone;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending OTP...';
    statusEl.textContent = "Contacting server...";
    statusEl.className = "serverStatus visible waking";

    try {
      const res = await fetch(SERVER + "/auth/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: fullPhone })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || "Failed to send OTP. Check your Twilio setup.", "error");
        btn.disabled = false; btn.textContent = "Send OTP";
        statusEl.className = "serverStatus";
        return;
      }

      // SUCCESS — show OTP field
      otpSent = true;
      document.getElementById("otpField").style.display = "block";
      document.getElementById("otpCode").focus();
      btn.disabled = false;
      btn.textContent = "Verify OTP";
      statusEl.textContent = "✅ OTP sent!";
      statusEl.className = "serverStatus visible ready";
      showMsg("OTP sent to " + fullPhone, "success");

    } catch (e) {
      showMsg("Server is waking up (Render free tier). Please wait 30 seconds and try again.", "error");
      btn.disabled = false; btn.textContent = "Send OTP";
      statusEl.textContent = "⚠️ Server cold-starting, retry in 30s";
      statusEl.className = "serverStatus visible waking";
    }

  } else {
    // ── VERIFY OTP ──
    // FIX: use id="otpCode" — the one inside phoneSection (not any duplicate)
    const otp = document.getElementById("otpCode").value.trim();
    if (!otp || otp.length < 4) return showMsg("Enter the OTP you received", "error");
    clearMsg();

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verifying...';

    const fullPhone = document.getElementById("countryCode").value.trim()
                    + document.getElementById("phoneNumber").value.trim();

    try {
      const res = await fetch(SERVER + "/auth/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: fullPhone, otp })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || "Invalid OTP. Please try again.", "error");
        btn.disabled = false; btn.textContent = "Verify OTP";
        return;
      }

      localStorage.setItem("datta_token", data.token);
      localStorage.setItem("datta_user", JSON.stringify(data.user));
      showMsg("✅ Verified! Redirecting...", "success");
      setTimeout(() => {
        const hasPlan = localStorage.getItem("datta_plan");
        window.location.href = hasPlan ? "index.html" : "pricing.html";
      }, 1000);

    } catch (e) {
      showMsg("Server error. Please try again.", "error");
      btn.disabled = false; btn.textContent = "Verify OTP";
    }
  }
}

// Allow resend OTP — reset state
function resetOtp() {
  otpSent = false;
  document.getElementById("otpField").style.display = "none";
  document.getElementById("otpCode").value = "";
  document.getElementById("phoneBtn").textContent = "Send OTP";
  clearMsg();
}

// ─── GOOGLE LOGIN ─────────────────────────────────────────────────────────────
function handleGoogle() {
  window.location.href = SERVER + "/auth/google";
}

function handleGoogleCallback() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const userStr = params.get("user");
  const error = params.get("error");
  if (error) { showMsg("Google login failed. Please try again.", "error"); return; }
  if (token) {
    try {
      localStorage.setItem("datta_token", token);
      if (userStr) {
        const user = JSON.parse(decodeURIComponent(userStr));
        localStorage.setItem("datta_user", JSON.stringify(user));
      }
      window.history.replaceState({}, document.title, window.location.pathname);
      const hasPlan = localStorage.getItem("datta_plan");
      window.location.replace(hasPlan ? "index.html" : "pricing.html");
    } catch (e) {
      showMsg("Login error. Please try again.", "error");
    }
  }
}

// ─── GUEST LOGIN ──────────────────────────────────────────────────────────────
function handleGuest() {
  const guestId = "guest_" + Date.now();
  const guestUser = { username: "Guest", email: "", isGuest: true, id: guestId };
  localStorage.setItem("datta_token", "guest_" + guestId);
  localStorage.setItem("datta_user", JSON.stringify(guestUser));
  localStorage.setItem("datta_plan", "arambh");
  window.location.href = "index.html";
}

// ─── ENTER KEY SUPPORT ────────────────────────────────────────────────────────
document.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  const active = document.querySelector(".formSection.active");
  if (!active) return;
  if (active.id === "loginSection") handleLogin();
  else if (active.id === "signupSection") handleSignup();
  else if (active.id === "phoneSection") handlePhone();
});
</script>
</body>
</html>
