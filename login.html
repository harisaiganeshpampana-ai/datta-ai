<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Datta AI - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,Arial,sans-serif; }

body {
  min-height: 100vh;
  background: #0a0a0a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,255,136,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 24px 20px;
}

/* LOGO */
.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
  animation: fadeDown 0.6s ease forwards;
}

.logoRing {
  position: relative;
  width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}

.logoRing::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #00ff88, #00ccff, #0066ff, #00ff88);
  animation: spin 3s linear infinite;
  filter: blur(2px);
  opacity: 0.8;
}

.logoRing::after {
  content: ''; position: absolute; inset: 1px;
  border-radius: 50%; background: #0a0a0a;
}

@keyframes spin { to { transform: rotate(360deg); } }

.logoRing img {
  width: 62px; height: 62px;
  border-radius: 50%; object-fit: cover;
  position: relative; z-index: 1;
}

.logoTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #00ff88, #00ccff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logoSub {
  font-size: 13px; color: #555;
  margin-top: 4px; letter-spacing: 1px;
}

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* CARD */
.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 20px;
  padding: 28px 24px;
  animation: fadeUp 0.6s ease 0.2s both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* TABS */
.tabs {
  display: flex;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}

.tab {
  flex: 1; padding: 9px;
  background: none; border: none;
  color: #666; font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.5px;
}

.tab.active {
  background: #222; color: white;
}

/* FORM */
.formSection { display: none; }
.formSection.active { display: block; }

.formTitle {
  font-size: 20px; font-weight: 700;
  margin-bottom: 6px;
}

.formSub {
  font-size: 13px; color: #555;
  margin-bottom: 22px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 12px; color: #888;
  margin-bottom: 6px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase;
}

.field input {
  width: 100%;
  padding: 12px 14px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: white; font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus {
  border-color: #00ff88;
}

.field input::placeholder { color: #444; }

/* SUBMIT BTN */
.submitBtn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #00cc6a, #00aaff);
  border: none; border-radius: 12px;
  color: white; font-size: 15px;
  font-weight: 700; cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.1s;
}

.submitBtn:hover { opacity: 0.9; }
.submitBtn:active { transform: scale(0.98); }
.submitBtn:disabled { opacity: 0.5; cursor: not-allowed; }

/* DIVIDER */
.divider {
  display: flex; align-items: center;
  gap: 12px; margin: 20px 0;
  color: #444; font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #222;
}

/* SOCIAL BTNS */
.socialBtns {
  display: flex; flex-direction: column; gap: 10px;
}

.socialBtn {
  width: 100%; padding: 12px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  color: white; font-size: 14px;
  font-weight: 500; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s;
}

.socialBtn:hover {
  background: #222; border-color: #333;
}

.socialBtn img { width: 20px; height: 20px; }

/* PHONE ROW */
.phoneRow {
  display: flex; gap: 8px;
}

.phoneRow .countryCode {
  width: 80px; padding: 12px 10px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: white; font-size: 15px;
  outline: none;
}

.phoneRow .field { flex: 1; margin: 0; }

/* GUEST BTN */
.guestBtn {
  width: 100%; padding: 12px;
  background: none;
  border: 1px dashed #2a2a2a;
  border-radius: 12px;
  color: #666; font-size: 14px;
  cursor: pointer; margin-top: 10px;
  transition: all 0.2s;
}

.guestBtn:hover { border-color: #444; color: #aaa; }

/* ERROR / SUCCESS */
.msg {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}

.msg.error   { background: #2a1010; border: 1px solid #441010; color: #ff6666; display: block; }
.msg.success { background: #0a2a1a; border: 1px solid #104410; color: #44ff88; display: block; }

/* LOADING SPINNER */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block; vertical-align: middle;
  margin-right: 6px;
}

/* RESEND OTP */
.resendRow {
  display: none;
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #555;
}
.resendRow.visible { display: block; }
.resendBtn {
  background: none; border: none;
  color: #00ff88; font-size: 13px;
  cursor: pointer; text-decoration: underline;
  padding: 0;
}
.resendBtn:disabled { color: #555; cursor: not-allowed; text-decoration: none; }

/* OTP BOXES */
.otpBoxes {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 4px;
}
.otpBoxes input {
  width: 44px !important;
  height: 52px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  padding: 0 !important;
  border-radius: 10px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: white;
  outline: none;
  transition: border-color 0.2s;
  caret-color: #00ff88;
}
.otpBoxes input:focus { border-color: #00ff88; }
.otpBoxes input.filled { border-color: #00cc6a; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <div class="logoRing">
      <img src="logo.jpeg" alt="Datta AI">
    </div>
    <div class="logoTitle">Datta AI</div>
    <div class="logoSub">Your personal AI assistant</div>
    <div style="font-size:10px;color:#444;letter-spacing:2px;margin-top:6px;font-family:'Rajdhani',sans-serif;">v2.0 SHAKTI</div>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- ERROR/SUCCESS MSG -->
    <div class="msg" id="msg"></div>

    <!-- LOGIN SECTION -->
    <div class="formSection active" id="loginSection">
      <div class="formTitle">Welcome back</div>
      <div class="formSub">Login to continue to Datta AI</div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>

      <button class="submitBtn" id="loginBtn" onclick="handleLogin()">Login</button>

      <div class="divider">or continue with</div>

      <div class="socialBtns">
        <button class="socialBtn" onclick="handleGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continue with Google
        </button>
        <button class="socialBtn" onclick="switchTab('phone')">
          📱 Continue with Phone
        </button>
      </div>

      <button class="guestBtn" onclick="handleGuest()">
        👤 Continue as Guest
      </button>
    </div>

    <!-- SIGNUP SECTION -->
    <div class="formSection" id="signupSection">
      <div class="formTitle">Create account</div>
      <div class="formSub">Join Datta AI for free</div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUsername" placeholder="Choose a username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters">
      </div>

      <button class="submitBtn" id="signupBtn" onclick="handleSignup()">Create Account</button>

      <div class="divider">or continue with</div>

      <div class="socialBtns">
        <button class="socialBtn" onclick="handleGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continue with Google
        </button>
      </div>

      <button class="guestBtn" onclick="handleGuest()">
        👤 Continue as Guest
      </button>
    </div>

    <!-- PHONE / OTP SECTION -->
    <div class="formSection" id="phoneSection">
      <div class="formTitle">Phone Login</div>
      <div class="formSub" id="phoneSubText">Enter your phone number</div>

      <!-- Step 1: Phone number input -->
      <div id="phoneInputStep">
        <div class="field">
          <label>Phone Number</label>
          <div class="phoneRow">
            <input class="countryCode" type="text" id="countryCode" value="+91" maxlength="4">
            <div class="field">
              <input type="tel" id="phoneNumber" placeholder="9876543210" maxlength="10">
            </div>
          </div>
        </div>
        <button class="submitBtn" id="phoneBtn" onclick="handleSendOtp()">Send OTP</button>
      </div>

      <!-- Step 2: OTP verification (hidden initially) -->
      <div id="otpVerifyStep" style="display:none;">
        <div class="field">
          <label>Enter OTP sent to <span id="sentToLabel" style="color:#00ff88;"></span></label>
          <!-- 6 individual OTP boxes for better UX -->
          <div class="otpBoxes">
            <input type="tel" maxlength="1" class="otp-box" data-index="0">
            <input type="tel" maxlength="1" class="otp-box" data-index="1">
            <input type="tel" maxlength="1" class="otp-box" data-index="2">
            <input type="tel" maxlength="1" class="otp-box" data-index="3">
            <input type="tel" maxlength="1" class="otp-box" data-index="4">
            <input type="tel" maxlength="1" class="otp-box" data-index="5">
          </div>
        </div>
        <button class="submitBtn" id="verifyOtpBtn" onclick="handleVerifyOtp()">Verify OTP</button>

        <!-- Resend OTP with countdown -->
        <div class="resendRow visible" id="resendRow">
          <span id="resendTimerText">Resend OTP in <strong id="resendCountdown">30</strong>s</span>
          <button class="resendBtn" id="resendBtn" onclick="handleResendOtp()" disabled style="display:none;">Resend OTP</button>
        </div>

        <button class="guestBtn" onclick="resetPhoneStep()" style="margin-top:10px;">
          ✏️ Change Number
        </button>
      </div>

      <button class="guestBtn" onclick="switchTab('login')" style="margin-top:10px;">
        ← Back to Login
      </button>
    </div>

  </div>
</div>

<script>
const SERVER = "https://datta-ai-server.onrender.com"

// Run immediately on script load - don't wait for window load
;(function() {
  const params = new URLSearchParams(window.location.search)
  const token = params.get("token")
  if (token) {
    localStorage.setItem("datta_token", token)
    const userStr = params.get("user")
    if (userStr) {
      try {
        localStorage.setItem("datta_user", decodeURIComponent(userStr))
      } catch(e) {}
    }
    const hasPlan = localStorage.getItem("datta_plan")
    window.location.replace(hasPlan ? "index.html" : "pricing.html")
  }
})()

// Check if already logged in
window.addEventListener("load", function() {
  const params = new URLSearchParams(window.location.search)
  if (params.get("token")) return // already handling above

  const token = localStorage.getItem("datta_token")
  let user = null
  try {
    const raw = localStorage.getItem("datta_user")
    if (raw && raw !== "null") user = JSON.parse(raw)
  } catch(e) {}
  if (token && user) {
    window.location.href = "index.html"
  }

  handleGoogleCallback()
  initOtpBoxes()
})

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"))
  document.querySelectorAll(".formSection").forEach(s => s.classList.remove("active"))
  clearMsg()

  if (tab === "login") {
    document.querySelectorAll(".tab")[0].classList.add("active")
    document.getElementById("loginSection").classList.add("active")
  } else if (tab === "signup") {
    document.querySelectorAll(".tab")[1].classList.add("active")
    document.getElementById("signupSection").classList.add("active")
  } else if (tab === "phone") {
    document.getElementById("phoneSection").classList.add("active")
    resetPhoneStep()
  }
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────

function showMsg(text, type) {
  const el = document.getElementById("msg")
  el.textContent = text
  el.className = "msg " + type
}

function clearMsg() {
  const el = document.getElementById("msg")
  el.className = "msg"
  el.textContent = ""
}

// ─── EMAIL LOGIN ──────────────────────────────────────────────────────────────

async function handleLogin() {
  const email = document.getElementById("loginEmail").value.trim()
  const password = document.getElementById("loginPassword").value
  clearMsg()

  if (!email || !password) return showMsg("Please fill in all fields", "error")

  const btn = document.getElementById("loginBtn")
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Logging in...'

  try {
    const res = await fetch(SERVER + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })
    const data = await res.json()

    if (!res.ok) {
      showMsg(data.error || "Login failed", "error")
      btn.disabled = false
      btn.textContent = "Login"
      return
    }

    localStorage.setItem("datta_token", data.token)
    localStorage.setItem("datta_user", JSON.stringify(data.user))
    showMsg("Login successful! Redirecting...", "success")
    setTimeout(() => {
      const hasPlan = localStorage.getItem("datta_plan")
      window.location.href = hasPlan ? "index.html" : "pricing.html"
    }, 1000)

  } catch (e) {
    showMsg("Server error. Please try again.", "error")
    btn.disabled = false
    btn.textContent = "Login"
  }
}

// ─── EMAIL SIGNUP ─────────────────────────────────────────────────────────────

async function handleSignup() {
  const username = document.getElementById("signupUsername").value.trim()
  const email = document.getElementById("signupEmail").value.trim()
  const password = document.getElementById("signupPassword").value
  clearMsg()

  if (!username || !email || !password) return showMsg("Please fill in all fields", "error")
  if (password.length < 6) return showMsg("Password must be at least 6 characters", "error")
  if (username.length < 3) return showMsg("Username must be at least 3 characters", "error")

  const btn = document.getElementById("signupBtn")
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Creating account...'

  try {
    const res = await fetch(SERVER + "/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    })
    const data = await res.json()

    if (!res.ok) {
      showMsg(data.error || "Signup failed", "error")
      btn.disabled = false
      btn.textContent = "Create Account"
      return
    }

    localStorage.setItem("datta_token", data.token)
    localStorage.setItem("datta_user", JSON.stringify(data.user))
    showMsg("Account created! Redirecting...", "success")
    setTimeout(() => {
      window.location.href = "pricing.html"
    }, 1000)

  } catch (e) {
    showMsg("Server error. Please try again.", "error")
    btn.disabled = false
    btn.textContent = "Create Account"
  }
}

// ─── OTP BOXES LOGIC ──────────────────────────────────────────────────────────

function initOtpBoxes() {
  const boxes = document.querySelectorAll(".otp-box")
  boxes.forEach((box, i) => {
    box.addEventListener("input", function() {
      // Only allow digits
      this.value = this.value.replace(/\D/g, "")
      if (this.value) {
        this.classList.add("filled")
        if (i < boxes.length - 1) boxes[i + 1].focus()
      } else {
        this.classList.remove("filled")
      }
    })
    box.addEventListener("keydown", function(e) {
      if (e.key === "Backspace" && !this.value && i > 0) {
        boxes[i - 1].focus()
        boxes[i - 1].value = ""
        boxes[i - 1].classList.remove("filled")
      }
    })
    box.addEventListener("paste", function(e) {
      e.preventDefault()
      const pasted = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "")
      pasted.split("").slice(0, 6).forEach((ch, idx) => {
        if (boxes[idx]) {
          boxes[idx].value = ch
          boxes[idx].classList.add("filled")
        }
      })
      const last = Math.min(pasted.length, 5)
      boxes[last].focus()
    })
  })
}

function getOtpValue() {
  return Array.from(document.querySelectorAll(".otp-box")).map(b => b.value).join("")
}

function clearOtpBoxes() {
  document.querySelectorAll(".otp-box").forEach(b => {
    b.value = ""
    b.classList.remove("filled")
  })
}

// ─── RESEND COUNTDOWN ─────────────────────────────────────────────────────────

let resendTimer = null

function startResendCountdown() {
  let seconds = 30
  const countdownEl = document.getElementById("resendCountdown")
  const timerText = document.getElementById("resendTimerText")
  const resendBtn = document.getElementById("resendBtn")

  timerText.style.display = "inline"
  resendBtn.style.display = "none"
  resendBtn.disabled = true
  countdownEl.textContent = seconds

  clearInterval(resendTimer)
  resendTimer = setInterval(() => {
    seconds--
    countdownEl.textContent = seconds
    if (seconds <= 0) {
      clearInterval(resendTimer)
      timerText.style.display = "none"
      resendBtn.style.display = "inline"
      resendBtn.disabled = false
    }
  }, 1000)
}

// ─── PHONE OTP: SEND ─────────────────────────────────────────────────────────

async function handleSendOtp() {
  const code = document.getElementById("countryCode").value.trim()
  const phone = document.getElementById("phoneNumber").value.trim()
  clearMsg()

  if (!phone) return showMsg("Enter your phone number", "error")
  if (phone.length < 10) return showMsg("Enter a valid 10-digit phone number", "error")

  const btn = document.getElementById("phoneBtn")
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Sending OTP...'

  try {
    const res = await fetch(SERVER + "/auth/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: code + phone })
    })
    const data = await res.json()

    if (!res.ok) {
      showMsg(data.error || "Failed to send OTP. Check your number.", "error")
      btn.disabled = false
      btn.textContent = "Send OTP"
      return
    }

    // Switch to OTP verify step
    document.getElementById("phoneInputStep").style.display = "none"
    document.getElementById("otpVerifyStep").style.display = "block"
    document.getElementById("sentToLabel").textContent = code + phone
    document.getElementById("phoneSubText").textContent = "Enter the OTP we sent you"
    showMsg("OTP sent to " + code + phone, "success")
    startResendCountdown()

    // Focus first OTP box
    const boxes = document.querySelectorAll(".otp-box")
    if (boxes[0]) boxes[0].focus()

  } catch (e) {
    showMsg("Server unreachable. Please try again in a moment.", "error")
    btn.disabled = false
    btn.textContent = "Send OTP"
  }
}

// ─── PHONE OTP: RESEND ───────────────────────────────────────────────────────

async function handleResendOtp() {
  const code = document.getElementById("countryCode").value.trim()
  const phone = document.getElementById("phoneNumber").value.trim()
  clearMsg()
  clearOtpBoxes()

  const resendBtn = document.getElementById("resendBtn")
  resendBtn.disabled = true
  resendBtn.textContent = "Sending..."

  try {
    const res = await fetch(SERVER + "/auth/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: code + phone })
    })
    const data = await res.json()

    if (!res.ok) {
      showMsg(data.error || "Failed to resend OTP", "error")
      resendBtn.disabled = false
      resendBtn.textContent = "Resend OTP"
      return
    }

    showMsg("New OTP sent to " + code + phone, "success")
    startResendCountdown()
    const boxes = document.querySelectorAll(".otp-box")
    if (boxes[0]) boxes[0].focus()

  } catch (e) {
    showMsg("Server unreachable. Please try again.", "error")
    resendBtn.disabled = false
    resendBtn.textContent = "Resend OTP"
  }
}

// ─── PHONE OTP: VERIFY ───────────────────────────────────────────────────────

async function handleVerifyOtp() {
  const otp = getOtpValue()
  if (otp.length < 6) return showMsg("Enter the complete 6-digit OTP", "error")
  clearMsg()

  const btn = document.getElementById("verifyOtpBtn")
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Verifying...'

  const code = document.getElementById("countryCode").value.trim()
  const phone = document.getElementById("phoneNumber").value.trim()

  try {
    const res = await fetch(SERVER + "/auth/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: code + phone, otp })
    })
    const data = await res.json()

    if (!res.ok) {
      showMsg(data.error || "Invalid OTP. Please try again.", "error")
      btn.disabled = false
      btn.textContent = "Verify OTP"
      clearOtpBoxes()
      document.querySelectorAll(".otp-box")[0].focus()
      return
    }

    clearInterval(resendTimer)
    localStorage.setItem("datta_token", data.token)
    localStorage.setItem("datta_user", JSON.stringify(data.user))
    showMsg("Verified! Redirecting...", "success")
    setTimeout(() => {
      const hasPlan = localStorage.getItem("datta_plan")
      window.location.href = hasPlan ? "index.html" : "pricing.html"
    }, 1000)

  } catch (e) {
    showMsg("Server unreachable. Please try again.", "error")
    btn.disabled = false
    btn.textContent = "Verify OTP"
  }
}

// ─── RESET PHONE STEP (go back to phone input) ───────────────────────────────

function resetPhoneStep() {
  clearInterval(resendTimer)
  clearMsg()
  clearOtpBoxes()
  document.getElementById("phoneInputStep").style.display = "block"
  document.getElementById("otpVerifyStep").style.display = "none"
  document.getElementById("phoneSubText").textContent = "Enter your phone number"
  const btn = document.getElementById("phoneBtn")
  btn.disabled = false
  btn.textContent = "Send OTP"
}

// ─── GOOGLE LOGIN ─────────────────────────────────────────────────────────────

function handleGoogle() {
  window.location.href = "https://datta-ai-server.onrender.com/auth/google"
}

function handleGoogleCallback() {
  const params = new URLSearchParams(window.location.search)
  const token = params.get("token")
  const userStr = params.get("user")
  const error = params.get("error")

  if (error) {
    showMsg("Google login failed. Please try again.", "error")
    return
  }

  if (token) {
    try {
      localStorage.setItem("datta_token", token)
      if (userStr) {
        const user = JSON.parse(decodeURIComponent(userStr))
        localStorage.setItem("datta_user", JSON.stringify(user))
      }
      window.history.replaceState({}, document.title, window.location.pathname)
      const hasPlan = localStorage.getItem("datta_plan")
      window.location.replace(hasPlan ? "index.html" : "pricing.html")
    } catch (e) {
      console.error("Callback error:", e)
      showMsg("Login error. Please try again.", "error")
    }
  }
}

// ─── GUEST LOGIN ──────────────────────────────────────────────────────────────

function handleGuest() {
  const guestId = "guest_" + Date.now()
  const guestUser = { username: "Guest", email: "", isGuest: true, id: guestId }
  localStorage.setItem("datta_token", "guest_" + guestId)
  localStorage.setItem("datta_user", JSON.stringify(guestUser))
  localStorage.setItem("datta_plan", "arambh")
  window.location.href = "index.html"
}

// ─── ENTER KEY SUPPORT ────────────────────────────────────────────────────────

document.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return
  const active = document.querySelector(".formSection.active")
  if (!active) return
  if (active.id === "loginSection") handleLogin()
  else if (active.id === "signupSection") handleSignup()
  else if (active.id === "phoneSection") {
    const otpStep = document.getElementById("otpVerifyStep")
    if (otpStep && otpStep.style.display !== "none") handleVerifyOtp()
    else handleSendOtp()
  }
})
</script>
