<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta AI — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #141414; --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff; --text2: #b8b8b8; --text3: #707070;
    --accent: #00ff88; --blue: #3b82f6; --purple: #8b5cf6;
    --orange: #ff9955; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    padding: 20px; min-height: 100vh;
  }
  button, input { font-family: inherit; }
  .wrap { max-width: 1400px; margin: 0 auto; }

  .login-wrap {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    max-width: 420px; width: 100%;
  }
  .login-box h1 { font-size: 26px; margin-bottom: 8px; font-weight: 800; }
  .login-box h1 b { color: var(--accent); }
  .login-box p { color: var(--text3); margin-bottom: 24px; font-size: 14px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; color: var(--text3);
    margin-bottom: 6px; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 600;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-weight: 800; font-size: 14px; cursor: pointer;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }

  .dash-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; flex-wrap: wrap; gap: 12px;
  }
  .dash-title h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .dash-title h1 b { color: var(--accent); }
  .dash-title p { color: var(--text3); font-size: 13px; margin-top: 4px; }

  .refresh-btn {
    padding: 10px 20px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .logout-btn {
    padding: 8px 16px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text3); cursor: pointer; font-size: 12px;
  }

  .section { margin-bottom: 30px; }
  .section-title {
    font-size: 11px; color: var(--text3);
    letter-spacing: 2px; text-transform: uppercase;
    font-weight: 800; margin-bottom: 14px;
  }

  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .stat-label {
    font-size: 11px; color: var(--text3);
    letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700; margin-bottom: 8px;
  }
  .stat-value {
    font-size: 32px; font-weight: 800;
    letter-spacing: -1px; line-height: 1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.purple { color: var(--purple); }
  .stat-value.orange { color: var(--orange); }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 8px; }

  .revenue-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .rev-card {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    position: relative; overflow: hidden;
  }
  .rev-card::before {
    content: ''; position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(0,255,136,0.15), transparent);
    border-radius: 50%;
  }
  .rev-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-weight: 600; }
  .rev-amount {
    font-size: 28px; font-weight: 800;
    color: var(--accent); letter-spacing: -1px;
    display: flex; align-items: baseline; gap: 4px;
  }
  .rev-amount .rupee { font-size: 20px; opacity: 0.7; }

  .plans-breakdown {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }
  .plan-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .plan-name {
    font-size: 11px; color: var(--text3);
    letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700; margin-bottom: 8px;
  }
  .plan-count { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .plan-count.free { color: var(--text2); }
  .plan-count.starter { color: var(--blue); }
  .plan-count.plus { color: var(--accent); }
  .plan-count.pro { color: var(--orange); }
  .plan-count.ultimate { color: var(--purple); }
  .plan-users { font-size: 11px; color: var(--text3); }

  .users-table {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .table-row {
    display: grid; grid-template-columns: 1fr 2fr 1fr;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    align-items: center; font-size: 13px;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row.header {
    background: var(--bg3); font-size: 11px;
    color: var(--text3); text-transform: uppercase;
    letter-spacing: 1px; font-weight: 700;
  }
  .table-row .email { color: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .table-row .date { color: var(--text3); }

  .chart-wrap {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; height: 250px;
  }
  .chart-bars {
    display: flex; align-items: flex-end;
    gap: 4px; height: 180px; margin-top: 20px;
  }
  .chart-bar {
    flex: 1;
    background: linear-gradient(to top, var(--accent), rgba(0,255,136,0.3));
    border-radius: 4px 4px 0 0; min-height: 4px;
    position: relative; transition: all 0.2s;
  }
  .chart-bar:hover { background: var(--accent); }

  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 22px; }
    .rev-amount { font-size: 22px; }
    .table-row { grid-template-columns: 1fr 1fr; }
    .table-row .email { display: none; }
  }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text3); font-size: 14px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 1s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap" style="display:none;">
  <div class="login-box">
    <h1>Datta <b>AI</b> Admin</h1>
    <p>Sign in with your admin credentials</p>
    <div class="field">
      <label>Email or Username</label>
      <input type="text" id="loginUser" placeholder="admin@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="error" id="lerr"></div>
  </div>
</div>

<div id="dashboard" class="wrap" style="display:none;">
  <div class="dash-head">
    <div class="dash-title">
      <h1>Datta <b>AI</b> · Admin Dashboard</h1>
      <p id="lastUpdate">Loading...</p>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="refresh-btn" onclick="loadDashboard()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="dashContent">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<script>
const S = "https://datta-ai-server.onrender.com"

function getToken() { return localStorage.getItem("datta_admin_token") || localStorage.getItem("datta_token") || "" }
function saveToken(t) { localStorage.setItem("datta_admin_token", t) }
function logout() { localStorage.removeItem("datta_admin_token"); window.location.reload() }

async function doLogin() {
  const u = document.getElementById("loginUser").value.trim()
  const p = document.getElementById("loginPass").value
  const err = document.getElementById("lerr")
  const btn = document.getElementById("loginBtn")
  if (!u || !p) { err.textContent = "Enter email and password"; return }

  btn.disabled = true; btn.textContent = "Signing in..."
  err.textContent = ""

  try {
    const r = await fetch(S + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier: u, password: p })
    })
    const d = await r.json()
    if (!r.ok || !d.token) {
      err.textContent = d.error || "Login failed"
      btn.disabled = false; btn.textContent = "Sign In"
      return
    }
    const ar = await fetch(S + "/admin/dashboard", {
      headers: { "Authorization": "Bearer " + d.token }
    })
    if (ar.status === 403) {
      err.textContent = "Not an admin account"
      btn.disabled = false; btn.textContent = "Sign In"
      return
    }
    if (!ar.ok) {
      err.textContent = "Dashboard error"
      btn.disabled = false; btn.textContent = "Sign In"
      return
    }
    saveToken(d.token)
    showDashboard()
  } catch(e) {
    err.textContent = "Network error: " + e.message
    btn.disabled = false; btn.textContent = "Sign In"
  }
}

async function showDashboard() {
  document.getElementById("loginScreen").style.display = "none"
  document.getElementById("dashboard").style.display = "block"
  loadDashboard()
}

async function loadDashboard() {
  const tok = getToken()
  const content = document.getElementById("dashContent")
  try {
    const r = await fetch(S + "/admin/dashboard", {
      headers: { "Authorization": "Bearer " + tok }
    })
    if (r.status === 401 || r.status === 403) {
      localStorage.removeItem("datta_admin_token")
      window.location.reload()
      return
    }
    const d = await r.json()
    if (!d.success) {
      content.innerHTML = '<div class="error">Failed: ' + (d.error || "Unknown") + '</div>'
      return
    }
    document.getElementById("lastUpdate").textContent = "Last updated: " + new Date(d.generatedAt).toLocaleString("en-IN")
    renderDashboard(d)
  } catch(e) {
    content.innerHTML = '<div class="error">Error: ' + e.message + '</div>'
  }
}

function fmt(n) {
  if (typeof n !== "number") return "0"
  if (n >= 100000) return (n / 100000).toFixed(1) + "L"
  if (n >= 1000) return (n / 1000).toFixed(1) + "K"
  return n.toString()
}

function renderDashboard(d) {
  const content = document.getElementById("dashContent")
  const t = d.totals || {}
  const nu = d.newUsers || {}
  const ch = d.chats || {}
  const rev = d.revenue || {}
  const plans = d.planStats || {}

  const chartData = d.signupChart || []
  const maxCount = Math.max(...chartData.map(x => x.count), 1)
  const days = []
  for (let i = 29; i >= 0; i--) {
    const dt = new Date()
    dt.setDate(dt.getDate() - i)
    const key = dt.toISOString().slice(0, 10)
    const found = chartData.find(x => x._id === key)
    days.push({ date: key, count: found ? found.count : 0 })
  }
  const chartBars = days.map(day => {
    const pct = (day.count / maxCount) * 100
    return '<div class="chart-bar" style="height:' + Math.max(pct, 2) + '%;" title="' + day.date + ': ' + day.count + ' users"></div>'
  }).join("")

  content.innerHTML = `
    <div class="section">
      <div class="section-title">Overview</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-value accent">${fmt(t.users)}</div>
          <div class="stat-sub">+${nu.today} today</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Chats</div>
          <div class="stat-value blue">${fmt(t.chats)}</div>
          <div class="stat-sub">+${ch.today} today</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Messages</div>
          <div class="stat-value purple">${fmt(t.messages)}</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Paid Users</div>
          <div class="stat-value orange">${fmt(t.activePaidUsers)}</div>
          <div class="stat-sub">Active now</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Revenue</div>
      <div class="revenue-grid">
        <div class="rev-card">
          <div class="rev-label">Today</div>
          <div class="rev-amount"><span class="rupee">₹</span>${fmt(rev.today)}</div>
        </div>
        <div class="rev-card">
          <div class="rev-label">This Week</div>
          <div class="rev-amount"><span class="rupee">₹</span>${fmt(rev.week)}</div>
        </div>
        <div class="rev-card">
          <div class="rev-label">This Month</div>
          <div class="rev-amount"><span class="rupee">₹</span>${fmt(rev.month)}</div>
        </div>
        <div class="rev-card">
          <div class="rev-label">This Year</div>
          <div class="rev-amount"><span class="rupee">₹</span>${fmt(rev.year)}</div>
        </div>
        <div class="rev-card" style="border:1px solid var(--accent);">
          <div class="rev-label" style="color:var(--accent);">Total Active</div>
          <div class="rev-amount"><span class="rupee">₹</span>${fmt(rev.total)}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">New Users</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value accent">${nu.today}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Yesterday</div>
          <div class="stat-value">${nu.yesterday}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last 7 Days</div>
          <div class="stat-value blue">${nu.week}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last 30 Days</div>
          <div class="stat-value purple">${nu.month}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last 90 Days</div>
          <div class="stat-value orange">${nu.last90Days}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last 1 Year</div>
          <div class="stat-value accent">${fmt(nu.year)}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Signup Growth · Last 30 Days</div>
      <div class="chart-wrap">
        <div style="color:var(--text3);font-size:12px;">Hover bars for daily count</div>
        <div class="chart-bars">${chartBars}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Active Plans</div>
      <div class="plans-breakdown">
        <div class="plan-item">
          <div class="plan-name">🌱 Free</div>
          <div class="plan-count free">${plans.free || 0}</div>
          <div class="plan-users">users</div>
        </div>
        <div class="plan-item">
          <div class="plan-name">🚀 Starter</div>
          <div class="plan-count starter">${plans.starter || 0}</div>
          <div class="plan-users">₹29/mo</div>
        </div>
        <div class="plan-item">
          <div class="plan-name">⚡ Plus</div>
          <div class="plan-count plus">${plans.plus || 0}</div>
          <div class="plan-users">₹299/mo</div>
        </div>
        <div class="plan-item">
          <div class="plan-name">🔥 Pro</div>
          <div class="plan-count pro">${plans.pro || 0}</div>
          <div class="plan-users">₹499/mo</div>
        </div>
        <div class="plan-item">
          <div class="plan-name">👑 Ultimate</div>
          <div class="plan-count ultimate">${plans.ultimate || 0}</div>
          <div class="plan-users">₹799/mo</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Recent Signups (Latest 20)</div>
      <div class="users-table">
        <div class="table-row header">
          <div>Username</div>
          <div>Email</div>
          <div>Joined</div>
        </div>
        ${(d.recentUsers || []).map(u => `
          <div class="table-row">
            <div>${u.username || "—"}</div>
            <div class="email">${u.email || "—"}</div>
            <div class="date">${new Date(u.createdAt).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })}</div>
          </div>
        `).join("") || '<div style="padding:30px;text-align:center;color:var(--text3);">No users yet</div>'}
      </div>
    </div>
  `
}

window.addEventListener("DOMContentLoaded", async () => {
  const tok = getToken()
  if (!tok) {
    document.getElementById("loginScreen").style.display = "flex"
    return
  }
  try {
    const r = await fetch(S + "/admin/dashboard", {
      headers: { "Authorization": "Bearer " + tok }
    })
    if (r.ok) {
      showDashboard()
    } else {
      localStorage.removeItem("datta_admin_token")
      document.getElementById("loginScreen").style.display = "flex"
    }
  } catch(e) {
    document.getElementById("loginScreen").style.display = "flex"
  }
})

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") {
    doLogin()
  }
})
</script>
</body>
</html>
